body:
  text: 卷下妊娠乾薑人參半夏丸治惡阻小半夏湯同加茯苓湯按惡阻用上之方而不應者盛水二合於器中投伏龍肝一錢攪如作甘爛水法而暫置靜處待其澄清取其水一合半煮上之諸方則不吐而能應神驗豬苓散治惡阻大效豫苓朮豬苓為湯用纍用纍驗烏梅丸家用惡阻因蟲者每服五分日三或四屢效桂枝茯苓丸婦人宿有症病經斷未及三月而得漏下不止胎動在臍上者為症痼害妊娠當下其症當歸芍藥散婦人懷妊腹中㽱痛芎歸膠艾湯妊娠下血者千金云因頓僕失踞腰腹痛者每孕必墜者鯉魚雞肉雞卵婦人有每孕二三月至四五月墮胎者宜鯉魚作臛食之一月三次又雞肉時時煮食之雞卵酒煮日食之佳此方在外臺及本草婦人藏無他病每孕墮胎者豫每令食此三物至臨月分娩母子共康健屢效若嫌鯉臛之腥者作鱠食凡決定妊否之法詳於本書又兒胎居偏者胎將墜經若水下者婦人不凡決定妊否之法詳於本書又兒胎居偏者胎將墜經若水下者婦人不時顛仆者致胎動者右足彎急者吾門皆用整胎術葵子茯苓散妊娠有水氣身重小便不利灑淅惡寒起則頭眩如防己效餌食赤小豆大簇丸黃鐘丸按妊婦不三食一便則生燥屎而分娩不易祕結者宜撰用此二丸惡阻諸藥無效者候其肩背若凝結者宜施針灸方輿産前後桂枝茯苓丸料候産母腹痛腰痛見漿水下方服名催生湯按和田氏催生用芎歸湯芎歸二味各等分水酒各半煎加桂枝減半益效此方原在千金後藤香川亦用臨産雞子生吞一枚娩後即雞子生吞一枚按是外臺及本草所用用之則産婦益氣力纍驗回生散家方治血暈神方荊芥穗為末水服二錢重者童便服角弓反張豆淋酒下荊芥二錢煎服亦效治血暈方千金半夏末吹鼻中或皂莢末內鼻中又以炭火投苦酒中嗅其氣禁暈術遏崩術見産論桃核承氣湯治胎死腹中若胞衣不出及惡露澀滯腹痛發暈者靈黃散治血氣刺痛並血暈一云失笑散刺痛者謂痛從少腹上衝心也芎歸膠艾湯四逆加人參湯按産後先宜問血下多少血下少而血暈者桂枝茯丸加大黃湯兼靈黃散或回生散施禁暈術重者桃核承氣湯血下多而血暈者芎歸膠艾湯加三七兼回生散或血餘霜一錢施遏崩及禁暈掀起術重者四逆加人參湯此症多難治桂枝加附子湯産後汗出者千金外臺云産後忽悶冒汗出不知人者是暴虛故也取破雞子吞之便醒若未醒可與童便一升甚驗丈夫小便亦得療胞衣不下者方家方雲母一錢為末和生薑汁以水送下或白湯或酒服亦佳又方皂莢末吹鼻中即下又方鹿角為末每服一錢匕溫酒下未下再服方輿云胞衣不下者用桃核承氣有刺痛則兼失笑散又去血過多胞衣不下者或用附子劑良方心胸脹痛者用奪命丹下胞術見本書按産後腹痛及少腹痛有與破血消黃劑下之而不愈者宜桂茯丸料加當歸延胡索兼失笑散百發百中和田氏云失笑産後之聖藥一醫云延胡索少腹痛之專藥信然疑似之症有當歸建中湯症家君云分娩後六七日子宮腫而不收如少腹有塊者宜用桂茯丸料按之痛者子宮也不痛者塊物也勿謬認用桃核牡丹湯等大豆紫湯千金治産後百病及中風痱痙或背強口噤或但煩熱苦渴或頭身皆重或身癢劇者嘔逆直視大豆一合清酒二合上二味以鐵鐺猛火熬豆令極熱焦煙出以酒沃之去滓服一升日夜數服小汗則愈一以去風二則消血結如妊娠傷折胎死在腹中三日服此酒即瘥按産後發痙角弓反張者以此酒多服回生散妙又聖濟云頓服竹瀝一升即愈按子癇用柴胡龍骨牡蠣湯多加鐵粉效立野氏云子癇用殺蟲劑而治者十中八九也枳實芍藥散産後腹痛煩滿不得臥下瘀血湯服枳實芍藥散不愈者此為腹中有乾血著臍下此方主之亦主經水不利産後血閉不下者益母草汁入酒服聖惠大承氣湯産後七八日無太陽證少腹堅痛此惡露不盡不大便煩躁發熱切脈微實再倍發熱日晡時煩躁者不食食則譫語利之即愈當歸建中湯治婦人産後虛羸不足腹中刺痛不止吸吸少氣或苦少腹拘急痛引腰背不能食飲方後云若去血過多崩傷內衄不止加地黃六兩阿膠二兩合八味湯成內阿膠小柴胡湯三物黃芩湯婦人在草蓐自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩者三物黃芩湯主之和田氏云此二方産後將成蓐勞者用之當歸生薑羊肉湯産後腹中㽱痛並治腹中寒疝虛勞不足按我邦無羊代鹿肉或雞肉佳也千金産後虛損門有鹿肉湯二方聖濟産後虛羸門有烏雞湯一方蓐勞者宜日食雞肉雞卵鹿肉鯉魚等參連湯熊參湯東洋一間齋二先生血暈用此二方瀉心湯家君血暈並俗稱血道藥者用此方或合茯桂術甘湯大黃牡丹皮湯産後小腹有塊者或産後惡露澀滯成水腫者有神效用消石佳按和田氏産後水腫用琥珀湯五苓散加琥珀反鼻湯也承氣丸産後祕結者兼用按女子腹面倒首也説載本書轉胞治術子宮脫脫肛膀胱脫諸術見於本書紀聞云産後痙病荊芥末二錢豆淋酒攪和下四五服而有效又破傷風妙産後喘十之七八難治大小青龍無效參蘇飲或有效人參蘇木二味也廣東人參佳若口鼻黑氣起者加附子産後大渴引飲十之八九必死矣用栝蔞湯方輿云難産及胎衣不下者用獨聖散吐劑也又通關散吹鼻中方輿載獨聖散及通關散蟹爪散葵子阿膠湯牛膝散回生湯交加散蜀漆湯栝蔞湯參蘇飲奪命丹經閉桂枝茯苓丸料經閉未結塊者或頭痛或腹中拘攣或手足𤸷痹或眼中赤脈疼痛羞明者皆主之或加大黃又月事時腰腹痛者加當歸紅花延胡索兼用靈黃散神驗桃核承氣湯少腹急結者急結急迫結實之謂也大黃牡丹湯少腹有堅塊者抵當湯治瘀血者凡瘀血症二焉少腹鞕滿小便快利者一也腹不滿其人言我滿者二也急則以湯緩則以丸金匱云經水不利下和田氏云經閉痼而不動者宜此湯華岡氏云此方無速效二三月而有效宜為丸以酒長服下瘀血湯臍下毒痛及經水不利者按此方為丸酒服效赤丸山脅治宿疝癥瘕蟲癖勞瘵黴毒骨痛即濕漆丸生漆以令丸為度大黃麵粉各十錢上三味以少蜜為丸白湯送下自三分至一錢日一夜一加少蜜者厭干固者也按此方經閉腹痛者用之有效方輿主治云治乾血及蟲方方後云自三分至一錢終而復始以知為度又生生堂方書此丸主治云治諸毒在裡難發泄者有持云用此丸知者身體生癢必發赤疹夷則丸治腹中有堅塊而見血症者以桃仁牡丹湯送下每服六分日三浮石丸治腹不滿其人言我滿而腹皮見青筋者按經閉數月少腹滿而無塊者此方主之當歸四逆加附子湯經閉惡寒足冷或腰腳痛脈緊者按此湯症大便冷祕之症間有焉小柴胡湯大柴胡湯按經閉胸脅苦滿者用此湯兼用破血之諸丸鷓鶘菜湯經閉因蛔蟲者礬石丸經水不利下白物者豫不為丸為散帛裹如無患子大深納陰中下邊坐臥任意唯禁奔走三日一換之以愈為度紅藍花酒紅花二錢上一味以酒二合煎減半頓服一半按金匱云治血氣刺痛經閉無刺痛亦可用元生丸家方經閉用諸藥而無效者此丸一分砂糖湯送下七寶丸經閉因結毒者聖濟經閉條有水銀劑二方主治云臍下結鞕疼痛又一方主治云肢節痛腹脅結塊羸瘦欲變成勞二方俱方中有芫青磠砂一方仁存方治經閉不行至一年臍腹痛腰腿沉重寒熱往來芥子二兩為末每服二錢熱酒食前服又方千金治室女經閉牡鼠屎一兩炒研空心溫酒服二錢本草云服一錢又馬鞕草通月經又絲瓜為末酒服通月經和田氏云經水不通而逆行者必吐凝血者也用三黃湯臍下有塊者桃核承氣湯宜施刺洛艮山翁云經閉宜日食辣茄浴溫泉而佳也香川氏血枯經閉腹痛者用當歸建中湯少腹滿如鼓脹小便難而不渴者用大黃甘遂湯又用辣茄丸張子和治經閉大抵用吐方而後用破血劑蘭説篷砂治經閉有番紅花蓬砂沒藥等方或曰蟅蟲蝗之類也出石中川友三以蝗代蟅蟲有效見王字形於背者是也東郭翁云經閉數月用破血劑無寸效經一年餘而腹無塊者香附子一味為末每服一錢酒服日三經二月而有效方與載千金地黃煎丸良方牛膝散赤白帶下崩中漏下桂枚茯苓丸料或加大黃按礬石丸主治云中有乾血下白物由是觀之白亦血也赤白帶下初起宜用此湯兼礬石丸芎歸膠艾湯治崩中漏下去血過多加三七或加附子或兼用犀角按病源云衝任氣虛不能約制經血故忽然崩下謂之崩中又云血非時而下淋瀝不斷謂之漏下溫經湯病下血數十日不止暮即發熱少腹裡急腹滿手掌煩熱唇口乾燥按有此症而腹無塊者此湯主之又瘦弱之婦每月經水過多少腹無力食不進者此湯加黃連有效黃土湯漏下有附子劑症大抵脈緊也用此湯則不日血止者也黃連解毒湯婦人年及五十以上經水不絶者或經水一月二度來者大抵心下痞脈數也按壯婦亦此湯症間有焉當歸建中加地黃阿膠湯血症心中悸而煩者須用此湯腹中急痛亦佳小柴胡湯大柴胡湯柴胡薑桂湯此三方因腹狀用之兼用破血丸苓薑朮甘湯當歸四逆加吳茱萸生薑湯帶下腰痛腳冷下白物者撰用此二方或兼炙治溫泉當歸芍藥散礬石丸下白物不止少腹有塊者四逆加人參湯艮山先生曰崩血甚四肢厥冷自汗者四逆湯或加人參可也東郭翁云余遇産後暴崩或致暈者則用此方其功非他方可企及也解毒劑加桂芍歸所下之物臭氣甚者必因結毒也此劑主之醫事説約和田氏云白帶下者有一種因毒者此膿淋之類也臭氣至甚矣用解毒劑甚者兼輕粉丸夾鍾丸漏下腰腹㽱痛下血至少淋瀝者兼用此丸治白崩方千金灸小腹橫紋當臍孔直下百壯又灸內踝上三寸左右各百壯灸八髎小言治五色帶下方千金服大豆紫湯日三服治崩中漏下赤白不止千金燒亂髮酒和服方寸匕日三又方千金鹿角燒末酒服日三蒲黃散千金治漏下不止方蒲黃半升鹿茸當歸各二兩上三味為末酒服五分匕日三不知稍加至方寸匕蒲黃丸聖濟治月候過多血傷漏下不止蒲黃三兩微炒龍骨二兩半艾葉一兩上三味為末蜜丸梧子大每服二十丸煎艾湯下日再方輿云血崩及諸失血危急者煎用人參二錢不知服至數劑又下白物如脂者用無憂散兼坐藥灸治溫泉皆兼宜按無憂散子和方也豫未試又同書有烏賊骨牡蠣二味等分方赤白帶下久下不止者用此散而止云未試或云治婦人白沃不已方風化石灰上一味酸醬草搗汁和丸病因考帶下門云治方灸溫泉幹過臘魚告天雀鶉方輿載逍遙散及歸脾湯獨參湯瓜子仁湯栝蔞根湯無憂散烏茜丸乳病葛根加桔梗石膏湯乳腫乳癰未成膿者用此湯外塗鮒魚膏鮒魚膏家方擂生鮒魚肉為泥塗乳房産後則倩他小兒而令吮乳後輕輕揉軟乳房則消散也産前易消散産後難消散葛根加反鼻湯伯州散乳癰將成膿者用此二方大黃牡丹湯乳癰毒深膿少不大便者耆歸建中湯乳癰膿潰後盜汗出者或加龍骨牡蠣或加附子小柴胡加石膏湯治乳核乳癧神驗外以蔥湯蒸之貼水銀膏即祕録神水膏柴胡去半夏加栝蔞橘皮連翹湯治乳癰不成膿不消散久不愈者外用前法貼神水膏亦得單橘皮湯本草黃橘皮附方引張氏云婦人乳癰未成者即散已成者即潰痛不可忍者即不疼神驗不可云喻也用真陳橘皮湯浸去白曬麵炒微黃為末每服二錢麝香調酒下初發者一服見效又青橘皮附方引丹溪云婦人乳岩因久積憂鬱乳房內有核如指頭不痛不癢五七年成瘡名乳岩不可治也用青皮四錢水一盞半煎一盞徐徐服之日一服或用酒服七寶丸乳岩初發青橘皮湯兼用此丸水銀膏排膿湯按吾先師奧緑山翁乳癰初起乳核乳癧皆用單青皮湯有奇效治乳癰初發腫痛結鞕欲成膿令一服差樺皮散方聖濟以北來真樺皮燒灰酒服方寸匕令睡及覺已差乳癰腐爛亦用唐瑤經驗本草療乳癰腫痛方山脅氏方函天瓜當歸甘草各五錢乳香沒藥各一錢鹿角燒三錢上六味為末溫酒送下治乳癰疼痛聖濟車前子一兩為末每服二錢匕溫酒調下又方聖濟打雞子一枚熱酒調下治乳汁不出蘊積在內結成癰腫此名妒乳聖濟露蜂房燒灰上一味研細每服二錢匕煎水一盞至六分溫服鹿角散正宗治乳癰新起結腫疼痛增寒發熱但未成鹿角尖三寸用炭火內煅稍紅存性碾末每服三錢食後熱酒調服甚者再三服必消治乳癰結鞕疼痛聖濟和泥蔥半斤上一味細銼以水四升煮十數沸於瓷瓶子內盛熏乳腫處冷即再暖以差為度又方聖濟露蜂房五兩上一味銼碎以醋五升煎至三升傾於瓷瓶子內乘熱熏乳上冷即再暖以差為度聖惠方云白麵治乳癰不消炒黃醋煮為糊塗之即消乳泉散家方治産後乳汁不出或少者露蜂房霜十錢地黃五錢上二味為末每服一錢以醴酒送下日三服聖濟云露蜂房炒末酒服栝蔞根末酒服皆能下乳汁本草云穿山甲炮研酒服二錢能下乳汁名湧泉散儒門事親乳汁不下條曰夫婦人有本生無乳者不治或因啼哭悲怒鬱結氣溢閉塞以致乳脈不行用精豬肉清湯調和美食於食後調益元散五七錢連服三五服更用木梳梳乳周回百餘遍則乳汁自下也回乳方本草大麥糵炒研白湯服二錢麥芽二三兩炒水煎服亦效宜用新者和田氏云乳岩用青皮頻灸肩顒肘髎及七九以上牛山云乳汁不通則結核成乳癰初結核寒熱者速揉和乳房則乳汁下結核自消又云將成乳癰者白芷貝母各二兩為末溫酒送下神驗祕録云小兒有齧乳頭如皸而腐爛者名之乳疳亦曰乳頭破裂乳兒則益爛而難愈不乳兒則乳汁充滿而痛成乳癰雖小瘡難治宜攤中黃膏於綿片而貼瘡欲乳兒則去中黃膏攤遊奕膏於紙而貼之不當齒於瘡口又不濕瘡口而可也凡乳病禁針線勞肩看乳相併乳母之乳汁法見於本書聖濟乳癰門曰新産之人乳脈正行若不自乳兒乳汁蓄結氣血蘊積即為乳癰産後乳結癰門曰産後多有此疾者以乳汁蘊積與氣相搏故也方輿載柴桂湯排膿湯梓葉湯蒲公英湯櫻皮湯小兒初生雜治甘連大黃湯小兒初生當急進之吐下穢物甘草黃連大黃各五分上三味以水一合煮取五勺以絹裹艾如乳頭沾取吮之紫丸千金云兒服如麻子一丸百日兒服如小豆一丸一貫云小兒初生有心下至臍下如梅核纍纍三四枚者此胎毒也宜急治之經二三月則難治甘連大黃湯加鬱金紅花不消散者用山繭湯兼用紫丸則必消散矣又顏色青白陰狀者用五香湯其重者用四逆湯雖然至小兒用四逆則多難治也病源云小兒始生肌膚未成不可暖衣暖衣則令筋骨緩弱又云薄衣之法當從秋習之不可以春夏卒減其衣則令中風寒從秋習之以漸稍寒如此則必耐寒又云不能進乳哺則宜下之又云小兒始生生氣尚盛無有虛勞微惡則須下之又云不下則致寒熱或吐發癇或致下利此皆病重不早下之所為也千金方變蒸條云若良久熱不可已少與紫丸微下熱歇便止若於變蒸之中加以時行溫病或非變蒸時而得時行者其診皆相似惟耳及尻通熱口上無白泡耳當先服黑散以發其汗熱當歇便就瘥若猶不都除乃與紫丸下之黑散者麻黃杏仁大黃三味也又云蒸者甚熱而脈乳汗出是也近者五日歇遠者八九日歇也當是蒸上不可灸刺妄治之也又云凡乳兒不欲太飽飽則嘔吐每候兒吐者乳太飽也以空乳乳之即消幼幼集成簡切辨證小兒熱症有七面腮紅大便祕小便黃渴不止上氣急足心熱眼黃赤小兒寒症有七面皎白糞青白肚虛脹眼珠青吐瀉無熱足脛冷睡露睛簡易方云小兒臍風獨頭蒜切片安臍上以艾灸之口中有蒜氣即止保嬰録亦云入門云撮口風面目黃赤氣喘啼聲不出舌強唇青撮口聚面飲乳有妨又臍風其症臍腫突腹脹滿或日夜多啼不能飲乳甚則發搐撮口噤口是為內搐不治凡臍邊青黑爪甲黑者俱死按直指方臍風撮口用紫丸又袖珍小兒方治臍風撮口瓜蒂散吹入鼻內啼則可療良方云每日頻於無風處看小兒上齶頰內有白泡起以指甲刮破拭淨之治襁褓中小兒臍風撮口法聖濟上視小兒上下斷當口中心處若有白色如豆大此病發之候也急以指爪正當中掐之自外達內掐令匝微血出亦不妨又於白處兩盡頭亦依此掐令內外斷應手當愈治小兒臍久不幹赤腫膿出聖濟當歸焙上一味為末極細少少著臍中頻用之小兒諸病但見兩眼無精光黑精無運轉目睫無鋒芒如魚眼貓眼之狀不治濟生凡診小兒大指按三部一息六七至平和八九至發熱五至內寒聖惠三歲後則以一指轉側辨其脈五六歲後脈六七至為平脈醫通千金云兒初生叫聲連延相屬者壽聲絶而復揚急者不壽臍小者不壽自開目者不成人目視不正數動者大非佳汗不流不成人小便凝如脂膏不成人頭四破不成人早坐早行早齒早語皆惡性非佳人陰不起者死陰囊下白者死赤者死卵縫通達黑者壽上相兒命短長法之拔萃也全文載於本書家翁云初生小兒胸肋膨脹者胎毒也紫丸主之按豫家初生小兒經二十四時而乳有胎毒者經三十六時而乳小兒以囟門之動緩者為無病之兒又握手而不開者為壯健開手者不成人赤子小便之狀如帚形者壯健而能育也屢試屢驗後世方書有虎口三關視手紋法其論糊塗不可從矣小言云臍帶將脫時不可浴兒浴則發臍風臍帶脫則宜灸瘡口小艾一炷而佳也但悉灸濕處不拘形經五六日而瘡口愈發宜令浴必無臍風撮口之患鵝口甘連大黃湯或加石膏瀉心加石膏湯有熱者宜此湯兼紫丸紫丸鵝口用上之二湯兼用此丸朱硼散方見口舌門用絹裹手指蘸水拭口三五次塗此藥按聖濟有枯礬辰砂二味等分之塗藥吾先師用之有效華岡氏用金鎖匕冰硼散內服涼膈甘連大黃黃連解毒等也和田氏云鵝口用附子者百人有一人必死方輿載涼膈附子瀉心錢氏白朮散吐哯小半夏湯同加茯苓湯吐乳初發用此二方祕結者兼紫丸不應者以伏龍肝汁煎用以伏龍肝汁煎用吳茱萸加黃連湯治吐乳將發驚者吳茱萸黃連生薑各六分人參大棗各二分上五味以水一合五勺煮取五勺服旋覆花代赭石湯一貫云吐乳噯氣腹鳴者此湯有效豫未試厚朴七物湯家君吐乳腹滿者用之兼紫丸紫丸理中加茯苓湯吐乳下利者或加附子七寶丸活幼口議云幼兒哯乳不止服此立效膩粉一錢鹽豉七粒去皮研勻丸麻子大每服三丸藿香湯下按戴氏嘔吐噎膈用輕粉丸四逆湯吐乳發搐者一貫云吐乳下利者或用甘草乾薑湯吐乳諸藥無效者炒米煎服有效吐乳後發搐惡候也發搐而吐乳者不然也吐乳發搐宜四逆湯友人越川氏云吐乳將發驚者易其乳母則愈愈而後復令吮其乳汁佳雖實母乳汁可易之必愈妙吐哯候法小兒有飽乳而含乳汁於口徐徐吐乳者又有乳兒即抱持而動兒體吐乳者皆此非病也乳兒而不少動兒體吐乳如湧者為之吐哯也病源云凡小兒霍亂皆須暫斷乳又曰小兒吐利不止血氣變亂即發驚癇也入門云吐瀉不止久則變成慢驚與疳丹毒大青龍湯葛根加石膏湯小柴胡加石膏湯大柴胡湯黃連解毒湯丹毒攻心者急用此湯兼承氣或紫丸調胃承氣湯紫丸針雲門尺澤委中亂刺丹上出血蜞針施丹上犀角方輿云丹毒無大熱色甚赤眼中生血絲或煩躁者毒劇也宜用此入門丹毒門云赤腫遊走遍身不定其始發於手足或頭面胸背令人煩悶腹脹其熱如火痛不可言若入小腹陰囊如青傷者死又曰治法先用針砭去血外用拔毒涼肌之藥敷又曰凡丹毒變易非輕如經三日不治毒氣入里腹脹則死按病源論丹毒二十九種千金引肘後云丹毒須針鑱去血聖濟云治法用鎌割明不可緩故也玉案云丹毒火症也小兒出胎後多有此症近則五六日或十日或半月遠則愈月後或兩三月其病形不同一貫云丹毒發於陰股上至臍及心下者難治發麵部下至腹及腳者易治按病源云留火丹之狀發一日一夜便成瘡如棗大正赤色又丹發兩臂赤起如李子謂之鬼火丹也由是觀之丹毒突出而腫者希有焉千金有丹毒塗藥赤小豆末以雞子白調塗丹上干即易按丹毒宜春冬針之夏秋施蜞針而後塗此藥東郭翁曰丹毒無陰症凡患丹毒人十中七八腹石硬也丹毒自上來者針俗曰腕力瘤處出血最效方輿有犀角消毒飲連堯湯夜啼客忤甘麥大棗湯驚啼加鐵粉甘連大黃湯紫丸停乳者用此湯兼紫丸柴胡龍骨牡蠣湯驚啼或用此湯小建中湯小柴胡湯大柴胡湯此三方因腹狀用之小言云夜啼用紫丸等無效者灸不容天樞二三日數十壯甚驗聖濟云嬰兒氣弱府藏有寒每至昏夜陰寒與正氣相擊神情不得安靜腹中切痛故令啼呼於夜名曰夜啼按病源及千金之論鑿而不足取也時珍曰小兒夜啼多是停乳腹痛余每以蠟匱巴豆藥一二丸服之屢效經驗良方云小兒腹痛啼哭如口角青者蟲症也抱起稍止臥之則大啼蓋臥則蟲攻上起則蟲攻下故也按初生小兒有發熱鼻塞不通不能吮乳大啼者用麻黃湯則愈若不愈者胎毒在頭也以家方芫青膏貼百會則必愈纍用纍驗方輿云夜啼客忤一二歲之間病也方輿載千金生地黃湯馬脾風麻杏甘石湯馬脾風初發用此湯兼甘遂丸或紫丸越脾加半夏湯此湯麻杏甘石之一等重者也瀉心湯紫丸姑洗丸七寶丸救喘丸家方化毒丸小言云用二分效醫學綱目云暴喘欲傳為馬脾風也大小便哽宜急下之用牛黃奪命散後用白虎湯平之馬脾風在百日內者不理按奪命散黑白牽牛大黃檳榔四味散藥也三歲兒每服二錢冷漿水下涎多加膩粉少許又同書有辰砂輕粉甘遂三味無價散曰治馬脾風悶亂入門馬脾風用麝香丸聖濟喘急門有砒石瓜蒂小言云馬脾風惡病也重於驚風可十治一二按馬脾風小兒之喘息也故病源千金及翼外臺聖濟無馬脾風病名往古長幼共謂之喘也馬脾風后世之俗稱也方輿載參連湯急慢驚葛根湯金匱曰太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙按驚風壯熱者宜用此發汗還魂湯方見卒死此湯即傷寒論麻黃湯加麻黃一兩者也無汗表實卒然昏冒者用之與便閉裡實用備急等者不同宜詳診察焉小柴胡加大黃湯袖珍小兒方云療急驚風有熱者柴胡龍骨牡蠣湯驚惕不安動氣盛者石膏黃連甘草加鐵砂湯治急驚有熱瘛瘲劇者本方加鐵砂一錢煎服或入蜜服按滋德堂方有救急驚神方石膏十兩辰砂五錢研末用生蜜調下是亦類方也和久田氏和田氏此症用風引湯大承氣湯痙為病胸滿口噤臥不著席腳彎急必齘齒瓜蒂散子和曰小兒三五歲或七八歲至十餘歲發驚涎潮搐搦如拽鋸不省人事目瞪喘急將死者中略輕者為驚風天吊重者為癇病風搐可用吐涎及吐之藥按子和風搐反張往往用吐劑詳於事親紫丸走馬湯急驚腹滿口噤便祕者宜用此下之屢驗千金云凡灸癇當先下兒使虛乃承虛灸姑洗丸急驚痰涎壅盛者或兼用之理中加附子湯真武湯慢驚風下利者通脈四逆加豬膽汁湯白通加豬膽汁湯慢驚慢脾風下利者與通脈四逆多灸神闕尚不愈者可與白通加豬膽汁湯如無豬膽則以熊膽代之亦可白通人尿也男兒三歲為佳醫方集解用五歲尿灸慢驚風神闕氣海天樞章門針方輿云小兒稱驚風者詳診之若有青紫筋者乃為痧病可放而已本莊氏云小兒有可刺絡之證如急慢驚直視咬牙之類是也肘後療驚癇瘲掣幼幼新書上取熊膽一兩豆大和乳汁及竹瀝汁服去心中涎效驗七寶丸急驚發汗後或用此丸有奇效本草水銀條云治小兒驚熱涎潮附方云小兒癇疾急驚墜涎本草小兒驚癇門云水銀輕粉並主驚癇風痰熱痰聖濟急驚門有水銀劑二十餘方有持云慢驚爪章門有知覺者宜施治還魂湯急驚妙藥手足掣抽宜龍膽湯病因考驚癇門云治方熊膽灸按方輿載桂枝加桂湯風引湯龍膽湯參連湯衝心者用參連其劇者加熊膽二分名熊參湯又載烏蠍散通關散雄黃解毒丸聶久吾云慢脾風者即慢驚失治而甚者耳其實難大分別亦不必別立治法寇氏驚風論曰效傷寒陰陽二證之治而可也小言云驚風者胎毒成塊不時奔騰者也瀉心大小柴胡參連白虎熊參湯紫丸等可撰用又云小兒夢驚夢成魘者灸章門效千金驚癇條云未下有實而灸者氣逼前後不通殺人又云大動手足掣瘲者盡灸手足十指端又云病發身軟時醒者謂之癇也身強直反張如弓不時醒者謂之痙也又云兒有熱不欲哺乳臥不安又數驚此癇之初也服紫丸便愈不愈復與之聖濟云小兒急驚之狀身體壯熱痰涎壅滯四肢拘急筋脈牽掣項背強直目睛上視牙關緊急古人謂之陽癇又云小兒慢驚者癇病發於陰也其發則手足瘛瘲頭目搖動牙關噤緊神情如醉休作有時潮搐不定者謂之陰癇薛氏曰眠見睛者虛也眠不見睛者實也和田氏曰慢驚口噤為笑狀者凶入門諸驚門云重者牙關緊急搖頭竄視張口出舌角弓反張身體掣顫手足搐搦四肢踡攣局方謂之八候候癇法千金弄舌搖頭身熱小便難意氣下而妄想臥夢笑手足動搖臥惕惕驚手足振搖身熱目時直視身熱頭常汗出鼻口青時小驚小兒發逆上啼笑面暗色不變眼不明上視喜陽鼻口乾燥大小便不利此十一條候癇法之拔萃也千金有此一條則為癇之初也全文見本書按三因方云小兒發癇俗云驚風由是觀之癇雅語驚風俗稱也至宋醫俗共謂之驚風也外臺引肘後療卒得癇方釣藤甘草各等分煎服本草驚癇條云此方主小兒寒熱十二驚癇胎風預防驚風灸方並論驚風不治之症皆詳於本書疳癖茯苓飲加澤瀉黃連湯治小兒疳疾小便渾濁如米泔食易飢肚大青筋瘦弱者或枳實代甘草或兼鷓鶘菜丸或消黃丸每日宜餌食鰻鱺山蛤蟾蜍雞子之類小柴胡湯柴胡薑桂湯大柴胡湯此三方疳疾有熱者用之或因腹狀用之小建中湯腹痛者理中加茯苓湯下利不渴者豬苓湯下利有渴者紅礬丸方見黃胖疳疾好食生米土炭紙茶土器等者三四歲兒則每日服此丸五六分七日而有效不用煎湯而可也鷓鶘菜湯紫丸疳疾有蟲者用此湯兼用紫丸七寶丸疳眼遮睛者有用此丸症每日用五六粒灸章門有持云疳疾形氣未衰者宜灸章門其效勝於藥石播州有治疳名醫十之八九灸章門病因考疳疾門云治方灸自九至十四痞根章門用熊膽餌食山蛤鰻鱺治小兒疳積腹脹如鼓濟世蝦蟆去頭足皮腸止用本身四腿以白水入鹽酒蔥椒煮熟與吃以愈為度治疳勞祕方大觜烏霜鰻鱺霜各等分上二味為糊丸隨兒長少斟酌與之牛山曰疳疾多生脾胃實熱不宜補藥可用殺蟲劑白膜遮眼者鱔魚肉灸食效本莊氏疳眼生昏翳者用兔屎丸按本草兔屎主治云目中浮翳勞瘵五疳疳瘡痔瘻殺蟲解毒附方引普濟方云痘瘡入目生翳用兔屎日乾為末每服一錢茶下即安和田氏曰疳疾疳勞烏鴉霜為末白湯下大效又小兒腹有塊所謂癖疾者後世家用淨府湯無效濕漆丸有效按癖疾者小兒之積聚也錢氏云癖塊者僻於兩脅聖濟云僻在左右者癖也因此考之吾門所用柴胡消黃等也又素靈千金無疳疾病源稱傷飽哺露大腹丁奚者今之疳疾也至宋盛稱之錢氏曰凡小兒疳在內目腫腹脹瀉痢青白體漸瘦弱疳在外鼻下赤爛頻揉鼻耳或肢體生瘡玉案疳疾門云其症體常熱黃瘦小便如泔水噁心腹脹毛髮黏面色痿黃生白點肚有青筋頭上生瘡瘍大便瀉下之類也方輿載千金八神湯及錢氏白朮散育嬰丸紀聞云行遲語遲不因毒者六味丸有奇效胎黃之症兒生下遍體黃色如金醫通用茵陳劑醫林雲或衣被太暖所致也宜漸漸減綿厚衣被云云豫夏時嘗診赤子衣被太暖而發黃色豫叱之令減衣被黃色漸漸去痘瘡葛根湯桂枝加葛根湯麻黃湯大青龍湯初熱至出齊撰用此四方桂枝加黃耆反鼻湯伯州散順痘起脹至灌膿用此湯若起脹不十分者兼用伯州令餌食鹿肉等黃連解毒湯痘色過赤無豔有熱者用前方兼用此湯熱去痘潤澤則止此湯用前方又發斑者亦兼用此湯或用此湯兼用犀角黃耆當歸生薑人參湯山脅療痘無險惡症而難貫膿者黃耆當歸各二錢人參一錢生薑七分上四味以水二合煮取一合分溫二服或加附子又加鹿茸反鼻類犀角錢氏曰痘瘡稠密不拘大人小兒生犀乾澀器中新汲水磨膿汁冷飲服之又犀角主治時珍曰痘瘡稠密內熱黑陷或不結痂又頌曰角尖又勝生犀按痘瘡稠密三四歲者起脹至灌膿每日用犀角一錢十二三歲者日用二錢神驗大柴胡合調胃承氣湯治熱毒熾盛不能起脹惡熱心煩舌胎口乾不大便或渴或煩躁外則乾枯焦紫者按玉機微義如此症用涼膈散主治云痘瘡已出發熱作渴脈實悶亂便實者白虎湯主痘純紅臉赤而眼紅口氣熱唇口腫痛煩躁悶亂循衣摸床小便赤大便祕身如火發班譫語實熱等症並治口氣臭和田氏曰煩躁無渴者用黃連解毒湯此因毒攻心也桃核承氣湯治痘毒深劇醫所不能療南涯翁痘瘡熱毒熾盛乾枯焦紫將為黑陷者用此湯按痘瘡至用白虎承氣多難治也豬苓湯灌膿時下利者禹餘糧丸方家下利不止者熊膽治毒氣欲衝心者真武湯灰陷白陷下利者茯苓四逆湯煩躁者麥門冬湯竹葉石膏湯此二方治收靨時發渴者桂枝茯苓丸加大黃紅花湯治收靨時腹痛者是熱毒凝滯瘀血作痛也柴胡去半夏加栝蔞連翹湯治結痂後發熱或渴者若身熱壯盛大便祕結小便赤澀者兼用承氣丸或每日用犀角五分有效承氣丸紫丸初發熱出齊之間用之麻黃附子細辛湯治痘隱隱在皮里不透表無熱惡寒或痘一出而內陷如蚊迹或大便溏全陰狀者蓋此症百人中有一人耳針委中尺澤艮山翁曰熱毒熾盛將痘色為紫者灌浴方米泔八升入酒八合以病人坐盤中灌浴周身急被浴衣不須拭乾臥覆取微似汗毒邪從汗外發沒者復起黯者忽赤紀聞云此方治痘毒盛如發班蚊點難發者痘疔以針挑破出毒血諸痘隨即灌膿若挑破不痛不出血者難治紀聞云痘疔大小不一痛至甚者也色赤者輕紫黑色者重逆痘有此症本間氏曰痘疔發麵部者尤急可施治內服宜痘瘡主劑中多加犀角也痘癰及丹毒用水蛭大者五六枚放腫毒頭上吮去惡血可以消丹瘤癰腫紀聞云用針尤佳內服涼膈散若攻心者黃連解毒加消黃痘疔癰丹毒多不治者正宗痘癰門云大如桃李此多發在收靨之後身涼不渴者為吉痘瘡傷損者白蜜七分絲瓜水三分相和重湯溫之筆蘸塗日六七次方輿痘癢悶者塗蜜方輿痘起脹前後有紫黑惡痘二三顆交出者宜針痘上出血若多出者針委中尺澤內服涼膈散方輿蕃紅花湯治痘毒煩悶者蕃紅花二分上一味以水一合煮取五勺溫服此方有持之經驗也又云發脹之力反鼻勝乎鹿茸南陽亦云先輩云痘難收靨者後必雜症生焉痘後面黑者為佳如無痕迹者恐生他疾痘痛而手不可近者為吉候小言云或曰痘瘡灰白癢拓者用雞肉煎汁有效眼科錦囊云預防痘瘡入目上好熊膽調和淨水點眼目日兩次必無一失東郭南陽亦云痘毒迫咽藥食不得下者雄黃解毒丸有效有持按痘科鍵痰塞喉中者礬巴散吹喉中白礬巴豆也痘瘡看法治痘入目法並詳於本書方輿載外臺四物解肌湯順逆湯錢氏獨聖散涼膈散手捻散連翹去麻黃湯麻疹葛根湯麻黃湯大青龍湯小柴胡湯治寒熱似瘧者入門小承氣湯治便祕三四日者入門白虎湯黃連解毒湯壽世云麻疹已出譫語煩躁作渴者白虎湯合解毒湯瀉心湯加地芎歸膠艾湯此二湯或加犀角主諸失血醫通犀角地黃加荊芥四苓散豬苓湯白虎湯醫通曰泄瀉為麻疹之常候熱邪得以開泄也發熱時瀉小水短澀者四苓散加木通滑石入門云煩渴作瀉者白虎湯兼豬苓湯黃芩湯白頭翁湯乾薑黃芩黃連人參湯醫通云麻之作痢為熱邪內陷在正沒或沒後而痢下色白者黃芩湯下膿血者白頭翁湯瀉久而成痢者乾薑黃芩黃連人參湯桃花湯得效方云麻後痢桃花湯有效赤石脂和産形如蠟色粉紅或淡紫刀痕有光澤煎汁清澄無土臭者可用越婢加半夏湯治麻疹後咳嗽不止者方輿柴胡去半夏加栝蔞連翹湯大柴胡湯或加石膏犀角麻疹後餘毒有熱者宜撰用上之方入門云沒後餘熱內攻循衣摸床譫語神昏喪智者死按此症宜黃連解毒犀角白虎承氣等頻服之或十救一二矣麻疹者火熱之病也春秋之間患之者至輕矣盛暑之時患之者至重矣麻疹中或麻疹後患痢而多死矣是無他人身之火熱與天之火熱相搏故也麻疹候法詳於本書打撲金瘡破傷風瀉心湯治打撲損傷昏眩不醒及血出不止者金瘡亦用重者下九痛丸桃核承氣湯治打撲不傷瘀血凝滯腫痛者桂枝茯苓丸料加芎歸湯治打撲輕症此湯兼用承氣丸芫菁膏家方蜞針大打腰脊而瘀血凝滯而痛不能屈伸者急用桃核承氣湯攤芫菁膏於綿片大三四寸以貼患處日二次一二日而其痛如失能屈伸纍用纍驗後用蜞針或亂刺去惡血打撲輕者直用蜞針亦佳武羅牟都煎華岡治打撲損傷合歡花無花以木皮代之續斷樟腦上三味等分以火酒煮尉患處楊柏散同前治跌撲損傷方楊梅皮無名異小麥粉黃柏各等分上四味為散和醋或雞子白以敷患處茯苓杏仁甘草湯治有瘀血者其人喜忘不欲聞人聲胸中氣塞短氣方千金傷損門和田氏云此湯症打撲後發疑似癇症之症者也芎歸膠艾湯按千金傷損門大膠艾湯即此湯加乾薑一兩其主治云治男子傷絶或從高墜下傷五藏微者唾血及金瘡傷經者走馬湯治打撲劇症和田氏東郭先生醫談有治驗桂枝加朮附湯打撲經年月者此湯或兼梅肉散武田氏按千金打撲氣絶者與熱小便二升三因方亦用入門云內傷血入藏府熱者童便入酒少許服立效又云人中白末每五分酒服效又云血冷則凝不可飲冷水引血入心即死又危症簡便云皂莢末急吹入鼻如活生薑汁和香油灌之又急取百會穴艾灸三壯立蘇正宗云用消黃劑不醒者用獨參湯正體類要用參附湯和田氏曰打撲久不愈者曼陀羅花水煎服發狂而愈祕録云不問金瘡何處創口發疼痛脈浮數惡寒發熱頭痛大便祕小便少或嘔或渴或口舌乾燥或眩暈為常也若大脫血者創口失潤澤面色萎黃唇舌刮白妄言譫語面赤如狂脈沉微四肢微冷或喘或嘔吐不止或厄逆或寒戰或自汗出者皆凶候也又云金瘡內服輕重俱宜人參調榮湯大脫血虛候多者宜獨參湯人參湯疼痛不止寒熱久不止者宜逍遙散眩暈頭痛心下痞便祕者宜與苓桂朮甘湯瀉心湯合方也按人參調榮湯華岡氏所作方也八物湯加蓬萍根牛皮消者也人參湯即理中湯也又正宗金瘡門載獨參湯八珍湯二方外止血摻藥等也千金金瘡條云血出便以石灰厚傅裹之既止痛又速愈無石灰灰亦可用聖濟云五倍子龍骨血竭皆單行止血正宗飛血不止者傅金刀散松香枯礬生礬也病源云凡金瘡卒無汁者中風也腕折中風痙候云若風入瘡內犯經絡所致痙痙者脊背強直口噤不能言也聖濟云金瘡中風水者以封裹不密所致也三因方痙敘論云傷寒汗下過多與夫病瘡人及産後致斯病又本草痙風條云金瘡折傷癰疽産後俱有破傷風濕發痙之症按痙與破傷風為同病見前文可知破傷風之名始於千金傷損門紫湯即大豆紫湯主治云破傷風入四體角弓反張口噤不能言云云祕録云凡金創傷於利刀而發痙者至少打撲損傷或竹木刺類多發此症大豆紫湯千金方見中風門醫説云以此酒用荊芥末二錢能治痙紀聞云破傷風痙葛根承氣亦不應者也此方有效治因金瘡中風反強者雞屎白豆淋酒方聖濟雞屎白一合大豆六合上二味炒令大豆焦黑次入雞屎白同炒乘熱瀉於三升酒中密蓋良久濾去滓每服五合如人行五里更一服汗出佳未差即更作服之以汗出為度服後宜吃熱生薑稀粥聖濟又有治痙方雞屎白一味浸酒吞治金瘡中風必效酒方聖濟蒜肆破去心頂一升上一味以無灰酒四升煮蒜令極爛並滓每服取五合頓服之治傷折不能避慎令人中風發痙口噤若已覺中風頸項強直身中拘急者急先服此湯竹瀝飲方聖濟竹瀝三升上一味溫之分作五六服發口灌之武田氏祕録云痙破傷風桃核承氣湯兼用紫丸凡痙病破傷風之類急刺合谷一寸五分後髮際四分商隱白各三四分三里五分出血凡産後之痙病急先開子宮口灸百會膻中瘍科瑣言云創口乾涸則破傷風之徵也脈微欲絶舌強不語或有少振栗之狀攻心自汗出者必死之症也葛根加朮附湯兼用紫丸或續命湯或番紅花以童便服或如聖散水煎服屢效凡此症藥宜多服脈沉澀者多作痙也宜用心按破傷風痙尤難治也不可附子者宜以雞屎白豆淋酒多服回生散若不應者可用紫丸一錢方輿載獨參湯回生湯雞鳴散接骨木湯蟲獸湯元生丸家方風犬傷急可用此丸一分或二分酒下或砂糖湯下不知加至三分五分服後小便淋瀝或出血或下利是毒從二便去也見咬之初先餌以赤小豆蕎麥麻油川鱗海魚鳥獸及酒一切膏粱之類元生膏見咬之初急以此膏貼傷口日二次經十三四日日一次凡貼此膏二十日或三十日令口不合甚妙黃連解毒湯用元生丸一次或二次後用此湯二三日以解其毒後用葛根加大黃湯或解毒劑等蝦蟆膾肘後蟾蜍膾小品治狗咬傷瘍科瑣言云風犬傷者蟾蜍生內浸醋食以多為妙紫丸狗咬傷毒甚者用之南陽曰傷口報痊數十日惡風口渴睪丸內吊二溲閉結呼吸及迫者將發痙宜急理之與紫丸而取下又云刺尺沃委中小品方云若重發者生食蟾蜍膾絶良又云煩亂㖦已作犬聲者天靈蓋末水服方寸匕赤水玄珠云經久宿毒復發者多難救雄香散主之雄香散方雄黃五錢麝香二錢上二味為末作二服酒下家翁治犬咬傷葛根加大黃湯加馬錢子傷口貼元聖鼠咬傷葛根加大黃湯多加鼠尾草煎服兼用雄香散傷口貼元生膏如風犬傷法食貍肉或貓肉妙若發斑刺去惡血本草云雄黃主一切蟲獸傷若無鼠尾草以雄黃代之若無麝香以青黛代之亦可古今録驗有青黛雄黃等分水服方曰治諸毒蟲傷和田氏云鼠毒甚於犬毒犬毒至死者少鼠毒至死者多矣有成腫者有成勞狀者南陽亦云又云鼠毒馬錢子無效有持云一人鼠毒寒熱如瘧羸瘦如勞遍身洪腫垂死百治無效一醫用雄香散日日利水洪腫速愈豫治諸蟲獸傷屢效實無比神方也雄黃稱古渡者赤色明徹臭氣少者真雞冠雄黃也祕録云蝮蛇咬傷毒至甚見咬則腫見咬手則其毒乍至肩背足之毒乍及腰腹治法以細帶緊扎腫不至處針傷口五六次大出血其毒如油交血出血盡則但毒出尤不限傷口腫處皆針之大出血後雄黃末和中黃膏貼之用越婢加朮附湯腫消後宜五物解毒湯腫不消散者每日宜刺而出血若其毒至深腐敗者宜參考癰疽及脫疽治法施治蜂螫重症治法與蝮蛇咬傷同按醫學綱目療蛇咬用雄黃麝香白芷聖惠方蛇咬心頭熱躁眼前暗黑白礬甘草末等分水服一錢即止山脅氏原氏本間氏狗咬用白玉湯杏仁三錢桃根白皮二錢水煎服和田氏甘草解毒湯加馬錢子雄黃煎成內鐵醬少許溫服俱詳於本書方輿載甘草解毒湯通堅散雄香散湯火傷灸瘡漆瘡桂枝去芍藥加蜀漆龍骨牡蠣湯惡寒甚者用此柴胡龍骨牡蠣湯大熱者用此又灸後發熱者一滴膏家方治金瘡出血及湯火傷諸疼痛者乳香椰子油各一兩小麥二合麻油二合上四味先以小麥內麻油中煮之二時許小麥變黑色以浮遊為度漉過去麥內二味煬解以綿絮撮切者數片內膏中儲之三味蒸劑家方三黃丸按華岡氏謂湯火傷不可傅燥劑者確言也傅之火毒內攻也凡湯潑之及滿面者急去腐皮攤一滴膏於綿片貼之日二次若惡寒者與救逆湯至翌日有腐皮殘者則以蒸劑或湯蒸之去腐皮而貼膏若壯熱者與柴胡龍骨牡蠣湯凡湯火傷有腐皮殘者則後成瘢痕取盡腐皮則愈後面部復故無一點之痕屢試屢效若湯火傷經二三日腐皮急難去者日蒸而去腐皮後貼膏如此三四日以能取腐皮盡為妙若患人四五歲則宜不愈之間傍人看護不令搔面而可也又湯火燒手指者之治法詳於本書千金方云凡火燒損慎勿以冷水洗之火瘡得冷熱氣更深轉入骨壞人筋骨難瘥又云治火燒悶絶不識人以新尿冷飲之瘍醫大全云火傷宜用羌活一兩煎服俾火毒得汗外泄庶免內攻武田氏祕録云湯火傷內攻者石膏黃連甘草湯又火毒甚者用紫丸下之又遍身燒灼者急萊蔔汁或童便隨使用之後以好酒盛甕中令病人浸入其內則雖重不至死此法出於廣筆記及本草匯言龔氏曰一人夜間回祿煙燻致死者以蘿蔔搗汁灌之即蘇按灸瘡不早愈最效何則毒從此去故也若久爛而不愈者中黃膏加紅礬少許貼之即愈凡不問何瘡久爛不愈者貼之屢效又紅礬一味末傅嵌甲瘡妙也以鹽湯洗而後傅也治漆瘡蟹黃塗方聖濟生螃蟹上一味取黃塗傅瘡上日三五度按漆瘡輕者以生柳葉煎湯洗之又芒消浸湯洗之有效重者無如生蟹者不限黃擂碎全身塗之旦食之則無內攻之患漆瘡作癢談氏方用蜀椒煎湯洗之相感志云凡至漆所嚼川椒塗鼻上不生漆瘡本草蜀椒附方諸骨哽竹木刺療魚骨鯁在喉中衆法不能去外臺取飴糖丸如雞子黃大吞之不去又吞又方小嚼薤白令柔以繩系中央持繩一端吞薤到哽處引哽當隨出又方作竹篾刮令滑綿纏內咽中令至哽處可進退引之哽即出療食諸魚骨鯁久不出方本事上以皂角末少許吹鼻中得鯁出多祕此方治誤吞針方聖濟磁石一彈丸大上一味口含之即出誤吞針刺哽咽疼痛者用亂麻筋一團搓龍眼大以線穿系留線頭在外湯濕急吞下咽頃刻扯出其針頭必刺入麻中同出如不中節再吞再扯以出為度糍糕噎咽逡巡至死本朝經驗釅醋灌鼻孔中立噴出竹木刺硬深難出者用螻蛄搗爛塗刺上一時許其刺自然吐出取去之則愈矣華岡翁亦云按翁又云針折入肉者磁石末和膏貼之即效凡竹木刺硬深者可托專門瘍科祕録云骨哽先完咽米飯一塊則自脫者也若不脫者用吐方為良策吐則骨哽等亦從而出宜撰用雙礬水吐酒石雙礬水方礬石丹礬各五分水一合上三味混和頓服黴瘡葛根湯大黃牡丹皮湯六物解毒湯七寶丸紫丸黃連解毒加石膏湯朱硼散方見口舌門解毒劑香川梅肉散蜞針伯州散加味六物解毒物方見淋疾門元生膏丹霞條山脅治上部結毒頭痛癭瘻及咽喉腐爛方鉛一錢八分水銀二錢硃砂一錢沉香二錢人參五分上五味盛鉛土盞上火熔化內水銀柳著拌令相得傾注於紙上研至如泥入硃砂沉香人參末三味和調二十四分填貯紙管火燃吸煙晝夜二次化毒丸山脅療黴毒沉深兼理偏枯及一切痼毒腹痛等薰陸一錢大黃雞冠雄黃亂髮霜各三錢生生乳一錢上五味糊丸辰砂為衣每服一分日二夜一病重者日用至五六分下疳初起與葛根湯四五日後用六物解毒湯六七日熱解而用七寶丸凡六日至七日服紫丸瘡愈口中腐爛者用黃連解毒加石膏湯石榴皮煎汁加枯礬少許含漱日七八次朱硼散水解塗舌上腐爛愈後與解毒劑二十日許而止若陰莖皮腫者宜以針或蜞針日去惡血若痛劇臭氣甚者毒盛也可用梅肉散大抵七寶紫丸丸散方之分量半減而用之有效尿道內發下疳瘡香川氏謂之竅內下疳華岡氏謂之內疳瘡世所謂自黴毒來膿淋也難急治宜緩治之用加味六物解毒湯兼七寶丸日一分若陰莖腫者用蜞針或針去惡血又有用大黃牡丹湯祕録豬苓加大黃湯兼粉丸便毒消散則為結毒故難成膿者亦令強成膿為上策也宜與葛根湯兼用伯州散或負重任日強力足勞腳則起脹若尚不起脹者白芥子末酒和塗瘡上或貼元生膏則必成膿也膿潰則宜從腫瘍之治法後六物解毒湯兼用七寶丸日一分或二分若祕結者或用牡丹湯楊梅瘡初用葛根湯發之後用六物解毒湯熱解後用七寶丸痛劇者用梅肉散下之本間氏云有瘡口膿汁凝固作蓋漸成堆者是不貼膏故也又曰難愈者宜化毒丸丹霞條一貫云下疳下劑有效梅肉丸良疳瘡痛甚者可早用梅肉也梅毒初有時時寒熱盜汗等症宜先發表而後下之經日數則無若症脈見沉細者也方此時宜用五寶輕粉化毒等又有用輕粉而下血者多死者一家傳云梅毒久不愈頭有腫按之為凹而膿出面色青黃或頸項有瘰癧者餌食雞肉有效又為痿躄狀者入反鼻酒劑等良梅毒一切諸藥無效者鼴鼠霜酒服妙也又瘡毒推藥方胡桃七個為末傅鼻柱即鼻骨之毒忽移他豫傳之於或俗家也試之妙凡服輕粉後覺胸中如有飲或嘔者石膏有效武田氏祕録云結毒實狀而重者生生乳劑虛狀者餌食雞肉實狀而諸藥無效者宜薰藥凡毒結眼者非薰藥無效凡女子之結毒多兼瘀血見勞狀者也宜兼用濕漆丸五寶丹治上部結毒食不進者有大小柴胡症按吾門梅毒骨痛烏頭湯兼七寶丸元生膏貼結毒有效一男子咽喉結毒絶食五日以膏攤於綿片徑四寸以貼結喉上一夜而發水泡翌日食糜粥貼之六七日而能飲食數日而愈其他結毒於頭項手足等者貼之治數人屢效祕録云結毒治法宜先與桂枝加朮附湯而動毒後用輕粉化毒薰藥等身體疲勞者令餌食雞肉鰻鱺類按本間氏咽喉結毒用薰藥涼膈加石重者五寶丹手足結毒用解毒湯化毒丸頭顱結毒用薰藥防風通聖散梅癘用解毒湯翹玄湯薰藥陰囊結毒專斷截也凡結毒專外治者可托專門按凡病人每病患附子劑之症者希有焉其人患下疳等則宜與葛根加朮附湯等後與桂枝加朮附湯不用他藥而愈此症用輕粉丸則多死矣五郎兵衛街近江屋某三十五歲嘗患傷風或頭痛或腰痛或泄瀉等症每病非附子劑則不愈爾後患下疳豫與葛根加朮附湯家人疑豫非專門托外科治之與輕粉丸下利數行變症蜂起不日而死一男子二十歲患蠟燭瘡素陰莖長四寸腐蝕而為二寸半先考與桂枝加朮附湯二十日不用他藥而腐蝕止生龜頭而復故只陰莖短於平素一寸半方輿載四物解毒湯及萎蕤湯桔梗解毒湯葳靈仙湯耆歸湯再造散五寶散紫金丹凌冬飲連翹湯敗毒湯通聖散四順清涼飲逐毒散癰疽葛根湯癰疽初發惡寒發熱頭項強痛者宜發表之發背初起未成及諸熱腫以濕紙拓上先干處是頭著艾灸之不論壯數痛者灸至不痛不痛者灸至痛乃止其毒即散不散亦免內攻神方也李絳兵部手集若不堪熱痛者宜隔蒜灸先以濕紙覆上立候紙先干處為瘡頭記定然後用獨蒜去兩頭切中間三分厚安瘡頭上用艾炷於蒜上灸之每五炷換蒜再灸如瘡大有十數頭作一處生者以蒜搗爛攤患處鋪艾蒜敗再換桂枝加黃耆當歸湯伯州散將成膿則宜與此湯兼此散或合排膿湯大柴胡湯黃連解毒湯調胃承氣湯大黃牡丹湯至十四五日大便祕結口舌乾燥或生黑胎或嗜冷水及瓜果腹滿譫語者宜撰用此四方當歸芍藥散去澤瀉加參耆湯黃耆當歸生薑人參湯方見痘門耆歸建中湯排膿湯割截之後與耆歸桂枝合排膿湯兼用伯州散若膿稀薄則與歸芍散去澤瀉加參耆湯兼伯州餌食雞肉或耆歸薑參湯加鹿茸若腐肉難去只稀膿出穢氣薰蒸漸漸腐敗而深陷脈微弱身體羸瘦微惡寒者上加減歸芍散料加附子若腐肉已去膿將盡盜汗出者耆歸建中或加龍骨若消渴者麥門冬湯加五味子栝蔞根若四肢彎急者芍藥甘草附子湯等皆津液枯竭故也要訣云癰疽未潰之際增寒壯熱狂言妄語如見鬼神膿去已多而大熱不休者似為難治蓋毒之得膿猶傷寒表症之得汗汗已而反大熱則為壞傷寒矣又云出膿過多而羸瘦者芎歸湯方輿凌冬飲諸腫毒服之未成者內消已成者即潰其方忍冬黃耆各一錢五分當歸三分甘草一分上四味以水二合煮取一合加酒更煎數沸溫服有奇效云豫未試華岡氏曰癰愈後半年或一年之間不可食蕎麥麻油方輿載敗毒散及連翹湯涼膈散凌冬飲梓葉湯櫻皮湯疔瘡葛根湯越婢湯大青龍湯面疔初發急用水蛭三四十枚令吮血後宜撰用上之三方翌日亦施蜞針如前日大出血四五日則大勢已解者也黃連解毒湯加連翹犀角三黃湯加石膏表熱已去裡熱者撰用之大承氣湯裡熱甚舌上黑胎便祕腹滿煩悶將死者大小柴胡湯患處化膿後荏苒寒熱往來者加減當歸芍藥散料膿多出腐肉盡去熱漸退痛減者宜此湯本草引肘後方云疔腫垂死菊花一握搗汁一升入口即活此神驗方也冬月採根按試此方有神驗菊花實治疔聖藥也祕録云有紅絲疔者發於合谷及掌背指縫指節及跗上指縫指節初生一點之小瘡尖圓而如疥癬四畔微焮腫紅絲自瘡上起立走注也發於掌背者上攻至肱發於跗上者至膝惡寒發熱也治法針刺紅絲盡處出血則不上攻而自消也疔心亦針刺而出血此症無至死者紀聞云疔發於手足腹背者可治發於面者危矣發於人中及口吻者多死也痘疔針刺而貼破敵人衽內服柴胡去半夏加栝蔞連翹大黃湯或黃蓮解毒湯加犀角祕録按千金云凡療疔腫皆刺中心至痛又刺四邊十餘下令血出又本間氏曰疔瘡不施針刺刀截之法則多難救也實確言也青洲翁云患疔者可嚴禁沐浴素問曰膏粱之變足生大疔按癰疽癤毒亦然宜淡薄飲食而免此患瘰癧翹玄湯山脅家方治蛇盤瘰癧徑筋凝硬連翹一錢玄參木通各七分升麻羌活山梔各三分薰陸甘草各二分上八味煎服夏枯草煎華岡治瘰癧神方夏枯草新鮮者百二十錢鯽魚八十錢去腸胃及穢物貝母八錢銼以填鯽腹紅線縫合上三味先以醇酒二升漬夏枯草一日一夜煮取五合絞去滓入鯽魚更煮半日許如膏下火又去貝母但食鯽與汁三日而盡之若吐血而止服瘍科瑣言云真瘰癧未變色者用夏枯草煎二劑則消散也應者能食不應者嘔吐又云不可用斑蝥礬石等暝甚者且有翻花之憂又云瘰癧與乳岩同物也祕録云真瘰癧九死一生難治未成膿者翹玄湯兼用夏枯草煎此方尤有奇驗用二三劑則能消散也間亦有殘核至小而不全消者不治亦不為害用此二方而不消散者宜令成膿葛根朮附湯兼用伯州散馬刀癧生於頭核大橢圓而如馬刀宜柴胡加石湯夏枯草煎不消散者與葛根加反鼻湯此症易成膿不為難治黴癧化膿者易治不化膿者翹玄湯兼用丹霞條摩擦神水膏尚不消散者斷截如施便毒難化膿者之術斷截後貼破敵結核於頸及頷下似瘰癧者頗多眼病或咽喉病或服輕粉口中腐爛者或中兔毒者或痘瘡麻疹頭瘡久咳等皆成結核柴胡加石膏湯有神驗涼膈加石膏湯亦效凡瘰癧結核餌食海藻昆布裙帶菜芊棲菜崑崙菜等則有消散之效一男子下疳愈後左耳下生結核大如桃家君與葛根加大黃湯三十日而半消散六十日而全愈葛根加朮附湯伯州散葛根加反鼻湯柴胡加石膏湯葛根加大黃湯千金方云一切瘰癧以獨蒜截兩頭留心大作艾炷稱蒜大小貼癧子灸之勿令上破肉但取熱而已七壯日易蒜日日灸之取消止方輿輗云灸瘰癧上良瘰癧一因氣一因毒因氣者及其潰只黃汁出因毒者稠膿出大凡稠膿出者可治黃汁出者不治本草云夏枯草治瘰癧之聖藥然非大劑多服則不能奏效又云瘰癧潰爛土茯苓尤效治瘰癧潰爛方陸氏冷飯糰切片或為末水煎服或入粥內食之須多食為妙江西所出色白者良忌鐵器發物按景嶽全書土萆薢湯土茯苓一味也其主治云治楊梅瘡及瘰癧咽喉惡瘡癰漏潰爛筋骨拘攣疼痛皆妙治瘰癧方千金上用白殭蠶治下篩水服五分匕日三服十日瘥聖濟作一錢匕日再服又方千金貍頭一枚炙搗篩飲服方寸匕日二治瘰癧腫結內消方聖濟海藻一斤上一味用酒五升浸數日食後少少飲酒又方聖濟蝸牛殼不拘多少上一味搗為散每服二錢匕空心米飲調下日再至四十九日自消按聖濟有蝸牛丸蝸牛半碗雞蘇半斤也治五種瘰癧牡蠣散方聖濟牡蠣煅研連翹瓦上炒搗各一兩上二味為散每服一錢匕臨臥酒調下治瘰癧內消方聖濟小麥淘淨上一味煮三五升頻吃即愈按本草癭瘤門云消癭小麥醋浸同海藻末酒服治瘰癧結聚不散鞕如石聖濟大蒜三錢搗爛麝香研半錢匕上二味和勻傅於帛上貼之一日二易旋搗最好治鼠瘻方聖濟蜣螂燒存性細研用醋調如糊先以鹽湯洗瘡塗傅日再易南星膏醫林治皮膚頭面生瘤或軟或硬不通生南星大者一枚研如膏無生者乾者為末上醋調如膏先將小針刺令氣透以膏攤紙上如瘤大小貼覺癢則頻易貼本草云鯽魚生搗塗惡核腫毒不散及瘑瘡肘後云芥子末和醋塗瘰癧青膏五爪龍細銼以麻油一升煮之令黑色布濾去渣內蜜蠟八十錢再煮以盛陶器安水中少時乃成膏如不成則更加蜜蠟適宜再煮之可也一切瘰癧貼之速消散也又貼乳腫痛妙也松岡玄達翁之試效也云妙靈散朱氏集驗治瘰癧滑石上為細末每服二錢單方同治瘰癧破與未破及膿血淋漓其效如神牡蠣煅八兩甘草二兩上二味勻拌每服二錢病因考云獨顆者為結核續連者為瘰癧此症宜餌食肉物和氣血能成稠膿而愈不然則不成膿只黃汁出難治浴溫泉且多灸肩井膏肓身柱曲池等説約瘰癧門家方順氣劑擇加果苓薏貝桔或排毒劑解毒劑食療果羸餅灸溫泉漫遊雜記瘰癧服瀉心湯兼服再造散又絲瓜黑燒酒服一錢日三灸法與病因考同方輿云真瘰癧自氣鬱滯生又云瘰癧自胎毒來者土萆薢湯兼用玄龜丹又兼服再造散初起未甚者用忍冬花蒲公英各四五錢以水二碗煎朝夕代茶飲之多飲有效和田氏云瘰癧雞肉多食良灸法與病因考同外有肩顒肘髎膝眼按後世之方書瘰癧門載十六味流氣飲豫弱冠時一女子患瘰癧用流氣飲百餘日無寸效遂疲勞而死華岡氏云真瘰癧與乳岩同物也豫意初與夏枯草煎若不應則宜翹玄湯兼服七寶丸日一二分許然非久服之則無效三因方瘰癧門必勝丸方中有輕粉鯽魚白花蛇散方內有膩粉又蘭書以水銀為解凝劑瘰癧用之若病人壯實則薰藥亦定有效可試也治疣方川穀甘草少上水煎多服而妙也方輿載夏枯草湯瞿麥湯小柴胡湯逍遙散土萆薢湯桔梗解毒湯再造散逐毒散伯州散疥癬臁瘡葛根加反鼻湯或加大黃桂枝加黃耆反鼻湯濕疥重者發表後用此六物解毒湯疥瘡出膿久不已者土茯苓上品多用有效有持萆麻子散元聖膏蜞針按疥瘡初發香川氏用排毒劑和田氏用浮萍散本間氏用五物解毒湯即四物解毒加荊芥湯也病因考疥癬門云治方土茯苓劑食雞肉及鼠肉則能發早愈禁外傅藥和田氏云疥瘡初發用發表之藥七八日後用解毒劑瘍科瑣言云疥瘡初發宜發表多食鼠肉狐肉即能發也行余醫言疥瘡門云若用外敷藥愈之或浴冷泉取速效者甚則直成暴水脹而死證治要訣云瘡癬疥此雖皮膚小疾不足為害然瘡有惡瘡癬有頑癬疥癆噆膚尤為煩擾甚至經年纍月不能脫灑凡病此者不當專用外傅藥須內宣其毒可也按濕疥重者初起與葛根加反鼻湯半月或一月許時時食雞肉鹿肉等十分發而後與桂枝加黃耆反鼻湯二三月或四五月膿盡欲愈時以萆麻子散擦遍身只當避頭面及頸腋下肘膝手掌足心陰處肛門邊凡七日休息一二日而入浴桶與六物解毒湯半月許而止是治濕疥之正法也如此則非止愈疥瘡從來之宿疾脫然而去香川氏謂外瘡之發出者最是喜事亦宜哉正宗云夫疥者微芒之疾也發之令人搔手不間實煩擾之病也思早愈之而勿用七寶梅肉等內攻而為暴水腫多至死者慎哉慎哉疥瘡初起有可附子者宜葛根加朮附湯凡濕疥出膿時盜汗出故用桂枝加黃耆反鼻湯又幹疥雖輕者遠浴五六月而後可擦萆麻子散決無內攻之患或與葛根加荊芥湯又疥瘡漸瘥手足處處結聚而出膿者宜貼元聖膏於瘡上或施蜞針妙也頑癬初起未蔓延時貼元聖膏於瘡上後施蜞針或亂刺去惡血內服葛根加大黃湯臁瘡者施蜞針又貼元聖膏或亂刺而出血內服葛根加大黃湯按香川氏謂疥癬臁瘡及腎囊風禁外敷速愈藥並溫泉者確言也豫往往見犯此禁而死者可慎方輿載浮萍散及苦參一味湯四順湯再造散治臁瘡楊梅皮湯堀留和泉屋清助妻年五十頭上悉生小瘡膿汁凝固成痂不得梳者一年醫二三輩療之不愈請豫豫與葛根加大黃湯以剪刀除去百會穴處膿汁凝固成痂者徑三寸貼元生膏日取毒水六七日糜爛處施蜞針十餘枚去惡血復施元生蜞針如前三次則膿汁盡落痂一月而全愈此症元生之功大痔脫肛當歸芍藥散加人參地黃湯芎歸膠艾加三七湯瀉心湯斷截痔漏腸痔則宜用加味歸芍散料若出血過多則用膠艾加三七湯三七廣東人參也桂枝茯苓丸料合瀉心湯桂茯丸料合黃連解毒湯腸痔脫肛痔與桂茯瀉心合方又內痔不宜大黃劑者與桂茯解毒合方脫肛痔陽症大腫而疼痛者用桂茯瀉心合方腫上施蜞針而出血屢試屢效本事方續集論脫肛痔桃花湯傷寒論脫肛痔陰症無疼痛焮腫之患平生只有便信屢如廁裡急後重而大便不通唯脫肛脫肛則便信暫止歸則復如廁一日數行漸漸脫肛長大後每度下血面色萎黃宜此湯或云柴胡去半夏加耆歸升麻赤石脂湯神驗芎歸膠艾湯黃連解毒湯紅礬丸家方脈痔者無痛下血一次一二合或三四合俗稱波志利痔宜撰用此二湯虛里動高者兼用紅礬丸又有世俗稱切痔及裂痔者此亦大便交點血者也酒客多此症大便則痛甚肛門破裂也不宜大黃劑宜桂茯解毒合方或歸芍散解毒合方且灸長強每日一百壯大黃牡丹皮湯內痔無腸內破裂但痛甚者催痔漏之兆也宜與此湯雄黃薰金匱苦參湯金匱患痔人肛門生蟲謂之蟲痔宜撰用此二方苦參湯金匱不載方金鑑載之苦參一升以水一斗煎取七升去滓熏洗日三六物解毒湯七寶丸黴痔用此二方看法詳於本書蜞針脫肛痔及牡痔施之有效豫素有牡痔發則以水蛭八九枚令咂患處不愈則次日亦施之即愈辰砂膏家方治一切痔痛椰子油辰砂上二味冬時直合和攤於綿片貼之夏時加黃蠟適宜內痔入此膏於肛門內治痔方千金以蒲黃水服方寸匕日三外臺云治痔疾每大便常有血者治五痔小香連丸方聖濟黃連麩炒焦黃色上一味為末以雞子清和丸梧子大每服十五丸溫酒下十服取效治血痔地榆散聖濟地榆銼上一味搗羅為散每服二錢匕飯飲調下日三服和田氏云一切痔疾除脫肛皆金鈴散有效兼用於解毒劑等可也金鈴散牽牛子一味也病因考云今之下血者多痔也內痔痛甚者後為漏也又云脫肛痔中之一症也痔不下血者灸腰眼八髎脫肛者宜餌食大牢及兔雞卵説約痔漏脫肛門家方解毒劑馬膏或熊膽豬脂之類點之肛脫者塗之以綿推入食療鱉肉牛肉雞肉雞卵灸溫泉兔肉治痔方千金塗熊膽取瘥止神良一切方皆不及此鮒魚泥治痔痛鮒魚去鱗腸為泥塗痛處治痔痛蝸牛四五十頭以麻油煮以為膏為度沼氏蝸牛霜傅之蟲痔坐藥胡粉水銀各等分調和綿裹夜臥入穀道中肛門癢不可忍殆似蟲痔者半夏末和薑汁先洗肛門後塗之即愈上四方武田氏祕録治痔疾下部發腫痛不能行者聖濟半夏研令極細入龍腦少許同研用津唾調攤軟紙上貼之良久有水出漸消矣久冷五痔便灸脊中百壯五痔便血失屎灸回氣百壯穴在脊窮骨上千金南陽云痔疾下血及久下血用人參湯加茯苓得大效正宗痔漏下血用加味四君子湯醫説腸澼用人參散取奇效皆同意也又云痔灸長強八髎治脫肛一醫祕方傷寒論桃花湯赤石脂禹餘糧湯二方合和糊丸服赤石脂醋製此方小兒最有效又方直指方慈石半兩火煅醋淬七次為末每服一錢又方千金以鱉頭炙研米飲服方寸匕日二服治脫肛歷年不愈千金鱉頭一枚燒令煙絶治作屑以傅肛門上進以手按之有持云鱉頭內服外傅皆妙又方千金蒲黃二兩以豬脂和傅肛上內之二三度即愈脫肛藥餌方雞一頭去羽腸以牛黃六分黑豆三合入腹內縫以香酒三升煮之以摘鑷拔出骨為度七日食一小兒三歲痢後脫肛四寸動則肛觸衣而痛日夜號泣里醫療之不愈經半年豫以陳壁土五倍子煎汁洗之傅五倍子末與柴胡去半夏加耆歸升麻赤石脂湯七日而半收十五日而全愈灸法千金病寒冷脫肛出灸臍中隨年壯脫肛歷年不愈灸橫骨百壯又灸龜尾百壯龜尾即後窮骨是也方輿載四物解毒湯凌冬飲排膿散單牽牛散再造散輕粉丸卒死備急丸走馬湯還魂湯金匱救卒死客忤死麻黃四兩桂枝二兩甘草一兩杏仁七十個上四味以水八升煮取三升去滓分令咽之通治諸感忤千金方云主卒忤鬼擊飛尸諸奄忽氣絶無復覺或已無脈口禁不開去齒下湯湯入口不下者分病人發左右足踏肩引之藥下復增取一升須臾立蘇按還魂湯千金方及翼外臺有桂枝二兩肘後千金翼皆用麻黃四兩今從之金鑑云便閉裡實者用備急丸無汗表實者用還魂湯豫意麻黃分量多而加桂枝者徹表有力故用之或曰然則稱麻黃湯可也豫答曰麻黃湯麻黃三兩此湯麻黃四兩所以有還魂之名也救卒死方金匱吹皂莢末鼻中又方金匱灸心下一寸臍上三寸臍下四寸各一百壯差又方肘後灸臍中百壯又方令人痛爪其人之人中取醒千金翼卒死門治卒忤方灸人中三十壯又灸肩井百壯療卒死而口噤不開者外臺縛兩手大拇指灸兩白肉中二十壯驚怖卒死本草溫酒灌之即醒入浴暈倒本朝經驗以冷水噀面及澆周身苦酒一升灌口鼻中療入井冢悶冒方本朝經驗急解患人衣偃臥濕地上以醋噀其面蓋以草荐半時許即蘇沼氏云生薑一兩酒煎頓服按偶欲入舊井及土室土窖則當試下燈火於其中其火乍滅則忽急入焉入則忽中惡氣而死縱不死必病矣宜灌醋二三升於其中飲食酒飯而後徐徐入焉療五絶方千金夫五絶者一曰自縊二曰牆壁壓迮三曰溺水四曰魘寐五曰産乳絶皆取半夏一兩細下篩吹一大豆許內鼻中即活心下溫者一日亦可活案本草綱目以縊死溺死壓死凍死驚死為五絶亦主此方救自縊死法在金匱略之又方千金皂莢細辛末吹兩鼻中又方千金凡救自縊死者極須按定其心勿截繩手抱起徐徐解之心下尚溫者以氍毹覆口鼻兩人吹其兩耳又方千金強臥以物塞兩耳竹筒內口中使兩人痛吹之塞口傍無令氣得出半日死人即噫噫即勿吹也又方千金藍青汁灌之原體集施金匱之法灸湧泉瘍醫大全云必須心口尚溫大便未下舌未伸出者救治沼氏云肛門出糞者難治或云縊死人中溫而肉柔軟者施拳家之活法則蘇若人中肉堅硬者不治救壓死法三因以死人安著將手袖掩其口鼻眼上一食頃活眼開與熱小便若初覺氣絶而不能言可急劈口開以熱小便灌之打撲者亦用此按奇效單方云心頭溫者急扶起將手提其發用半夏末吹入鼻內少蘇以薑汁同香油打勻灌之救溺死法千金屈兩腳著生人兩肩上死人背向生人背即負持走行吐出水便活又方千金解死人衣灸臍中凡落水經一宿猶可活或云蘇後灸臍中二三百壯水死人忌烈火寒氣內攻而至死方輿云或曰溺死肛門未翻者以釅醋灌之吐水而愈一貫云溺死令服酢五六合至一升又云溺死腹著背者肛門翻者足小指不動者不治按千金落水死條云酢灌鼻又本朝經驗用熱醋一碗奇效原體集云水溺之人夏月可救冬天難救冬天醒後宜少飲溫酒夏天蘇醒後宜少飲粥湯又五絶療法云溺死若五孔有血者不活有持云溺死宜按揉其腹令吐水救魘死法肘後臥忽不寤勿以火照之殺人但痛齧其腳踵及足拇指甲際而多唾其面則覺也又皂莢末吹兩鼻又以蘆管吹兩耳又方千金翼灸兩足大指聚毛中二十一壯救凍死法本草冬月凍死略有氣者炒灶灰包尉心上冷即換待氣回少與酒粥不可近火即死灸神闕氣海關元十五壯肘後方云凡卒死中惡及尸蹶皆天地及人身自然陰陽之氣忽有乖離否隔上下不通偏竭所致故雖涉死境猶可治而生緣氣未都竭也甲乙經曰尸蹶者死不知人脈動如故癩大承氣湯大黃牡丹皮湯七寶丸瓜蒂散紫丸蜞針元生膏針神祕丸龜井氏治天刑病大楓子五十錢荊芥大黃蘗皮櫻皮燒存性各三錢苦辛爐甘石各五錢壺蘆燒存性一錢五分上八味細末糊丸梧子大每服一錢白湯送下日三服之十日其夜臨臥酒服芎黃散一錢至十一日早天服紫丸強人五分羸者二分白湯送下輕者一劑劇者二三劑得愈禁酒生冷魚鳥房事松香散松葉散千金方惡疾門云有諸處不異好人而四肢腹背有頑處又云有直置頑鈍不知痛癢者按後世所謂死肌也此病口眼喎斜者疑似於中風發惡瘡者疑似於黴瘡脫疽等雖然余病者無死肌此病必有死肌試刺針五分或一寸更不覺痛也癩病初發難決者宜先試刺針有死肌否而決嫌疑也張會卿曰癘瘍砭刺之法子和張先生謂一汗抵千針蓋以砭血不如發汗之周遍也然發汗即出血出血即發汗二者一律又曰若惡血凝滯在肌表經絡者宜刺宜汗若惡毒蘊結於臟腑非蕩滌其內則不能痊若毒在外非砭刺遍身患所及兩臂腿腕兩手足指縫出血其毒必不能散全書草四本草綱目水萍條發明頌曰治惡疾癘瘡遍身者濃煮汁浴半日多效此方甚奇古也方輿輗云此方癘疾陽症者試之三五日而有奇效入浮萍一斤於尋常浴桶中濃煮而浴之日三四度則不溫覆而汗自出內服浮萍散又云在陽者禁酒肉斷房事盡其治則可全愈但陰症合谷肉脫者決不治也祕録云素問並諸方書論癘之病因而云受不正之風而發豫意不然不慎飲食縱食禽獸諸肉及叔鮪𩶾𩸫魚鰮等自然生敗血作諸瘡瘍之病因也其中敗血凝滯劇者遂作癘風也雖自發者起於此因然傳父母之血脈而患者尤多千金方云余以貞觀年中將一病士入山教服松脂欲至百日鬚眉皆生由此觀之惟須求之於己不可一仰醫藥者也又云一遇斯疾即須斷鹽常進松脂一切公私物務釋然皆棄猶如脫屣凡百口味特須斷除漸漸斷谷不交俗事絶乎慶弔幽隱岩谷周年乃瘥瘥後終身慎房事犯之還發又云神仙傳有數十人皆因惡疾而致仙道何者皆由割棄塵纍懷穎陽之風所以非止瘥病乃因禍而取福也治惡疾方千金煉松脂投冷水中二十遍蜜丸服二丸遇飢即服之日三鼻柱斷離者二百日服之瘥斷鹽及雜食房室仙人治癩病神驗方千金翼取松葉不問多少煮三五遍令苦吐盡暴乾搗末如面先食服二方寸匕日三漸增之或可至四兩隨人多少至一斤飢即服之能愈萬病又益壽延年殺三蟲食人五藏動發若病難忍四肢重不仁婦人産後余疾月水往來不得續男女少者藥悉主之本草有服食辟穀方其文云千金方用松脂十斤以桑薪灰汁一石煮五七沸漉出冷水中旋覆煮之凡十遍乃白細研為散每服一二錢粥飲調下日三服服至十兩以上不飢飢再服之一年以後夜視目明久服延年益壽按凡治癩四月至八月為佳時輕者用神祕及芎黃紫丸如法施蜞針或鈹針於赤斑及瘀血處取血三日一次如此二月許而愈後久服松葉散等益佳尤禁酒肉房事全愈後亦三年禁之是治陽症輕者之法也稍重者多不得全愈者縱偶得全愈非終身禁酒肉房事則病必再發而不得為久完人須決意為木食也為木食則病必不再發矣我邦自古儒佛之道並行修行而效浮屠氏之徒則世人信仰之如鬼神孫氏所謂因禍而取福者也方輿載浮萍加大黃湯通聖湯再造散逍遙湯附録家方養正丹和劑水銀硫黃研細硃砂研細黑錫去滓淨與水銀結砂子各一兩上用黑盞一隻火上熔黑錫成汁次下水銀以柳杖子攪勻次下硃砂攪令不見星子放下少時方入硫黃末急攪成汁和勻如焰以醋灑之候冷取出研細糯米粉煮糊丸如緑豆大每服二十丸加至三十丸食前鹽湯棗湯任下靈砂丹同水銀一斤硫黃四兩上二味新銚內炒成砂子入水火鼎煅煉為末糯米糊丸如麻子大每服三丸空心棗湯米飲井花水人參湯任下量病輕重增至五七丸忌豬羊血緑豆粉冷滑之物治嘔吐軟紅丸方聖濟丹砂研砒霜研各半錢胭脂一錢巴豆七粒取霜上四味研細熔蠟少許入油三兩滴和藥為劑以油單裹之大人旋丸如緑豆大小兒如芥子濃煎槐花甘草湯放溫下一丸勿熱食半時久通經丸本事方治經閉桂枝青皮大黃山椒莪朮乾薑川烏頭當歸乾漆桃仁各等分上十味為末老米糊和醋丸梧子大每服二十丸空心溫酒服解毒劑療黴瘡便毒下疳結毒發漏筋骨疼痛諸壞症及癬臁瘡諸惡瘡膿淋茯通草忍冬大芎大黃中甘草少上水二合煮取一合內土茯五錢則水四合煮取二合加減法土茯朴樕萍蓬根牽牛子升麻枳實隨症出入弱人或泄瀉家方中將代枳大便祕結或骨痛甚者須用將咽喉痛加桔膿淋或有水氣者加芣苡有水銀輕粉毒用土茯苓最可也敗毒劑治痛痹風毒瘟疫類一切眼疾咽喉痛瘡腫疥癬茯獨活大桔芎中枳柴小或代升甘小生薑五分上水二合煮取一合加減法痛痹防風通草忍冬桂附子隨症出入足痛加牛膝骨節痛甚加將咽喉痛桔為主眼疾血多加梔蘗菊類痛甚加將羔風眼加倍升結毒眼加將狗咬寬中丸青黛百草霜各三錢檳榔木鱉番木鱉黑牽牛杏仁芩連大黃雄黃鐵粉各一錢巴豆四十粒上為末糊丸大人三十丸小兒十丸白湯下合十三味元生丸家方主治經閉天刑淋疾水腫風犬傷瘰癧馬刀不問新久或已潰成漏深久不瘥或癰疔便毒一切頑瘡風濕流注腳膝引痛頭面發塊或生瘡或中風手足不仁婦人帶下赤白或陰處糜爛等症芫菁桂茯芍桃仁牡丹大黃各五分甘草二分上八味糊丸每服一分砂糖湯送下救喘丸同治喘咳倚息不得臥者淡豆豉十錢蒸搗如泥枯白礬三錢礜石一錢上三味丸緑豆大冷水或沙糖湯送下七丸甚者加至十餘丸忌食熱物等若服後腹滿者用瀉心大柴胡之類下之或礜石代砒霜砒霜則夜間露七夜收研細苓消丸同消石十錢茯苓四錢上為末糊丸梧子大每服三五十丸以木防己去石膏加茯苓煎湯下患水腫病人嫌消石之苦烈者用之佳近來此丸代單霸王鹽丸有神驗名桓文丸元生膏同馬知利膏十錢芫青末新者二錢制鐵粉法鐵粉一升鹽八勺以鐵粉入器中合鹽攪日曝乾以匕攪日五六次三四日而入土器以炭火熬之二時余以變紫色為度制鐵鏽亦佳方輿所載後世方六物敗毒散一間齋羌桔芎甘升麻大黃上以水二合煮取一合方輿煮法如此下皆仿之連翹湯治傷寒熱毒變作赤色癰疽丹疹腫毒及眼赤痛生障翳悉主之自小品漏蘆連翹湯來翹芩芎甘麻黃升麻各四分枳實大黃各六分上八味熱盛者加芒硝牛蒡芩連湯見方匯香需飲同生脈散同消暑湯治中暑嘔而煩渴者即小半夏加茯苓加石膏甘草良薑吳茱萸湯治大吐大瀉後轉筋甚者吳茱木瓜食鹽三味等分同炒焦煎服柴胡鱉甲湯方見癥瘕肘後療諸瘧方鱉甲三兩炙上一味搗末酒服方寸匕至發時令服三服兼用灸無不斷者一方談野翁試驗方常山檳榔甘各三錢黑豆百粒上四味水煎服河間芍藥湯方匯本方芍藥湯也參連湯丹溪嘔吐全不食者謂之噤口胃火甚也用此方濃煎終日細細呷之如吐再服但一呷咽即開蘗皮湯外臺療熱病久下利膿血方黃蘗三兩梔子二十枚黃連四兩阿膠二兩上四味千金駐車丸治大冷洞利腸滑下赤白如魚腦日夜無節度腹痛不可堪忍者如神丸木香黃連阿片各二錢乳香沒藥各一錢沉香五分上六味為末糊丸緑豆大辰砂為衣每服一丸冷水送下日三無憂散子和黃耆木通陳皮桑白皮各一錢胡椒術木香各半錢牽牛頭末四錢上八味為末每服一錢以生薑自然汁調下治疝及留飲帶下紀聞當歸湯外臺療三十年下利止諸痛方當歸一兩生薑八兩大棗二十枚上三味以水四升煮取一升半分作三服不差後作之錢氏白朮散見方匯紫散下利後重不下膿血者檳榔厚朴各三十錢桔梗水莎葛根各二十錢枳實桂蓬朮各十錢上八味末用煎服亦得楊起簡便方云肚腹微微作痛罷即瀉瀉亦不多日夜數行者用蕎麥麵一味作飯連食三四次即愈疝瀉久不止者效泄瀉經驗方景嶽糯米一升洗干炒末入山藥一兩每日用半盞入砂糖二匙川椒末少許以極滾湯調食久泄食不進者效調中湯局方治産後久泄紀聞甘歸桂芍芎附子良薑上七味枳實大黃湯即小承氣湯加檳榔甘草平胃散見方匯桂枝藿香湯桂藿木香宿砂吳茱莪朮甘七味養脾湯理中湯加茯苓宿砂麥芽薑棗平生虛弱之人飲食易傷用之紀聞千金吳茱萸湯傷寒論吳茱萸湯加半夏桂枝甘草安廩湯一帆青茯苓各二錢上二味水煎溫服四五日下利為知療胃反大驗方前胡生薑各四兩阿膠一兩大麻子仁吳茱各五合桂三寸甘五寸棗十枚上八味以酒二升水三升煮取一升七合分再服破棺湯治膈噎桃仁杏仁桑白上三味水煎溫服一方治嘔吐水莎良薑木香烏梅乾薑丁香六味獨參湯治反胃嘔吐喘促粥湯入胃即吐張介賓單香薷湯肘後郁李仁湯治心腹滿大小便不通氣急喘息者腳氣腫滿發此證亦效郁李仁杏仁橘皮茯檳桑白六味紫蘇子湯面腫氣急者見腳氣濟生腎氣丸八味丸加車前子牛膝麻子湯治遍身流腫千金方麻子五升赤小豆三升商陸一升防風三兩附子一兩上五味先搗麻子令熟以水三斗煮麻子取一斗三升去渣內藥及豆煮取四升去渣食豆飲汁麻子小豆湯服桃花已渴者大麻子一合熬令黃香搗研以水搦取汁一合赤小豆一合以水二合煮取一合上二汁相和上火三五沸服之此千金療水氣遍身洪腫百藥不愈待死者方連翹湯方見瘟治瘡疥內攻腫赤小豆湯山脅赤豆五錢商陸生薑各一錢麻黃七分連翹五分桂二分大黃三分上七味以水三合先煮小豆減一合內諸藥煮取一合日二劑或三劑加犀角或反鼻亦佳防己散治妊孕腫滿喘促小便不利防己一錢桑白茯紫蘇各二錢木香五錢薑煎服琥珀湯治産後水腫琥珀術茯桂豬澤反鼻上七味以水一合冬瓜汁一合合煮取一合瓜子仁湯方見腸癰實脾飲見方匯赤小豆藥本草赤小豆五合一錢大蒜一顆七分生薑五錢一錢五分商陸根一條一錢五分上並碎破同水煮爛去藥空心食豆旋旋啜汁令盡腫立消二神丸治水腫鼓脹及腳氣甘遂擇新近者大黃各等分上二味為末糊丸桐子大每服五分或一錢溫水送下瓜子仁湯主治見鼓脹分消湯見方匯壯原湯同半夏湯外臺主腹內左肋痃癖硬急氣滿不能食胸背痛者夏桔枳實前胡吳茱鱉甲各三分檳榔二錢五分生薑四分人參一分九味牡蠣奔豚湯小品療奔豚氣從少腹起撞胸手足逆冷李根一錢六分桂八分牡蠣甘各三分上四味瀉脾湯千金主脾藏病氣實胸中滿不能食茯朴各七分半夏桂生薑各九分芩甘各四分人參三分八味常用加龍骨牡蠣或加石膏療腹中痃氣連心以來相引痛緊急方外臺術枳實各三兩柴胡四兩鱉甲二兩上四味寬中湯芍一錢二分桂生薑各六分朴甘棗枳實各四分七味當歸大黃湯外臺歸芍桂乾薑茱萸參甘大黃上八味疝痛從肋骨邊至背及肩者效桂心湯集驗療寒疝氣來往衝心腹痛桂四兩生薑三兩吳茱二兩上三味切以酒一大升煎至三合去滓分溫三服蜀椒湯小品主寒疝氣心痛如刺繞臍腹中盡痛自汗出欲絶蜀椒二百枚附子一枚炮粳米半升乾薑半兩半夏十二枚大棗二十枚甘草一兩上七味以水七升煮取三升澄清熱服一升烏梅丸奧村治蛔厥烏梅三十個椒四錢乾薑十錢黃連十六錢附子三錢上五味為末蜜丸檳榔鶴蝨散療諸蟲心腹痛外臺歸芍桔橘桂參檳榔鶴蝨上八味椒梅湯諸蟲作痛口中清涎流出湯飲不進危在旦夕者烏梅蜀椒生薑煎服將軍湯治精神不守言語錯亂妄見妄言少臥少飢狂走不常者大黃一味水煎無時服之參連湯治諸氣疾衝心直視煩悶或吐血不止者參連各五分或一錢上二味水煎加熊膽汁名熊參湯風引湯除熱癰癇大黃乾薑龍骨各四兩桂三兩甘牡蠣各二兩寒水石滑石赤石脂白石脂紫石英石膏各六兩上十二味杵粗篩以韋囊盛之取三指撮井花水三升煮三沸溫服一升治大人風引少小驚癇瘛瘲日數十發醫所不療除熱方巢氏云腳氣宜風引湯防己地黃湯治病如狂狀妄行獨語不休無寒熱其脈浮防己一錢桂枝防風各三錢甘草二錢上四味以酒一杯浸之一宿絞取汁生地黃二斤㕮咀蒸之如斗米飯久以銅器盛其汁更絞地黃汁和分再服酸棗湯千金治虛勞煩擾奔氣在胸中不得眠酸棗五升參桂生薑各二兩石膏四兩茯知母各三兩甘一兩半歸脾湯治健忘怔忡驚悸不寐者見方匯流水丸見勞病久病不寐者效單苦參丸發狂用將軍瀉心類大勢解而後用此調中湯古今録驗療虛勞補益氣力方麥門茯甘桂歸芍各五分棗一錢七味柴苓枳朮湯外臺療痃癖氣壯熱兼咳久為骨蒸驗方柴八分茯術枳實炙各六分積熱不歇即加芒硝取利逍遙散見方匯五蒸湯古今録驗石膏一錢竹葉八分茯地葛根各六分參芩知母各四分粳米二分半甘二分上十味竹葉飲療骨蒸唇乾口燥欲得飲水止渴方竹葉一握麥門夏各一升大棗二十枚甘生薑各三兩粳米五合七味流水湯小品主虛煩不得眠方夏二分米一錢二分茯四分或加生薑四分地黃煎丸方見後虛勞羸瘦腹滿不能飲食內有乾血肌膚甲錯兩目黯黑者甲子丸治勞嗽方五味地骨皮各二兩鱉甲三兩上三味為末煉蜜丸如桐子大空心溫酒或鹽湯任意服三五十丸大武丸治證同前下利者尤佳干牛肉朝鮮産薯蕷蓮肉茯苓小茴香各十五錢上五味為末棗肉搗膏入好酒和丸梧子大曬乾空心酒下獺肝丸治勞瘵方獺肝炙乾為末糊丸桐子大白湯送下四順散陳實功治肺癰吐膿五心煩熱壅悶咳嗽氣急不能安貝母紫苑桔各八分甘杏仁各四分為湯或為末服桔梗湯古今録驗療肺癰經時不差方桔術歸地甘敗醬薏苡桑白上八味以水四合煮大豆半合取二合汁去豆內清酒半合余合諸藥煮之黃昏湯千金療咳有微熱煩滿胸心甲錯是為肺癰方黃昏手掌大一枚上一味煎服一方壽世保元治婦人腹痛如錐剜每痛至死不敢著手此腸癰毒也山甲白芷貝母殭蠶大黃上煎服打下膿血自小便中出即愈犀角地黃湯治傷寒及溫病應發汗而不汗之內畜血者及鼻衄吐血不盡內余瘀血大便黑面黃消瘀血方犀角一兩地八兩芍三兩牡丹二兩上以水九升煮取三升分三服喜忘如狂者加大黃二兩黃芩三兩其人脈大來遲腹不滿自言滿者為無熱但依方不須有所增加千金獨參湯吐衄甚欲絶脈沉手足逆冷者射干麻黃湯咳而上氣喉中如水雞聲夏五味各六分麻生薑各四分射干細辛紫苑款冬花各三分棗一分半厚朴麻黃湯咳而大逆上氣胸滿喉中不利如水雞聲脈浮者朴五兩麻四兩石膏如雞子大乾薑細辛各二兩夏五味子杏仁各半升小麥一升上九味以水一斗二升先煮小麥熟去滓內諸藥煮取三升溫服一升日三服澤漆湯上氣脈沉者夏半升澤漆三斤以東流水五斗煮取一斗五升紫苑生薑白前各五兩甘芩參桂各三兩上九味㕮咀內澤漆汁中煮取五升溫服五合至夜盡清肺湯咳嗽用小青龍加石膏不已將成勞嗽者紀聞百合知母湯疫邪解後咳嗽喝喝巨里動悸者百合知母上二味獨聖散子和夫富貴之人一切涎漱是飲食厚味熱痰之致然也先用獨聖散吐之三拗湯見方匯四君子湯見方匯千緡湯見方匯治喘者倒換散宣明論治癃閉大小便不通小腹急痛肛門腫痛大黃小便不通減半荊芥大便不通減半上為末每服二錢溫酒調下三黃湯千金治下焦熱結不得大便大黃三兩芩二兩梔二十枚甘一兩若大閉加芒硝二兩八正散見方匯通草湯治膿淋小便赤澀莖中痛者即六物解毒湯加阿膠滑石生津湯麥門耆栝蔞甘參連地牡蠣知母上九味或加石膏鉛丹散方見消渴通關散諸卒暴厥牙關緊急者先用此得嚏而進藥細辛牙皂各等分上為末少許吹入鼻內有嚏可治滌痰湯見方匯反鼻酒痱偏枯痛痹瘀血結毒等灸藥湯泉不治則有反鼻酒之可復療焉行氣活血散滯解痼其功屢著反鼻生捕剝皮去腹頭尾取連骨淨肉浸酒火焙乾五錢交趾桂枝三錢芍藥牛膝各二錢花椒五分上五味銼細布袋盛浸好酒一升別入砂糖十五錢磁瓶密封勿令泄氣冬七夏三春秋五日去渣取清暖細飲之常令酒氣相接勿令大醉若不好酒之人各藥研末不用砂糖直白湯下蘇恭紫蘇湯蘇莖四分甘橘各六分生薑一錢二分檳榔二錢小檳榔湯外臺療腳氣心煩悶氣急不安夏生薑桂檳榔上四味大檳榔湯方見腳氣木茱湯千金治腳氣入腹困悶欲死腹脹吳茱木瓜各等分廣濟療腳氣氣急上衝心悶欲死者檳榔三顆細末生薑汁三分童便二升新者不須暖三味攪頓服犀角湯外臺腳氣冷氣悶心下堅背膊痛上氣欲死者吳茱檳榔青木香犀角半夏生薑上六味黑豆湯同療腳氣滿小便少者檳榔桑白上二味以後方煎汁二合煮取一合溫服日三劑或加吳茱生薑黑豆一合半洗淨以水一升二合煮取六合去滓更煮前藥附子湯千金治濕痹緩風身體疼痛如欲折肉如錐刺刀割附九分芍桂甘茯參各三分術四分上七味紫蘇子湯千金治腳弱上氣昔宋湘東王在南州患腳氣困篤服此湯大得力方蘇子夏各一升前胡朴甘歸各一兩橘三兩棗二十枚生薑一斤桂四分上十味以水一斗三升煮取三升半分為五服日三夜一常山甘草湯寒熱日再三發者常山一錢五分甘草七分半虎骨酒方見腳氣杉節湯杉節四兩檳榔七枚大腹皮兩青橘葉四十九片作一服水煎分三服一日飲盡如大便通利黃水未愈過數日再進一服病根去為度外用杉節橘葉煎湯洗之神效檳蘇湯大黃二分木香甘各一分生薑五分橘枳實桂紫蘇各三分檳榔六分九味大防風湯治一切麻痹痿軟風濕挾虛者歸芍地耆防風杜仲各一錢芎附各七分參羌牛膝甘各五分術一錢半薑棗犀角湯治毒流入四肢歷節腫痛千金犀角三分羚羊角一分半前胡芩射干梔各五分半大黃升麻各六分豆豉一升上九味赤龍皮湯赤龍皮防己牛膝忍冬羌活大黃防風甘上九味一方羌活防風各等分上二味金鈴散治痛風及肛痔牽牛子炒末上一味每服一二錢溫酒若白湯下或加茴香即是子和禹攻散疝或用之柴胡加石膏湯介賓治少陽陽明頭痛口乾身熱惡寒拘急柴二錢石三錢甘一錢薑山牛湯醫通治黴瘡頭痛不止土茯苓四十錢忍冬三錢防風天麻黑參各一錢辛荑仁芎各六分黑豆四十五粒芽茶一撮上水煎溫服先生曰頭痛經久不差者兼施十痊丸或針出血提肩散檞皮一錢五分檞葉七分千屈菜七分上三味治腎氣上攻項背不能轉側椒附散本事方大附子一枚六錢以上者炮去皮臍末之上每末二大錢好川椒二粒用白麵填滿水一盞半生薑七片同煮至七分去椒入鹽通口空心服陷胸湯治胸中心下結積飲食不消千金栝樓實大黃黃連各八分甘四分上四味附子丸治九種心痛即九痛丸去狼牙者附子三兩巴豆去皮心熬研如脂參乾薑吳茱各一兩上五味末之煉蜜丸如梧子大酒下強人初服三丸日三服弱者二丸兼治卒中惡腹脹痛口不能言又治連年積冷流注心胸痛並冷衝上氣落馬墜車血疾等皆主之枳縮二陳湯見方匯治腰痛經心録杜仲桂各三分術茯各四分牛膝澤瀉乾薑甘各二分服後飲酒為妙文仲葛氏療卒腰痛不得俯仰方附子二分桂八分牡丹四分上三味治下篩酒服一刀圭日再此主脅肋氣痛如打者小品療腰痛及積年痛者方地十分桂八分術甘乾漆各五分五味搗末以酒服方寸匕日三當歸湯當歸三斤酒五合洗眼方白礬連甘黃柏紅花上五味瞥苡散芣苡二錢芩連茯甘細辛大黃各二分謝道人大黃湯療兩眼痛方芍五分大黃細辛甘各四分芩二分通聖散因風鼻塞者戴人使服通聖散入生薑蔥根豆豉同煎三兩服大發汗鼻立通矣辛荑湯方見鼻甘露飲局方治牙疳去血口臭齒齦腫痛腐爛方見方匯六味丸口臭牙齦赤爛腿膝痿軟或口咸松葉煎青松葉花椒丁香桂五倍子水煎頻頻含之涼膈散見方匯當道飲治口舌腐爛而痛者車前子夏枯草各二錢上二味以水二合煮取一合去渣內蜜四錢煬消溫服清熱補氣湯見方匯方後云不差者與附子湯先生曰産後口舌痛者服消黃朱石類未嘗得治一老醫傳此方後屢試之功力大出意表羅不女牟土方蘆薈末沒藥各三錢明礬末八錢蜜四錢上四味入燒酒一合調頻頻含之碧雪治口瘡咽喉腫痛靛花蓬砂焰消蒲黃甘各等分上五味為末每用少許摻舌上細細咽下喉痛者吹入之升麻湯古今録驗升麻石膏牡丹皮甘各等分上四味雄黃解毒丸治急喉痹方雄黃鬱金各一兩巴豆十四粒上為末醋糊丸緑豆大熱茶清下七丸吐出頑涎即蘇未吐再服如口噤以物斡開灌之下咽無不活者又小兒驚風痰涎壅塞及馬脾風或痘毒攻咽藥食不下者冷水服五七丸神驗加味四物湯治虛火上升喉痛並生喉瘡喉痹熱毒能降火甚效回春歸芎芍地桔甘黃柏知母花粉入竹瀝服馬牙硝散治喉癰及傷寒熱後咽痛閉塞不通毒氣上衝馬牙硝細研每服一錢綿裹含咽津以通為度當歸散婦人妊娠宜常服歸芩芍芎各一斤術半斤上五味杵為散酒服方寸匕日再服妊娠常服即易産胎無苦疾先生曰此方有整胎之功芎歸湯方見難産大加雲母獨聖散難産及胎衣不下者一吐之即出通關散胞衣不出者用此吹鼻中得嚏即出血暈亦效治動胎及産難子死腹中並妊娠兩兒一死一生服之令死者出生者安神驗方千金蟹爪一升甘二尺阿膠三兩上三味以水一斗先煮蟹爪甘草得三升去滓次內膠令煬頓服之不能分再服若人困拗口內藥藥入即活葵子阿膠湯千金治胎死腹中乾燥著背方葵子一升阿膠五兩上二味以水五升煮取二升頓服之未出再煮服先生曰水血下多子道乾澀難出者此湯必效若無藥物以熱湯一盞內鹿角菜令消頓服之或塗油牝戶亦是濟急之良法也回生湯歸芎芍地術茯連甘桂芩參丁香木香萍蓬大黃上十五味水煎或擺用此方雖不古屢用屢效交加散良方治瘛瘲或顫振或産後不省人事口吐痰涎歸荊芥各等分上為末每服三錢水一盞酒少許煎至七分唯下咽即有生理大豆紫湯方見産後新制下瘀血丸一間齋方服枳實芍藥散不愈者此為腹中有乾血著臍下此方主之亦主經水不利大黃三錢桃仁芍各四錢五分虻蟲一錢五分上四味末之煉蜜和為三四丸以酒一合煎一丸取半合蜀漆湯千金治産後虛熱往來心胸煩滿骨節疼痛及頭痛壯熱晡時輒甚又如微瘧方地三錢六分耆一錢知母芍各四分蜀漆葉桂甘芩各二分上八味栝蔞湯治産後渴不止方栝蔞根八分參麥門各六分甘地各四分棗十二枚土瓜根一錢崔氏用蘆根上七味二味參蘇飲治産後瘀血入肺咳嗽喘急參一兩蘇木二兩上作一劑水煎服若口鼻黑氣起宜急用此藥加附子五錢亦有傳生者奪命丹治瘀血入胞脹滿難下急服此藥血即消衣自下附子半兩炮乾漆一錢炒煙盡牡丹一兩大黃末一兩上為末好醋一升大黃末一兩同熬成膏和前藥丸梧子大溫酒吞五七丸通仙丸花麥大黃等分丸藥牛膝散良方治月水不利臍腹作痛或少腹引腰氣攻胸膈牛膝桂芍桃仁延胡索歸牡丹各一兩木香二錢上為末每服一錢溫酒調下或每服三五錢水煎紅藍花酒先生曰胞衣不出及産後遍身痛者亦佳地黃煎丸治月經不通臍下堅結大如杯盤發熱往來下利羸瘦此為血瘕千金生地黃三十斤取汁乾漆一斤為末上二味以漆末內地黃汁中微火煎令可丸每服酒下如梧子大三丸不知加之常以食後服紀聞云此方乾血勞用之羽澤散治帶下方白礬杏仁甘各二分丁子冰片各一分上五味為末薄絹袋盛以納陰中坐臥任意但禁奔走三日一換之以愈為度獨參湯治血崩及諸失血危急者人參二錢上以水一合煮取五勺溫服不知服至數劑蓋暴崩危急之際非少少藥汁之所可得而救活矣庸醫不辨僅用人參五分或一錢以望其生宜哉其不得功栝蔞根湯栝蔞根瓜蔞仁百合知母薏苡柴芩甘上八味烏茜丸烏賊魚骨四兩茜根一兩上二味為末雀卵清丸小豆大每五丸或十丸白湯送下亡血勞病用之蒲公英湯民間方蒲公英莖葉花並用一錢六分薯蕷七分歸酒製一錢水莎五分牡丹二分上五味以水三合煮取二合其滓再以水三合煮取一合一日服盡試令男子服之亦覺乳房起脹矣治乳腫痛方紫花地丁搗絞汁塗乳上五物紅花湯甘連大黃蔚金紅花上五味五香湯外科精義毒氣入腹托裡若有異症加減之沉香木香丁香乳香麝香上五味先生曰寒症者宜用此方山繭湯山繭紅花蔚金上三味或擇加三稜莪朮木香檳榔大黃甘草丁子類有不乳小便難者用乳汁四合蔥白一寸煎三沸灌之金花散自梅花無盡藏來連錢草紅花大黃連翹藿香升麻各二錢沉香檳榔鬱金乳香木香各一錢上十一味為末和膠飴多用效治小兒頭瘡世稱胄瘡者大效又治胎毒一身發瘡疥茱萸連湯治吐乳吳茱黃連生薑等分也炒米煎犀角消毒飲治丹毒壯熱狂躁睡臥不安荊防各一錢犀角甘各五分牛蒡四錢微炒如無犀角代升麻或加芩連石膏生地黃湯千金治小兒寒熱進退啼呼腹痛方生地桂心上二味龍膽湯治嬰孩寒熱四肢掣搦吐哯客忤諸驚癇方龍膽鉤藤芍柴甘大黃上六味烏蠍散既為慢驚外無八候但吐瀉不止者參術茯甘川烏頭全蠍南星各一分薑棗水煎八神湯千金治心腹痞滿萎黃瘦瘠四肢痿躄繚戾服之可令克悅方芍柴各三分大黃參各一分半乾薑甘各一分鱉甲茯各二分半上八味外臺有黃耆無大黃育嬰丸治疳方大觜鳥去觜爪燒黑四錢鰻魚膽黑燒一錢黃蘗五錢薰陸二錢上四味糊丸芍藥四物解肌湯外臺升麻葛根芍芩上四味順逆湯歸芍芩連甘桔連翹黃耆生薑九味錢氏獨聖散治痘瘡倒靨陷伏用川山甲取前足觜上者燒存性為末每服四五分以米湯入少酒服之或紫草湯亦可手捻散治當靨時腹痛不靨其痛著在中脘乃熱毒凝滯瘀血作痛也牛蒡芍桃仁大黃各五分紅花四分桂二分半上六味先生曰諸瘡毒腹痛者屢驗連翹去麻黃湯治結痂後毒猶盛者獨參湯治跌撲傷損或金瘡出血過多昏沉不醒者雞鳴散治墜壓傷損瘀血凝積痛不可忍大黃杏仁各二錢二分上二味臨臥溫服飲酒醉為度接骨木湯龜井接骨木歸芎芍地澤瀉沉香大黃上八味治打撲折傷方活鯽魚小者佳上研如膏內白砂糖和勻傅患所汁出而愈骨損者尤效蔥尉法治跌撲傷損用蔥白細切杵爛炒熱敷患處如冷易之腫痛即止神效甘草解毒湯甘草忍冬白礬上三味以水二合煮取一合猘犬咬傷加馬錢子雞冠石煎成內鐵醬水少許溫服兼灸之數十日甚者並用寬中丸頻頻下之嘗治數十人莫一誤者其他諸蟲獸毒皆能解之此方越前奧村翁所立而適所翁傳之狗咬傷杏仁甘草口嚼搭傷處又宜銀杏塗傷處四順清涼飲正宗治湯潑火燒熱極逼毒入里或外被涼水火毒內攻致生煩躁內熱口乾大便祕實者翹芍羌歸甘防風梔各一錢大黃二錢燈心水煎三白散以香油調敷六物解毒湯土茯忍冬通草各一錢芎五分大黃三分甘一分四物解毒湯銀花一錢蕺菜芎各五分大黃三分土萆薢湯治楊梅瘡及瘰癧咽喉惡瘡癰漏潰爛筋骨拘攣疼痛皆妙景嶽用土萆薢即土茯苓二三兩以水三鍾煎二鍾不拘時徐徐服之若患久或服攻擊之劑致傷脾胃氣血等症以此一味為主加對證之藥無不神效萎蕤湯萎蕤二錢歸芎連通草各一錢五分甘五分仙遺糧二十五錢上七味以水一升四合煮取七合一日服盡若病重者用土茯苓五十錢水率亦準之骨痛或有上逆候耳鳴目生赤脈等證用之桔梗解毒湯療結毒咽喉口舌唇鼻破壞聲啞或成瘰癧者方仙遺糧八錢或十錢二十錢至五十錢桔梗一錢甘芎芍各三分耆大黃各二分上七味以水五合煮取三合渣以五合再煮取二合半一日服盡禁茶酒肉面青菜一切結毒諸症無名腫毒腐敗經年不瘥者皆效葳靈仙湯歸芎芍梔術甘大黃牛膝杜仲龍膽防風葳靈仙各五分赤龍皮一錢五分上十三味浸酒一夜以土茯苓一斤分為十二以其一合前藥以水二碗煮取一碗渣再以水三碗煮取一碗一日服盡芎黃湯芎大黃荊芥防風上四味薰洗方治下疳瘡黴瘡祕録方今呼銀花煎苦辛川椒金銀花各兩許上三味用水三四碗煎數沸先薰後洗瘡口拭乾用三白散摻之三白散海牡蠣煅葛粉果螺上三味末傅耆歸湯黴瘡祕録便毒疳瘡或髮際生瘡梳下薄靨如麩或手足肌膚紅點如斑隱肉當服此方使正氣足而邪自除也參耆芎甘各一錢歸二錢忍冬花防己各一錢五分升麻防風川山甲各八分生薑上十一味玄龜丹治遠年近日楊梅結毒筋骨疼痛日久腐爛臭敗不堪聞或咽喉唇鼻破壞諸藥不效者妙也龜板放炭火上炙焦用新安酒漿濃筆蘸漿塗上反復炙塗三次以焦黃為末二兩石決明用九孔大者煅紅童便內漬之一次硃砂明亮者各末二錢共再碾極細爛米飯為丸麻子大每每一錢量病上下食前後筋骨疼痛酒下腐爛者土茯苓湯下至重者四十日而愈一本作硃砂六錢十全丸芎芩大黃蘗皮各五分輕粉一錢半硃砂一錢連翹苦辛烏蛇地骨皮各三錢上十味為末糊丸梧子大每服十五丸白湯送下日二夜一先生可用粉丸症皆用此方但下疳痛劇者用梅肉丸紀聞四順湯原名四順清涼飲治血熱蘊結壅滯不通或一身盡熱或日晡肌熱或夜發熱皆血熱也歸芍甘大黃各等分上四味治疳瘡痛甚血不已者方杏仁雞子黃上合研塗患處羅不女牟土方下疳漸漸侵蝕不可遏止者當以此洗若不愈者宜石堊湯石堊湯石堊三十錢以滾湯一升攪勻去渣不用焰硝四錢膽礬三分上二味投石堊汁中溫洗數次若為水泡者去膽礬加礬石一錢十味敗毒湯治瘡瘍焮痛寒熱脈緊有力羌桔芎枳實柴荊芥防風連翹銀花甘生薑涼膈散治癰瘍熱毒熾盛大便祕結破棺丹會唧治瘡瘍熱極汗多大渴便祕譫語發狂等即調胃承氣湯為丸者也凌冬飲諸腫毒服之未成者內消已成者即潰忍冬耆各一錢五分歸三分甘一分上四味水煎加酒更煎數沸溫服消渴後服此藥預防發癰梓葉湯治癰疽及一切腫毒方梓葉二錢忍冬一錢甘草五分上三味一無忍冬有通草或加皂角刺櫻皮湯治癰腫瘭疽諸腫毒方櫻皮五錢桃仁二錢赤龍皮五錢上三味以水一升煮取七合頓服針灸法凡暴死者多是疔毒急用燈照遍身若有小瘡即是其毒宜急施針灸夏枯草湯治瘰癧已潰未潰方夏枯草二錢甘草二分上二味或加翹芎大黃又明眼目瞿麥湯張潔古治項邊馬刀方翹瞿麥大黃甘上四味食後熱服十餘日後灸臨泣穴二七日六十日決效浮萍散治諸風癬疥癩瘡浮萍歸芎芍甘荊芥麻黃各等分七味溫服出汗苦參湯遍身癢痛諸藥不效久而如痂癘者苦參三錢上一味按葛洪破棺散方以此物酒煮服四順湯乾疥瘙癢皮枯屑起便祕者浴湯方忍冬防風枳實各十六錢荊芥湯花各二十五錢淡竹葉三百枚鹽一升上七味熬盛袋煎浴凡七八日得愈楊梅皮湯治臁瘡方楊梅皮一錢桔梗茯甘各五分上四味初日以水一合一勺煮取一合二日以一合二勺煮取一合三日以一合三勺煮取一合四日以一合四勺煮取一合五日以一合五勺煮取一合以此為一劑大凡三劑得愈如毒深者服至五六劑萍湯治惡疾遍身生瘡浴浸半日大效本草通天散大黃皂角刺各十錢牽牛子反鼻各六錢鬱金五錢上五味為末每服五分或一錢酒下日二夜三梅毒似癩眉毛脫者又久淋因毒者用之辨附子瞑眩與中毒門人稻良節問附子之用法於余答曰夫烏附之為性也猛烈也用之有瞑眩而愈者有不瞑眩而愈者有徒中毒者烏頭桂枝湯條云其知者如醉狀得吐者為中病也又桂枝附子去桂加朮湯條云如冒狀者此瞑眩而愈者也又用之其病頓愈氣宇快然者是無瞑眩而愈也又用之其病須臾增劇發頭痛眩暈或身體不仁或發熱上逆嘔吐等症者中其毒也速止附子復問瞑眩而吐者與中毒而吐者何以辨之答曰瞑眩而吐者其病愈而後吐也中毒而吐者其病增劇而吐是其別也凡病用附子即愈心氣爽快者為方證相對也外科療結毒與為動其痼毒自有徑庭然則附子之症候如何答曰仲景云無熱惡寒者又真武湯證曰腹痛下利附子湯證曰口中和由是考之無熱惡寒大便滑或溏口中和者可以為附子準的矣凡大便祕結者不中用之只冷祕之症用附子而大便快通是冬節薄衣之人或婦人月事之時一身冰冷少腹痛者多有此症然百人中一人耳又痛風一症用附子不數日則無功者若大便難者宜兼用大黃劑又有久服附子而患眼疾者速止附子不然恐後有致失明者矣慎諸慎諸中川成章志
