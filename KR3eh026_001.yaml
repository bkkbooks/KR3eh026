body:
  text: 卷上傷寒夫傷風寒治法本論已盡矣傷寒論則吾門日夜所講習也今雖似蛇足為蒙生記傷寒傷風治法之梗概如下麻黃湯大青龍湯傷寒頭痛發熱身疼腰痛無汗者用麻黃湯尚不汗出而煩躁脈浮緊者用大青龍湯又初麻黃湯症而有渴者又發熱而渴不惡寒脈浮者皆用大青龍湯而發汗汗流則以手巾拭之休息半時許而復取汗如此凡三日三夜而止至四日有頭微痛微惡寒微渴寒熱往來等證則用小柴胡加桂枝石嘗湯等小柴胡湯大柴胡湯傷寒五六日往來寒熱胸脅苦滿心下痞鞕而嘔者用小柴胡湯若鬱郁微煩大便鞕者兼用大柴胡湯若清便自調而有渴者小柴胡加石膏湯漸加渴者小柴胡合白虎湯小承氣湯調胃承氣湯張子和曰一日一便乃常度也按病人亦然殊傷寒者以大便快通為佳故陽明篇曰大便鞕則譫語小承氣湯主之若一服譫語止更莫復服又曰胃氣不和譫語者少與調胃承氣湯方極以腹滿與急迫區別此二方凡用柴胡及白虎等之症宜腹滿而大便鞕者兼用小承氣湯急迫而大便鞕者兼用調胃承氣湯也白虎湯大承氣湯傷寒六七日大渴引飲舌上乾燥而煩者用白虎湯至七八日舌上黑胎乾燥潮熱便祕腹滿譫語者用大承氣湯此症而有大渴引飲則白虎承氣並用重者白虎五貼承氣五貼胃實甚者用承氣五貼而僅有大便一行此症強人可治羸者危矣是初用達原飲及柴胡桂枝湯等而失取汗是以十分之邪氣皆輻湊腹故見此症初起用麻黃大青龍而三日發汗則邪氣半從汗去決不至此重症也余纍試纍驗凡傷寒陽症初起十之八九宜用大青龍麻黃分量極多發汗之神方無長於斯但大便滑利一二行者亦有變陰疑故用麻黃湯為佳近來信吳又可徒不知發汗有效於外邪初與達原輩而誤人性命者多矣故表而出之至汗下後變症之治法則詳於本論故不贅於此麻黃附子細辛湯麻黃附子甘草湯陰症初發以此二湯微汗之若陰陽疑似之症則先用麻黃湯服後不微汗但惡寒者宜撰用此二湯微汗後變症之治法詳於本論按外臺祕要療大行病及溫病一二日者用麻黃石膏葛根等厚覆取汗以當知吳又可之非千金方云傷寒雅士之辭云天行溫疫是田舍間號耳肘後方云貴勝雅言總呼傷寒世俗因號為時行外臺許仁則論天行病云此病方家呼為傷寒傷寒論集成云王叔和以冬時者為傷寒以他時者為時行寒疫大非古義也蓋疫即傷寒傷寒即疫其謂之疫取諸役役不住其謂之傷寒取諸所感之源下略按溫疫論邪在膜原之説如捕風捉影妄誕附會迷後人不可從矣傷風本事方云今傷風古謂之中風按後世又謂之感冒桂枝湯太陽病頭痛發熱汗出惡風者桂枝加葛根湯太陽病項背強𠘧𠘧反汗出惡風者桂枝加厚朴杏子湯桂枝湯證而胸滿微喘者葛根湯太陽病項背強𠘧𠘧無汗惡風者桂枝麻黃各半湯桂枝湯麻黃湯二方證相合者桂枝二麻黃一湯桂枝湯證多麻黃湯證少者桂枝二越婢一湯桂枝湯證多越婢湯證少者柴胡桂枝湯小柴胡湯與桂枝湯二方證相合者小柴胡湯胸脅苦滿或寒熱往來或嘔者柴胡薑桂湯小柴胡湯症而不嘔不痞上衝而渴腹中有動者小柴胡加桂枝湯小柴胡湯證而上衝者小青龍湯或加石膏咳喘上衝頭痛發熱惡風乾嘔者瘟附班疹大青龍湯葛根湯加石膏或桔梗小柴胡加石膏湯大柴胡湯或加芒消石膏蜞針表裡俱解腫不消者日以水蛭八九枚令吮腫上白虎湯治發班口燥煩躁而渴者應鐘散按丹溪耳下頤領腫為蝦蟆瘟回春頭頂腫起曰大頭瘟正宗合二症名時毒曰夫時毒者天行時氣之病也初起與風寒相類惟頭面耳項發腫為真云云初用大青龍而發汗後小柴胡加石膏湯施蜞針十二三日而愈偶有膿潰者宜從外治之法發班初發葛根湯熱劇者大青龍湯煩躁而渴者白虎湯或兼用犀角後藤香川二翁治時毒初用七味敗毒散十味敗毒去人參前胡獨活和田氏療時毒內陷咽喉腫痛者用桔梗湯或涼膈加石膏湯方輿載六物敗毒散及連翹湯牛蒡芩連湯中寒附子理中湯治五藏中寒口噤四肢強直失音不語昔有武士守邊大雪出帳外觀膽忽然暈倒時林繼作隨行醫宦灌以此藥兩劑遂醒乾薑附子湯治中寒卒然暈倒或吐逆涎沫狀如暗風手腳攣搐口噤四肢厥冷或復燥熱三因方只載此二方中寒病門蓋始於此中寒之證由平素體氣虛弱冬月出外一時為嚴寒所中則口噤失音遍體拘急四肢厥冷畏寒腹痛脈息沉微昏沉不知人事者宜急用熱酒入生薑汁和而灌之候少蘇醒然用薑酒脈出者生不出者死灸法神闕丹田關元用艾火各灸三七壯手足暖脈至知人事汗出即生如無汗手足不暖不省人事者死危證簡便謙齋曰中寒者後世所謂傷寒直中陰症也有持亦云按病源千金及翼外臺聖濟皆無中寒病門至宋末始立一病門豫意中寒者凍死之輕者也艮山翁云中寒者凍病也櫟窗先生編輯急救選方閣中寒與凍死為一病門大得豫意世俗稱中寒者傷風症或兼疝者間亦有焉宜隨證治之方輿載桂枝湯及桂枝人參湯當歸四逆同加吳茱萸生薑湯四逆湯暍霍亂宜與傷食門參考白虎加人參湯金匱云太陽中熱者暍是也汗出惡寒身熱而渴按聖濟中暍門初載白虎湯其主治云治中熱暍頭痛汗出惡寒發熱而渴五苓散脈浮小便不利微熱消渴者治傷暑煩渴引飲無度三因方治傷暑身熱口乾煩渴心神恍惚小便赤澀大便泄瀉者回春按水瀉加滑石效霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之渴欲飲水水入則吐者名曰水逆按嘔吐或加半夏生薑去桂理中湯按千金霍亂門治中湯即此方也方後文云若轉筋者加石膏三兩三因方亦加石膏醫通云脈雖沉細而轉筋煩躁發熱者當作熱治大抵霍亂一毫口渴轉筋者即系熱症謙齋云轉筋皆熱症聖濟霍亂轉筋門無附子劑外治有淋足附子湯東郭云四逆湯證有轉筋輕而不甚者也別録及活人書濟世本草轉筋或用附子劑宜詳察而處方也吳茱萸湯少陰病吐利手足厥冷煩躁欲死者按此方主嘔吐煩躁四逆湯主下利厥冷有持曰霍亂後手足厥逆者四逆湯之所主也此症而嘔不止煩躁者吳茱萸湯症也此湯以嘔吐為準世醫用小半夏等無效術盡束手時用此方奏意外之效然藥苦烈宜少少頻服之桂枝湯吐利止而身痛不休者小半夏湯或加茯苓茯苓四逆湯四逆湯或加參通脈四逆加豬膽汁湯雞屎白散治轉筋入腹者治霍亂轉筋入腹欲死聖濟生薑五兩切上一味用無灰酒一升煎取八合頓服便差灸足外踝骨尖上七壯治轉筋十指拘攣不能屈伸景嶽霍亂吐瀉不已灸天樞氣海中脘四冗立愈正傳霍亂已死而胸中尚有暖氣者灸之立蘇其法以鹽填滿臍孔灸之不計壯數正傳按此灸極妙吐利厥冷煩躁冷汗出者灸神闕數十壯屢得效霍亂治法無捷於斯轉筋不止起死之方灸承筋又不止則灸湧泉外臺又轉筋灸承山針經指南千金方霍亂治四逆吐少嘔多者用附子粳米湯心下痞用甘草瀉心湯凡此病定一日不食為佳備急丸大承氣湯此二方治乾霍亂乾霍亂之狀心腹脹滿攪刺疼痛煩悶不可忍手足逆冷甚者流汗如水大小便不通求吐不出求利不下須臾不救便有性命之慮宜急與巴豆等三味丸服之服取快利外臺許仁則論三味丸即備急丸世病源云其腸胃先挾實故不吐利名為乾霍亂也案奇效厚朴湯療乾霍亂即大承氣加良薑湯也千金治乾霍亂有鹽吐方正傳云乾霍亂死在須臾升降不通故也宜吐以提其氣最良法景嶽舌卷囊縮轉筋入腹者死入門和田氏轉筋甚者用良方吳茱萸湯吳茱萸木瓜食鹽三味等分同炒令焦水煎服回春云夏月有四證傷寒傷風中暑熱病疑似難明按夏月不拘遠行家居壯熱無汗者傷風寒之類也宜用麻黃大青龍等而發汗也有汗而渴者中暍也宜用白虎五苓等也古云暑傷氣分汗如傾方輿載香薷飲及消暑湯生脈散中濕麻黃加朮湯濕家身煩疼發其汗為宜麻黃杏仁薏苡甘草湯一身盡痛發熱日晡所劇者濕家始得病時可與此方外臺桂枝附子湯身體疼煩不能自轉側者桂枝附子去桂加朮湯前方證而大便堅小便自利者甘草附子湯主治見痛風病因考及説約中濕門載五苓散香川氏云小便不利四肢浮腫而渴者艮山翁云濕氣從小便去也和田氏中濕初發有汗者用桂枝加朮湯按金匱云中濕之脈沉而細小便不利大便反快此中濕之一候也中濕初一身盡痛不異痛風然如法施治則不逾月而瘥不似痛風荏苒彌歲月金匱謂中濕死症者因其誤治也意中濕者痛風之輕者也瘧桂枝麻黃各半湯桂枝二麻黃一湯桂枝二越婢一湯柴胡桂枝湯柴胡薑桂湯陰瘧為陽瘧宜撰用此二方柴胡去半夏加栝蔞湯瘧病發渴者亦治久瘧柴胡加芒消湯欲成瘧母者白虎加桂枝湯溫瘧者牡蠣湯蜀漆散夾鍾丸大柴胡湯張會卿雲小柴胡湯加常山二錢截瘧如神截瘧湯家方常山草果知母貝母各等分上四味以酒三勺漬之夜露一宿發日早晨以水二合煮取一合服臨發查再煎服或草果代檳榔最效又截瘧方發日早晨用備急丸一分或用吐劑亦效按外臺有單常山湯煎法服法如截瘧湯間日瘧五六發則宜服截果每日發者宜候十四五日後邪氣漸衰而截之截果宜陽瘧不宜陰瘧陰瘧者宜候數發之後為陽瘧而截之陰陽謂晝夜也小兒瘧疾因蟲者或兼服鷓鴣菜湯瘧用附子劑者希有焉千金瘧門有附子劑三方外臺八方宜隨證治之凡瘧瘥後禁飲酒房事遠行瘧並瘧母灸法脊際自七九至十三四椎瘧振寒少熱面青大便溏泄者用果附湯濟生和田氏截瘧灸法灸大椎尖頭七壯或灸章門不截則灸承山尚無效者灸湧泉又云凡瘧者惡寒始於足指頭有此症者瘧症不具亦為瘧治而可也又云瘧用常山劑不愈者化毒丸二分發日早晨冷水服有效者必下黑便也若瞑眩則輕者用冷水重者冷水內朱或石膏攪服或蘭葉煎服又云瘧母用鱉甲類難治者用化毒丸二分效按醫方考云瘧發時獨寒無熱脈遲者用七棗湯即附子大棗生薑也又云瘧發時頭疼身熱脊強脈浮者大陽症也麻黃羌活湯主之麻黃羌活防風甘草四味也瘧疾寒熱轉大者從卯至午發宜柴胡湯從午至酉發者邪在內宜大承氣湯從酉至子或至寅發者邪在血宜桃仁承氣湯下之微利後更以小柴胡湯撤其邪可也衆方規矩治瘧病苦渴外臺烏梅二十枚上一味以水三盞煎取一盞半去烏梅和蜜一匙分二服瘧脈弦而緊宜下浮大者宜吐弦遲者宜溫正傳牛山云凡瘧疾二三發之中宜用發散劑方輿載柴胡鱉甲湯及鱉甲一味酒服散果痢葛根湯痢有表證者用此湯三四日宜發汗葛根加半夏湯前方證而嘔者葛根黃連黃芩湯痢惡寒止有熱者或下利脈促喘而汗出者黃芩湯痢腹拘急心下痞者黃芩加半夏生薑湯前方症而嘔者大柴胡湯心下痛有身熱者論曰發熱云云心下痞鞕嘔吐而下利者按之心下滿痛者厚朴七物湯痢腹滿者或中脘否塞者紀聞大承氣湯身熱腹滿心下痛甚口舌乾燥者論曰自利清水云云心下必痛口乾燥者下利三部云云按之心下堅者下利脈遲而滑者白頭翁湯熱利下重者下利欲飲水者以有熱故也熱多難用下劑者紀聞白頭翁加甘草阿膠湯熱利下重帶膿血者産後下利虛極金匱按産後痢妙黃連湯半夏瀉心湯熱解痢減心下痞或痞鞕食不進者宜撰用此二方六物黃芩湯桂枝人參湯真武湯痢陰症或遺屎者桂枝加芍藥大黃湯大實痛者小建中湯桃花湯赤石脂禹餘糧湯禹餘糧丸家方治久痢久瀉無熱無後重用附子不止灸腹不愈飲湯直下食粥直下日羸瘦向死者禹餘糧赤石脂各五分阿片小豆粒許津輕上品上三味糊丸一劑二度白湯下即愈起死回生纍用纍驗勿多服多服則發嘔吐黃連阿膠湯久痢心下悸而煩不得眠便膿血者大黃牡丹皮湯膿血痢下赤白如魚腦者桃核承氣湯下紫黑色腹痛後重異常者瘀血也入門鯽魚鱠痢五六日腹痛不止者承氣丸紫丸痢腹痛甚者奧村翁云痢疾久不愈者腸中裡面外皮爛而下赤白如魚腦用大黃牡丹湯或薏苡附子敗醬散等則速愈此效腸癰之治法者也和田氏贊之曰卓見也按和田氏實候而下如魚腦者用牡丹湯虛候者用千金駐車湯其方黃連六兩當歸阿膠各三兩乾薑二兩上四味煎服凡此二方及上之諸方皆痛在臍以上只桃花湯及禹餘糧湯禹餘糧丸者痛少少在小腹者也痛在臍以上者禁用止澀之藥常識此勿誤入門云凡痢下如竹筒或如屋漏水塵腐色氣短厄逆者不治或純下血小便不通唇紅下後身熱脈弦洪者俱不治又云無積不成痢也我邦之先輩説痢病因者多端外邪挾宿食為得痢脈細數者凶痢脈沉實為吉候痢初發不忌脈浮數數日後見浮數者凶脈大者邪氣進也脈遲或沉者不日下利止也腹痛始終不止者惡候下重無附子症古人赤屬熱白屬寒之説難信赤白俱有下重者皆熱也膿血利者赤痢白痢是也痢舌純紅者惡症也舌紅如無皮狀有渴者惡症也或真武湯症亦有此舌候痢七八日不問陰陽灸足三里則利減者也痢冷服萊蔔汁妙治痢煎湯中加萊蔔汁亦佳謙齋云豫有一得療痢脈實者不拘症為實宜疏滌脈虛者不論症可為虛腸澼下膿血脈沉小細安靜者生洪大數身熱者死脈經療純下白如鼻涕者方肘後灸臍下一寸五十壯良説約灸法素有宿症惡藥氣者或腰力罷者宜灸中脘天樞腰眼自十一至十六兼治疳痢不了了者血痢用膠艾四物加厚朴衆方規矩按和田氏噤口痢用參連湯參連各等分也休息痢用子和無憂散奧村氏試效也云蘭醫云赤白痢不用下劑白痢最禁之云牛山云老人小兒痢八九十行者必死也和田氏云小兒痢疾至百行者宜先與如神丸不然暴脫者也又云痢數日之後發熱者多死也按如神阿片丸也艮山翁亦用方輿載桂枝湯及河間芍藥湯四逆散參連湯蘗皮湯千金駐車丸錢氏白朮散無憂散當歸湯泄瀉葛根湯桂枝湯泄瀉有表症者宜撰用此二方或加朮茯苓五苓散治傷暑身熱口乾煩渴心神恍惚小便赤澀大便泄瀉者回春按水瀉加滑石效豬苓湯少陰病下利六七日咳而嘔渴心煩不得眠者生薑瀉心湯心下痞鞕乾噫食臭脅下有水氣腹中雷鳴下利者甘草瀉心湯下利日數十行谷不和腹中雷鳴心下痞鞕而滿按此湯症以雷鳴為準若無雷鳴谷不和下利者四逆等之所主也桂枝人參湯利下心下痞鞕表裡不解者人參湯前方證而無表症者四逆湯下利清穀者真武湯白通湯少陰病下利脈微者赤石脂禹餘糧湯醫以理中與之利益甚理中者理中焦此利在下焦禹餘糧丸家方見痢當歸四逆加吳茱萸生薑湯泄瀉因疝者豫屢患疝瀉輟食食鯉魚膾二碗即愈沼氏云五更瀉八味丸有效泄瀉灸十一二三四腰眼病因考古云泄而腹脹脈弦者死三因方云古方泄利與滯下共為一門千金又以宿食不消在熱痢類門類混濫後學難明不可甄別也泄瀉病門始於此按泄瀉久不愈者宜每日餌食雞肉大效鯉魚亦效謙齋云泄瀉有用下劑宜詳腹診腹底有塊者可下之方輿載桂枝加朮湯四逆散錢氏白朮散紫散高良薑湯調中湯沼田侯留務加川太平妻患泄瀉半年其症微熱微渴晝夜十一二行清川氏療之三月不治高井氏療之三月不治請豫豫到則妻曰二醫食禁甚嚴不肉食半年食不進羸瘦如此豫答曰草根木皮有治病者則禽獸魚蟲亦豈莫治病者悉禁之者不學之甚者耳魚鳥治泄瀉者雞肉鯉魚鯽魚等也內人此中何嗜答曰雞肉也即與豬苓湯兼赤石脂禹餘糧湯三食之間亦令餌食雞肉與卵草日許半愈一月而全愈傷食宿食瓜蒂散宿食在上脘當吐之大承氣湯腹滿甚者論曰脈數而滑者實也此有宿食下之愈病腹中滿痛者此為實也當下之小承氣湯走馬湯備急丸鹽湯探而吐之張介賓桂枝加芍藥湯桂枝加芍藥大黃湯橘皮大黃朴消湯一切魚腥食傷宜此湯吳茱萸湯理中加附子湯吳崑曰中焦痛甚脈沉遲者四逆湯治吐下而汗出小便復利或下利清穀裡寒外熱脈微欲絶或發熱惡寒四肢拘急手足厥方千金霍亂門療菌毒方千金掘地作坎以水沃中攪令濁名地漿飲之解河豚毒一時倉卒無藥急以清麻油多灌取吐出毒物即愈獨嘯庵云中河豚魚毒者少覺懊惱須直探吐急服藍汁一盞若人糞少許若瓜蒂末一錢須臾吐盡則十治八九一書雲河豚魚毒用砂糖有效宿食不吐不利腹痛甚者多灸上脘中脘天樞吐利為度若吐瀉後痛不止者概屬疝瘕宜灸天樞及十一至十四方輿乾霍亂用走馬湯等不吐下者多死令多飲酒至醉有效和田傷食之症胸膈痞塞吐逆咽酸噫敗卵臭畏食頭痛發熱惡寒病似傷寒但身不痛為異也要訣菌毒宜先用地漿水和田氏方輿載桂枝藿香湯及平胃散養脾湯嘔吐反胃膈噎小半夏湯諸嘔吐谷不得下者方極云治吐而不渴者小半夏加茯苓湯大半夏湯胃反嘔吐者外臺云治嘔心下痞鞕半夏瀉心湯嘔而腸鳴心下痞者生薑瀉心湯心下痞鞕乾噫食臭脅下有水氣腹中雷鳴下利者旋覆花代赭石湯心下痞鞕噫氣不除者吳茱萸湯食谷欲嘔者嘔而胸滿者紀聞云大小半夏者常嘔也此湯食則嘔也又嘔吐有嘈雜者用此甘草乾薑湯煩躁吐逆者紀聞云無煩躁亦可用嘔吐苦味之藥不應者或宜此湯大黃甘草湯食已即吐者方極云治大便祕閉急迫者豬苓散嘔吐而病在膈上後思水者解急與之思水者惡阻並産後嘔逆大效和田氏五苓散渴欲飲水水入則吐者名曰水逆茯苓澤瀉湯胃反吐而渴欲飲水者附子粳米湯主治見腹痛紀聞云此湯腹痛為準甘遂半夏湯主治見飲門心下堅滿為準反胃嘔吐俱用紀聞小柴胡湯因腹候用之真武湯水氣為準與甘遂半夏湯及姑洗丸相反腹濡弱脈沉細又有摶擊見緊狀者脈與症不相應者為虛候也反胃及澼囊亦有用之紀聞橘皮湯乾嘔噦若手足厥者和田氏云霍亂嘔吐不止用四逆輩不治急用此湯得效生薑半夏湯胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈者有持云此湯主治要之噁心之症耳素問傷寒金匱無噁心字蓋仲景後之病名也按肘後方有噁心字桃核承氣湯膈噎因瘀血者膈噎因瘀血者十中八九因飲者二三也故有用桃核承氣或乾漆丸等吐血而治者紀聞濕漆丸姑洗丸夾鍾丸紫丸烏梅丸仲景治反胃雉間子炳之説七寶丸治反胃化毒丸治反胃一貫古云嘔家聖藥是生薑千金之説信矣然氣逆作嘔生薑散之痰與水作嘔半夏逐之嘔有熱有寒生薑於寒症最佳若遇熱嘔不可無烏梅也治久患反胃聖濟硫黃細研半兩與水銀一分再研薑汁糊丸服本草反胃門云靈砂鎮墜反胃神丹也本草反胃門云砒石同巴豆附子黃蠟丸服噎膈門云雄黃輕粉石鹼蓬砂砒石並化積垢通噎膈由是觀之聖濟治嘔吐軟紅丸反胃噎膈用之定有效方見附録易簡方膈噎反胃用養生丹要訣用靈砂丹皆水銀劑也醫通云瘀血在膈阻滯氣道而成者代抵當丸作芥子大服二錢去枕仰臥細細咽之但飲熱湯及椒薑輒厄者即瘀血也反胃而胸中嘈雜不寧或作或止其人懊憹面上有白點者作蟲積治之王肯堂云瘀血則脈澀桃仁承氣湯下之脈浮緩者生沉澀者死正傳大便如羊糞者不治年過五十者多不治口中多出沫者必死濟世和田氏云澼囊局方安中散有效南陽亦云其方甘草十兩宿砂延胡良薑乾薑茴香桂枝各五兩牡蠣四兩上八味為末每二錢熱酒調下南陽去宿砂三倍牡蠣水煎服方後云忌酒肉麵餅一切厚味鹽茶又小言有治膈噎河豚魚方和田氏云反胃者朝食暮吐暮食朝吐也澼囊者二三日或四五日十餘日而吐也又有三日亦吐不止者多吐水也反胃無腹痛吐時無煩悶澼囊有腹痛吐有煩蓋澼囊亦屬反胃也今世真反胃者少也多澼囊之類也膈噎者噎食胃反無噎食膈噎難治反胃間有愈者反胃有腹痛者膈噎之變症也一男子患膈噎諸藥無效思食河豚而死煮食之不死翌日復食之通計食之三日而全愈反胃證不強以食絶其湯水飢則以飯炒香乾啖之一些湯水不可進兩三日後竟不復吐飲食如初然後用甘蔗湯七舛薑汁一舛和勻服經驗祕方貓胞衣治反胃燒灰入硃砂末少許壓舌下一醫用之甚效千金云灸通谷五十壯治澼囊千金治反胃飲白馬尿即止外臺治反胃服驢小便二合有效翌日復服二合而愈病若深七日服之良按澼囊之名始於千金至宋盛稱之方輿載千金吳茱萸湯及安廩湯安中散破棺湯獨參湯滾痰丸治反胃大驗方噦橘皮竹茹湯噦逆者生薑半夏湯豫不拘金匱煮法半夏一兩生薑二兩以水一合半煮取八勺服屢得效橘皮湯乾嘔噦若手足厥者噦之重者用之小承氣湯治噦便祕數譫語厄逆雖有手足厥逆大便堅者定屬火熱下之則愈醫通半夏瀉心加吳茱萸湯心下痞鞕者吳茱萸湯一男子下利未全已發噦吐蛔服此湯得愈方輿黃連解毒湯熱毒或瘡腫內攻發噦者紀聞四逆湯真武湯七寶丸南呂丸治噦柿蒂丁香各二錢加生薑五片水煎服又方刀豆上一味銼水煎服醫林雲噦以紙燃鼻嚏而止或云豬膽汁熊膽治噦治噦服藥無效者濟世硫黃乳香各等分為末以酒煎急令患人嗅之又方用雄黃二錢酒一盞煎七分嗅之濟世灸期門關元腎俞痞根一男子痢重噦起灸痞根及數處得愈方輿産後厄逆最為惡候急灸期門宜服四逆加人參湯或桂心五錢薑汁三合和水煎服醫通和田氏云吳茱萸噦之聖藥古人云痢病後及諸病後發噦者難治脈緩者易治脈代者危正傳聖濟噦門有水銀丸麝香丸主治云治諸般噦發方輿載滾痰丸水腫越婢湯風水惡風一身悉腫脈浮不渴續自汗出無大熱腫在上部發汗可解者考審其症而後可與説約先生曰咳喘不已小便漸短少遂為腫滿者當與大小青龍麻杏甘石厚朴麻黃湯等或兼施神祐丸滾痰丸之類方輿越婢加朮湯皮水越婢加朮湯主之甘草麻黃湯亦主之金匱甘草麻黃湯千金云有人患氣急積久不瘥遂成水腫如此者衆諸皮浮水攻面目身體從腰以上腫皆以此湯發汗悉愈金匱云諸有水者腰以下腫當利小便腰以上腫當發汗乃愈按入門古麻甘湯即此湯方後云如肢冷屬少陰加附子麻黃附子湯水之為病其脈沉小屬少陰浮者為風無水虛脹者為風水發其汗即已脈沉者宜麻黃附子湯浮者宜杏子湯金匱小注云杏子湯未見恐是麻杏甘石湯金鑑載杏子湯麻黃甘草杏仁三味也蓋依魏注越婢加朮附湯治水腫惡寒無大熱骨節微疼小便清利大便自調或滑者大陷胸湯水飲在胸腹而腫者兼用之不拘痛有無也桃花湯丸散方水腫兼用下劑木防己湯水病心下痞鞕煩渴者氣急心下痞堅為準為腳氣衝心狀者用之紀聞木防己去石膏加茯苓芒消湯木防己湯症而不煩渴二便不利者防己黃耆湯治水病身重汗出惡風小便不利者防己茯苓湯治四肢聶聶動水氣在皮膚而上衝者真武湯按腫上陷而不起無熱腹濡弱大便滑或溏者八味丸腰以下腫者按此丸緩症也氣急之證勿用之牡蠣澤瀉散大病後腫者五苓散感濕而腫者要訣豬苓湯和田氏用之桂枝茯苓丸合五苓散湯大黃牡丹湯上二方主産後腫本草云血腫紅花二兩杵爛入水半盞取汁服之不過三服便痊鯉魚湯鯉魚長七八寸者一頭去鱗與腸昆布方三寸三片山椒一錢上以水一升八合煮取四合吞其汁旦食鯉每日一劑赤小豆藥赤小豆一合生商陸根二十錢上二味以水四合煮爛去商陸食小豆加減麻黃連軺赤小豆湯治瘡疥內攻腫滿者依本方去生梓白皮加商陸赤小豆二錢商陸五分大棗三分麻黃連軺杏仁生薑各二分甘草一分上八味以水二合煮取六勺或加反鼻或兼用犀角仲呂丸蕤賓丸紫丸元生丸家方七寶丸犀角一老醫云水腫心下苦悶者大檳榔湯四苓散合方有效或兼犀角和田氏遍身流腫用千金麻子湯附子劑也流腫先右手腫又左足腫之類不定處遂及一身內攻腫用東洋赤小豆湯及連翹湯産後腫用琥珀湯五苓散加琥珀反鼻以水一合冬瓜汁一合煎服水不可治者有五唇黑缺盆平臍出背平足下平滿水病忌腹上出水出水者一月死千金古云身有熱者水氣在表可汗之身無熱者水氣在裡可下之患人腹上用手按之有窩者可治濕也又云余處有腫肩項水氣去瘦削者死在近腹脹如鏡光者惡無腫呼吸促迫者惡腫卒消者禍在反掌水腫卒發大熱者後必衝心水氣一旦減再腫滿者惡水腫腹見青筋者惡小言云水腫有咳者動悸劇者自心下催水氣者脈數者皆惡準繩云血腫者皮膚間有紅縷赤痕入門云四肢浮腫皮肉赤紋名曰血分醫林溫白丸方後血腫其人有赤黑紫文用桃仁紅花赤豆蘇木煎湯下按水腫祕結者兼用承氣丸及仲呂丸蕤賓丸瘡疥內攻腫滿者麻黃連軺赤小豆湯劇者兼用紫丸實腫兼赤小豆藥虛腫兼鯉魚湯虛腫右側臥則直右多腫左側臥則直左多腫者必死矣勞病並諸病後瘦極而後腫者必不治和田氏云水腫有如拳者在心下名水結不治症也縱一旦得治亦再發而死醫林水腫門有輕粉丸巴豆丸方輿載單香薷湯及郁李仁湯紫蘇子湯麻子湯麻子小豆湯連翹湯赤小豆湯防己散琥珀湯瓜子仁湯實脾飲鼓脹腹滿厚朴七物湯腹滿發熱十日脈浮而數飲食如故主腹滿氣脹方千金厚朴三物湯痛而閉者梔子厚朴湯心煩腹滿臥起不安者廣義云心煩當做虛煩看腹滿亦非實滿厚朴生薑半夏甘草人參湯發汗後腹脹滿者此亦虛滿也大承氣湯腹滿不減減不足言當下之大柴胡湯按之心下滿痛者此為實也當下之大黃甘遂湯婦人少腹滿如敦狀小便微難而不渴生後者此為水與血俱結在血室也抵當湯見經閉大黃牡丹湯鼓脹因瘀血者按方輿載瓜子仁湯牡丹湯去消黃加薏苡湯也其主治云治瘀血致腹滿鼓脹者又云腹脹有塊按之痛不移處口不惡食小便自利大便黑面黃手掌赤紋肌膚甲錯有此等之候者決為血症也宜擇用下瘀血藥甘遂半夏湯見痰飲人參湯加附子腹平滿大便滑者赤小豆藥仲呂丸七寶丸紫丸鼓脹灸法栗山孝庵傳先以味噌填滿神闕別取土器錐鑿小孔於其心以安臍上熟艾一錢分為三炷灸於孔上令火氣通臍味噌甚厚則火氣不通甚薄則灸後臍爛火氣微通為度徹之一日三回盡一錢艾也灸前須以繩度腹圍病深者灸後七日腹減五分以為驗焉至輕者則得遽減三寸二便隨多或下如赤小豆汁者腹滿漸減六七十日外全愈按此灸法原出外臺及景嶽全書陰症最有效云雞矢醴醫林治鼓脹雄雞矢臘月內收取曬乾川芎各研末各一兩上酒煮麵糊丸梧子大每服五十丸溫酒下一方同治鼓脹身乾黑瘦多渴煩悶馬鞭草細銼曝乾勿令見火以酒或水煎至味出去柤溫服六月採用皂莢主腹脹滿胸腹脹滿煨研丸服取利甚妙本草金匱曰病者腹滿按之不痛為虛痛者為實可下之畜血成脹腹上青紫筋見或手足有紅縷赤痕小水利大便黑金匱下瘀血湯或抵當丸醫通古云鼓脹臂細臍凸手足心及背平滿青筋繞腹皆不治手足羸瘦腹膨脹者名蜘蛛蠱不治脈浮大者生虛小危急按本草云水銀治積滯鼓脹宜用七寶丸大抵脹滿腹高脹者宜下劑腹平滿者有可附子者兼灸或一醫云脹滿初發用大黃甘遂湯有效又云初起用生漆丸身體生癢發疹後可用桃核牡丹湯等或有愈者病因考鼓脹門治方用熊膽灸自九至十六方輿載瓜子仁湯及分消湯壯原湯黃疸茵陳蒿湯黃疸初起宜用此湯茵陳五苓散梔子蘗皮湯身黃髮熱者梔子大黃湯酒黃疸心中懊憹或熱痛大黃消石湯黃疸腹滿小便不利而赤自汗出此為表和裡實當下之小柴胡湯諸黃腹痛而嘔者大柴胡湯前方證而劇者紀聞小建中湯男子黃小便自利心中悸而煩或腹痛者主之紀聞桂枝加黃耆湯諸病黃家但利其小便假令脈浮當以汗解之黃疸有表症者用之紀聞麻黃醇酒湯按本草綱目麻黃條載此湯方後云頓服取小汗同書黃疸門云麻黃傷寒發黃表熱煎酒取汗由是考之金匱脫取汗二字宜補之三因此湯主治云脈浮緊者以汗解之紅礬丸家方見黃胖紀聞云黃疸心下痞堅者兼用之消礬散療黃疸方千金取生小麥苗搗絞取汁飲六七合晝夜三四飲三四日便愈無小麥苗穬麥苗亦得範注云用小麥為勝也四逆湯加茵陳醫壘名茵陳四逆湯一物瓜蒂湯備急丸大承氣湯以上三方主急黃病源急黃候云卒然發黃心滿氣喘命在頃刻故云急黃也又云得病但發熱心戰者是急黃也外臺瓜蒂散主治云急黃心下堅硬渴欲得水吃氣息喘粗眼黃聖濟瓜蒂散主治云急黃煩熱口乾醫林急黃用巴豆丸聖濟治急黃藥品有瓜蒂巴豆消黃犀角石膏按外臺許仁則療急黃始得大類天行病者用麻黃劑取汗金匱云額上黑微汗出手足中熱薄暮即發膀胱急小便自利名曰女勞疸腹如水狀不治疸而渴者難治疸而不渴者其疸可治心中懊憹而熱不能食時欲吐名曰酒疸酒疸心中熱欲吐者吐之愈按瓜蒂症谷之為病寒熱不食食即頭眩心胸不安久久發黃按茵陳湯症五疸實熱脈必洪數其或微澀證屬虛弱丹溪曰不必分五等是溫熱如盦曲相似五疸久久變黑者皆難治醫統大便利而渴者死小便利不渴者生醫通按黃疸腹中有塊者年過五十者多難治黃胖茯苓飲加厚朴湯四苓散加橘皮湯梔子厚朴湯腹滿者紅礬丸家方治黃疸黃胖並嬰孩疳氣好食生米土炭及下血家動悸甚者茯苓飲去人參生薑加厚朴黃連緑礬茯苓術橘皮厚朴黃連各八錢緑礬燒為紅十錢枳實六錢枳實代甘草益佳上七味為末醋糊為丸梧子大每服七八十丸白湯下身面黃白浮腫手足爪甲枯皺專為短氣身體倦怠目中淡白此病以首認氣急爪反為第一證決即是黃胖也行余醫言此病好食生米茶葉之類又云腫及四肢者腫及腹者飲食減少者皆難治又云黃腫多因蟲積食積之為害也玉案按黃胖一名黃腫久不愈則下血虛里動悸甚地黃劑無效紅礬丸多服大效久年不愈而腫則可從水腫之治法難治方輿載外臺半夏湯及平胃散癥瘕疝苓桂甘棗湯臍下悸者欲作奔豚按腹痛沖胸者纍用纍驗桂枝加桂湯氣從少腹上衝心者按世俗所謂佐志古美者有效茯苓甘草湯厥而心下悸者心下悸上衝而嘔者方極苓桂朮甘湯心下逆滿氣上衝胸起則頭眩大黃黃連瀉心湯心煩心下痞按之濡者半夏瀉心湯心下滿而不痛者此為痞此方主之黃連湯見腹痛按心下痞痛者此湯心下痞鞕不痛者半夏瀉心湯小柴胡湯大柴胡湯柴胡桂枝湯治寒疝腹痛外臺柴胡薑桂湯桂枝加芍藥湯桂枝加芍藥生薑人參小建中湯大建中湯大烏頭煎治寒疝繞臍痛若發則自汗出手足厥冷脈沉緊者烏頭桂枝湯寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治治寒疝腹中絞痛拘急不得轉側發作有時便人陰縮手足厥逆外臺按腰腹引陰囊痛脈弦緊者效當歸四逆加吳茱萸生薑湯內有久寒者治烏頭桂枝湯證而緩者又治陰㿗方輿大黃附子湯脅下偏痛發熱其脈緊弦者吳茱萸湯痛從陰囊上衝脅下者劇者加烏頭苓薑朮甘湯腰重冷者仲呂丸夾鍾丸元生膏蜞針備急丸七寶丸化毒丸行余醫言云蓋症即積積即症同一而非有異又謂之癖瘕即聚聚即瘕亦是同一而非有異又謂之疝又謂之痃究竟癥瘕即積聚之異名耳同書疝門云疝即聚又即瘕又云疝者鬱氣之凝滯而為痛者也多在少腹張介賓曰能大能小能左能右近胸肋而如臂如指則謂之痃癖下臍腹而為脹為急則為之疝瘕方輿載小品牡蠣奔豚湯及千金瀉脾湯同書云寒疝附子粳米湯證而痛在心胸者用小品蜀椒湯附子粳米湯加蜀椒乾薑方也又疝氣用附子劑或當歸四逆等而無效腰不伸者有用五苓散加茴香而奏效者又同書疝用禹功散及無憂散又云疝忌蒟蒻愈後亦勿食按凡治心腹痛及諸痛諸方中有甘草則勿減甘草分量甘草少則無效靈樞本藏篇云腎下則腰尻痛不可以俯仰為狐疝聖濟云疝氣臍腹疼痛腰曲不伸此症食時及二便轉側之時假人手甚為清擾之患豫得妙法攤元生膏於綿片徑四寸許以貼於腰日二次發水泡則針而取水復貼膏二三日而能屈伸坐臥復故奇奇妙妙屢試屢效久年積聚疝有脊骨突出或背肉隆起者難治者也治之法內與對症方祕結者時時用丸散下之外隆起上貼元生膏六七日糜爛處施蜞針去惡血復施元聖蜞針如前四五度則無不愈矣又久年腹痛有七寶化毒之證日本橋第四街梁州店老嫗年六十五患疝腰不得屈伸衆治無效床頭常置溲器扶於人尿已三年請豫即與當歸四逆加茱萸生薑湯兼承氣丸而腰部貼元生膏徑四寸日日取毒七日而半愈半月而全治此症元生之功大蘭醫某詰豫曰子能用發泡膏蘭書有發泡七方子知其用法乎答曰豫所用者漢方而芫苼一味也非蘭方也某曰未聞漢有此方其出何書乎答曰千金外臺聖濟皆有此方子何不學之甚某閉口去方輿載牡蠣奔豚湯及瀉脾湯柴胡鱉甲湯寬中湯當歸大黃湯千金吳茱萸湯桂心湯蜀椒湯五苓加茴香湯禹攻散無憂散一婦年四十自每月經行六七日前左少腹痛甚呻吟聲徹四鄰經行後六七日而痛漸止每月草日在病床衆治無效已十年請豫豫視其背左腰肌肉僅隆起方三寸許乃與當歸四逆加吳茱萸生薑湯兼甘遂丸腰肉隆起處貼大元生膏草日許而愈後月不再發此症元生之功大橫沙侯臣湯河氏妻也蟲烏梅丸治蛔厥烏梅丸去附子湯不可附子者鷓鶘菜湯一方鷓鶘菜二錢忍冬一錢桂枝二分甘草丁子各一分上五味漬水少時去渣煮一兩沸頓服或以水一合煮取七勺去渣冷服甘草粉蜜湯蛔蟲之為病令人吐涎心痛發作有時毒藥不止大建中湯或加烏梅烏梅丸家方烏梅蜀椒乾薑各等分上三味為末糊丸梧子大每服四五十丸白湯送下濕漆丸作癲癇狀者紀聞紫丸七寶丸靈樞云中熱則胃中消穀消穀則蟲上下作金匱云腹中痛其脈當沉若弦反洪大故有蛔蟲病源云蛔蟲長一尺亦有長五六寸其發動則腹中痛去來上下痛有休息亦攻心痛口喜吐涎及吐清水貫傷心者則死入門云凡蟲症眼眶耳下青黑面色痿黃臉上有幾條血絲如蟹爪分明飲食不進肌肉不生沉重寒熱若不早治相生不已貫心殺人醫通云諸蟲嗜食米紙茶葉泥炭之類又云心腹中痛上下往來發作有休時喜涎出者蟲也按蟲門載金匱九痛丸玄治翁云小兒夜熱者蟲也南陽云唇色如塗朱眉目間蒼黃色者為蟲候東郭翁云小兒頭痛劇者十中八九蟲也有時大食有時不食者時時卒倒者手足難屈伸者多蟲症皆宜鷓鶘菜湯此湯症多臍傍有塊凡用此湯則止夕飧晡時臨床平旦三服七日用之而不下蟲者非此湯症也按腹痛發作有時者為蟲候用鷓鶘菜湯或粉蜜湯而嘔者宜大建中加烏梅湯或烏梅丸去附子湯或兼家方烏梅丸凡相殺蟲諸藥而蟲難下者兼用紫丸粉鉛粉也藥肆稱唐土者是也家翁所著粉辨詳論之方輿載檳榔鶴蝨散及奧村氏烏梅丸癲癇狂健忘驚悸不寐小柴胡湯大柴胡湯柴胡薑桂湯此三方因腹候用之健忘或用之柴胡龍骨牡蠣湯胸滿煩驚小便不利譫語者桂枝加龍骨牡蠣湯腹中拘急動悸劇者小建中湯心中悸而煩者大黃黃連瀉心湯心煩心下痞按之濡者瀉心湯心氣不定心下痞按之濡者或加硃砂石膏黃連解毒湯喜笑不止者白虎湯狂癇煩渴者甘麥大棗湯婦人藏躁喜悲傷欲哭象如神靈所作數欠伸梔子豉湯虛煩不得眠酸棗仁湯煩躁不得眠者鷓鶘菜湯因蟲者桃核承氣湯抵當湯上二方因瘀血者健忘或用之瓜蒂散狂癇壯實者大承氣湯醫通發狂去厚朴加鐵落石膏黃連甘草加鐵砂湯主治見急慢驚門加辰砂益佳姑洗丸南呂丸七寶丸紫丸一老醫云狂五瀉心皆效古云癲脈大滑者生沉小緊急者不治熱狂脈實大者生沉小者死子和狂癇用吐劑正傳云癇可吐狂宜下又用水銀劑要訣入門癲狂用抱膽丸即水銀劑也全書發狂用巴豆丸苦參丸醫通狂用瓜蒂癇用靈砂丹養生丹皆水銀劑也方輿發狂狂走用將軍湯大黃一味也又用防己地黃湯癱瘓者用風引湯不寐用千金酸棗湯流水湯健忘用歸脾湯又發狂古金五兩以水五合煮取一合入硃砂一匕服有效一貫云癲癇有蛔蟲之候者鷓鶘菜湯兼用濕漆丸穢物下蟲亦下者愈不下者難治也癲癇卒厥之時脈平也健忘多因瘀血者茯苓杏仁甘草湯有效田中氏云癲癇用三聖散一吐後用入鉛方有效不寐龜井氏用甘草瀉心湯按行余醫言癇病門後載不食之症云不食之症云云豫所見及餘三十人多是婦女而男子只有二三其症他無所苦不思粳食或食麥飯糯米粉或豆腐屑云云或終日不吃食餌而不飢而自數日至數月以及數年然形體不瘠脈多平緩間或痞或痛若強與之食必吐云云遇此症以措而不治乃為真治法云云豫見此症二人皆婦女也一人者好食糍食他物則吐三年而復故一人者只飲湯與他食則吐一年許而復故皆措而不治真奇疾也勞病失精盜汗陰痿小建中湯治虛勞裡急悸衄腹中痛夢失精四肢痠痛手足煩熱咽乾口燥者千金云凡男女因積勞虛損或大病後不復常苦四體沉滯骨肉疼酸吸吸少氣行動喘惙或少腹拘急腰背強痛心中虛悸咽乾唇燥面體少色或飲食無味陰陽廢弱悲憂慘戚多臥少起久者積年輕者百日漸致瘦削五藏氣竭則難可復振治之之方黃耆建中湯虛勞裡急諸不足按大病後或産後盜汗不止者加龍骨牡蠣或當歸當歸生薑羊肉湯治腹中寒疝虛勞不足按我邦無羊可代用朝鮮産干牛肉中神氏以雞肉代羊肉桂枝加龍骨牡蠣湯脈得諸芤動微緊男子失精女子夢交按發汗後盜汗不止不可附子者用之屢效炙甘草湯治虛勞不足汗出而悶脈結心悸者從千金翼補心字八味丸虛勞腰痛少腹拘急小便不利者紀聞云此方腰痛為準今之虛勞此方症少矣冷勞定有效小柴胡湯柴胡薑桂湯大柴胡湯三物黃芩湯麥門冬湯大逆上氣咽喉不利止逆下氣酸棗仁湯虛勞虛煩不得眠加減當歸芍藥散料去澤加地黃五味麥門或加參耆桂之類獺肝散肘後治冷勞又主鬼疰一門相染紀聞云此方勞瘵初發冷熱俱用虛勞不用此方虛勞者有裡急腹痛手掌煩熱等症瘵者自初無如斯症有脈細數咳嗽吐沫之症濕漆丸治失精久不愈介賓牡蠣炒上一味以酢糊為丸桐子大每五七十丸空心溫湯下千金云夢泄精灸三陰交二七壯又灸腎俞百壯治陰痿露蜂房燒研酒服此方出本草本朝醫考宗嗣經驗治自汗盜汗五倍子一錢枯礬五分上為末用津唾調填滿臍中以絹帛繫縛一宿即止又有龍骨五倍子酢調貼臍方古云陰虛生內熱又曰勞傷心腎而得之心主血腎主精精竭血燥則勞疾生明醫雜著云午後發熱咳嗽盜汗飲食少進甚則痰涎帶血脈沉數肌肉消瘦此名勞瘵最重雜治又曰到脈細數則難為矣回春云虛勞不受補者聲啞者生眠瘡者發熱不休形體瘦者不治紀聞云疝久不愈為虛勞狀者宜歸薑羊肉湯然我邦無羊代牛肉惡牛肉之臭氣者當歸建中湯令餌食牛肉佳方輿輗云女子十七八歲經閉為勞狀者金匱大黃蟅蟲丸有效主治中腹滿二字眼目也又有如此症用鱉甲芒消劑而全愈者方輿勞病煩熱者用五蒸湯乾血勞苦煩熱者用三物黃芩湯又用本事方鱉甲五味子地骨皮三味丸及朝鮮千牛丸逍遙散按急勞之名在聖惠及聖濟或謂之暴急勞疾又云與熱勞相似半月或一月死人多不知也豫所見者月餘而死聖惠蝦蟆丸治急勞煩熱蝦蟆一枚炙胡黃連三分麝香龍腦各一錢上糊丸豫弱齡治勞病用輕粉丸日一分二三日惡症蜂起不日而死勞病忌峻藥慎之慎之凡勞病內與對症方宜餌食鰻鱺魚間有愈者肺痿肺癰桂枝去芍藥加皂莢湯治肺痿吐涎沫炙甘草湯治肺痿涎唾多心中溫溫液液者生薑甘草湯治肺痿咳唾涎沫不止咽燥而渴甘草乾薑湯肺痿吐涎沫而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多涎唾金匱云寸口脈數其人咳口中反有濁唾涎沫者為肺痿聖濟肺痿門云或欲咳不得咳咳則出干沫胸中隱隱痛者是也回春云無膿者肺痿也外臺蘇遊傳尸論云氣急咳者名曰肺痿良方劫勞散證治云勞嗽寒熱盜汗唾中有紅線名曰肺痿由是觀之肺痿者為勞病一症可徵香川氏丹波氏南陽亦云本草云鯽魚肺痿咳血有效桔梗湯加苡薏尤效咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗湯主之千金作桔梗三兩今從之子和依此方加薏苡糯米正宗依此方加貝母紫苑杏仁名四順散桔梗白散主治同桔梗湯葦莖湯咳有微熱煩滿胸中甲錯是為肺癰葶藶大棗瀉肺湯肺癰喘不得臥犀角鯉魚膾正宗有犀角劑及金鯉湯薏苡仁粥代飯日食之干柿宜日食之一男兒六歲患肺癰吐膿血與桔梗湯加薏苡兼犀角每日令食薏苡仁粥及鯉魚膾干柿十餘日膿血日減月餘而全愈栗山先生患肺癰服黃昏湯而全愈黃昏合歡木也用皮而佳此方出千金及外臺黃昏手掌大一枝上一味以水二合煮取一合服方輿輗肺癰用薏苡根搗汁頓熱服之其效最捷已潰未潰皆可挽回諸方不及也又云薏苡為肺癰專藥根汁最效明韓懋醫通一方華岡治肺癰蘆若芽大甘草中上二味濃煎服又方華岡生生乳三分糊丸七日服金匱云咳即胸中隱隱痛脈反滑數此為肺癰咳唾膿血按桔梗湯主治也潘氏續焰試肺癰法凡人覺胸中隱隱痛咳嗽有臭痰吐在水內沉者是癰膿浮者是痰集義云今驗果如其言又以雙箸斷之其斷為兩段者是膿其黏著不斷者是痰亦一試法也醫通云肺癰初起脈不宜數大潰後最忌短澀脈緩滑面白者生脈弦急面赤者死若潰後大熱不止胸中隱痛痛在左畔喘汗面赤膿痰腥穢不已者難治若喘鳴不休唇反咯吐膿血色如敗滷滃臭異常飲食難進爪甲紫而帶彎手掌皮如枯樹面豔顴紅聲啞鼻煽者不治按肺癰五十以上者難治一書云一老儒患肺癰用正宗金鯉湯全愈方輿初用四順散或録驗桔梗湯後用葦莖湯或黃昏湯腸癰大黃牡丹皮湯腸癰者小腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血脈洪數者膿已成不可下也薏苡附子敗醬散腸癰之為病其身甲錯腹皮急按之濡如腫狀腹無積聚身無熱脈數此為腸內有癰膿排膿散排膿湯大黃牡丹湯去消黃加薏苡湯即千金腸癰湯也伯州散按腸癰外潰者腸癰湯兼伯州或桂茯丸料加薏苡黃耆若盜汗出者耆歸建中或附子劑等餌食雞卵鰻鱺鯽魚重者宜托外科千金云腸癰之為病小腹重而強抑之則痛小便數似淋時時汗出復惡寒其身皮皆甲錯腹皮急如腫狀其脈數者少有膿也其脈遲緊者未有膿也甚者腹脹大轉側聞水聲或繞臍生瘡或膿從臍中出或大便出膿血入門云癰生小腸分尤可大腸分近肛門者難治肛門破者即死正宗云潰後膿腥臭穢或流敗水濁瘀虛熱更增不食者死本草云薏苡仁冬瓜仁甜瓜仁皆治腸癰敗醬除癰腫黃耆除腸胃間惡血皂角刺治腹內血瘡諸失血瀉心湯心氣不定吐血衄血心下痞為準九竅出血皆用輕者加地黃重者加生地黃汁黃連解毒湯瀉心湯症而重者尿血重者亦用小柴胡湯或加連諸失血胸脅苦滿者麥門冬湯或加地黃或石膏治咳血並血症後上逆柏葉湯吐血不止者吐血用諸方不止者下血不止者亦效馬通汁代童便佳黃土湯下血先便後血此遠血也亦主吐血衄血不拘先便後血而可也吐衄血共脈緊者有此湯之症又崩漏脈緊者用之有效豬苓湯治尿血重者兼用黃連解毒湯尿血無痛血淋有痛治方一也芎歸膠艾湯香川氏吐血咳血尿血用之桃核承氣湯治吐血覺胸中氣塞上吐紫血壽世童便褚氏遺書云咳血飲溲溺則百不一死又集解云治咳血吐血及産後血運陰虛久嗽火蒸如燎昔者一醫患吐血百治無效日服童便五合月餘而全愈犀角治吐血衄血下血時珍紅礬丸家方治久下血面色青黃動悸劇者荊芥湯千金治九孔出血荊芥一味煎服鼻衄不止用之方輿治下血奇方乳髮霜每服五分白湯下日三聖濟唾血不止蒲黃一味研細每服三錢匕冷水調下吐血門有單人參散治衄血龍骨末五倍子末枯礬少許各一味吹鼻中食治門治吐血用大豆濃煎汁治下血又食野豬肉舌上出血黃柏一味為散每服二錢匕正傳舌上出血如線槐花炒末摻之又蒲黃炒焦傅之諸失血皆是陽盛陰虛悉宜四物湯加知柏為主治治衄血灸大椎啞門二三壯方輿灸法治下血無度脊中對臍一穴五壯或十壯衄血亦可又灸足三里二穴古云失血大概俱是熱症脈宜沉細設見洪大後必難治要訣吐血嗽血用養正丹靈砂丹皆水銀劑也山脅氏和田氏吐衄咳血用參連湯謙齋曰專音聲人吐血者多有焉和田氏云大吐血其血不止者或昏暈者俱灸鳩尾穴其艾大如中指頭數百壯開其閉塞血能止數得效又云失血瀉心湯加荊芥一二錢大效又云大吐血症用麥門冬湯加連石膏屢得效五竅出血以井花水當面連噴幾口急分開頭髮用粗紙數層蘸醋令透搭在囟門其血即止一書云明礬治諸失血每服半錢大麥煎湯送下多用則嘔少許度度可用又蘭書有明礬血竭二味方蘭書云吐血出於肺者胸中微痛而熱口中甘咽喉中癢咳血其血必為泡沫甚則立死血線亦出於肺惡候也吐血出於胃者噁心而吐血血反多其色黯赤凝結與食物交出其血不為泡沫此症無不愈矣醫言云吐血從胃脘逆升上出於口也衄從頭中滲漉下洟道出於鼻也吐血逆上故多死衄順下故死者至希古人並稱吐衄俱為劇症者非矣方輿輗云吐血後噁心嘔吐者瘀血在內未盡也又瀉心湯治九竅出血拔萃加生地黃犀角名犀角地黃湯按吐血後不寐黃連阿膠湯有效又吐衄血不止茅花加甘草少許煎服有效此方在外臺又蒿雀霜亦有效要訣衄血用單茅花湯山脅氏二白湯治吐血唐白及白茅根二味水煎服方輿載獨參湯及參連湯犀角地黃湯痰飲咳嗽大青龍湯小青龍湯病溢飲者當發其汗大青龍湯主之小青龍湯亦主之小青龍加石膏湯肺脹咳而上氣煩躁而喘脈浮者心下有水咳嗽吐白沫殆欲成勞者又喘哮多用之越婢加半夏湯咳而上氣此為肺脹其人喘目如脫狀脈浮大者乾咳者又哮喘多用之射干麻黃湯咳而上氣喉中如水雞聲外臺水上有如字皂莢丸咳逆上氣時時唾濁但坐不得臥痰黏著胸中難出者麥門冬湯大逆上氣咽喉不利止逆下氣者聲啞者效麻黃甘草加杏仁生薑湯治風寒咳嗽多痰語音不出者麻甘杏三味等分生薑減半傷風咳嗽語音不出者先服此湯取微汗熱解後語音不出者服麥門冬湯甘遂半夏湯病者脈伏其人欲自利利反快雖利心下續堅滿此為留飲欲去故也利反快與心下堅滿為準十棗湯脈沉而弦者懸飲內痛病懸飲者咳家其脈弦為有水夫有支飲家咳煩胸中痛者夫心下有留飲其人背寒冷如手大此諸證之中有一症則宜用此湯姑洗丸十棗湯證輕者木防己湯膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈木防己湯主之虛者即愈實者三日復發復與不愈者宜木防己湯去石膏加茯苓芒消湯主之苓桂朮甘湯短氣有微飲當從小便去之茯苓飲治心胸中有停痰宿水自吐出水後心胸間虛氣滿不能食消痰氣令能食吐宿水為準枳朮湯心下堅大如盤邊如旋杯水飲所作此湯症按腹則轆轆有聲此湯效遲或兼用甘遂半夏湯紀聞小柴胡湯柴胡薑桂湯四逆散此三方久咳或因腹候用之苓桂五味甘草湯苓甘五味薑辛湯苓甘薑味辛夏湯苓甘薑味辛夏仁湯苓甘薑味辛夏仁黃湯以上五方咳嗽無表症者可用之金匱證治有可疑者宜從方極主治真武湯加乾薑細辛五味子水飲與裡寒合而作嗽腹痛下利直指瓜蒂散子和痰飲咳嗽用之南呂丸祕結者兼用之七寶丸紫丸金匱云其人素盛今瘦水走腸間瀝瀝有聲謂之淡飲飲後水流在脅下咳唾引痛謂之懸飲飲水流行歸於四肢當汗出而不汗出身體疼重謂之溢飲咳逆倚息短氣不得臥其形如腫謂之支飲夫心下有留飲其人背寒冷如手大胸中有留飲其人短氣而渴四肢歷節痛膈上之病滿涎咳吐發則寒熱背痛腰疼目泣自出其人振振身瞤劇必有伏飲按後世以痰懸溢支留伏為六飲方輿載厚朴麻黃湯澤漆湯清肺湯百合知母湯三拗湯紀聞曰將成勞咳者用小青龍加石膏湯有效疫邪解後或瘧後咳嗽不已巨里動悸劇將成勞狀者百合知母湯有效世稱痰瘤者似瘰癧內用滾痰散外用傅藥其方大黃芒消五倍子天南星各等分南星生則大效要訣咳用犀角鹿茸胡桃諸嗽加喘氣急者用水銀劑治三十年嗽千金百部根二十斤搗取汁煎如飴服方寸匕日三服深師加蜜二斤外臺加飴一斤治咳嗽不止必效方生薑五兩餳半升火煎熟食盡愈段侍御用之有效又千金有薑汁砂糖方治失音不語普濟萊蔔汁入薑汁服喘哮桂枝加厚朴杏子湯小青龍加石膏湯咳而上氣煩躁而喘脈浮者心下有水大青龍湯喘有表症者麻杏甘石湯喘惡寒止者越婢加半夏湯咳而上氣此為肺脹其人喘目如脫狀脈浮大者醫宗必讀云一令愛久嗽而喘百治無效一日喘甚煩躁余視其目則脹出鼻則鼓扇脈則浮而大肺脹無疑以此投之一劑而減再劑而愈射干麻黃湯喘已作咳者木防己湯心下痞堅氣急者皂莢丸哮喘不得臥者南呂丸姑洗丸七寶丸紫丸化毒丸救喘丸家方治哮喘用苧麻根和砂糖爛煮時時嚼咽下永絶病根又用貓兒頭骨燒灰酒調二三錢一服便止正傳上氣喘嗽沙糖薑汁煎咽又喘息欲絶飲韭汁一升草本哮喘輕粉丸有效小言喘脈宜浮遲不宜急疾數直視譫語喘滿者不治正傳凡喘作於大病之後者上喘咳而下泄瀉者婦人産後因亡血過多者多危殆醫統方輿載千緡湯及參連湯喘四君子湯眩暈苓桂朮甘湯心下逆滿氣上衝胸起則頭眩者頭眩發作有時為準澤瀉湯心下有支飲其人苦冒眩者頭眩不止為準五苓散臍下有悸吐涎沫而顛眩此水也夏日眩有效小半夏加茯苓湯卒嘔吐心下痞膈間有水眩悸者嘔吐而眩者效應鐘散祕結者兼用之眩暈不可當者以大黃酒炒為末茶清調下正傳苓桂朮甘湯合瀉心湯治失血後併産後眩暈當歸芍藥散料中三倍芎歸煎服兼用回生散真武湯此湯症希有焉南陽云眩暈白虎湯有效元生膏家方貼百會聖濟有灸百會塗萆麻子取膿血之法此元生為勝要訣用靈砂丹大便閉三承氣湯隨證用之麻仁丸或為湯加桃仁蜜煎導承氣丸三黃湯或加甘草煎服按平生祕結之人大黃甘草湯加芍藥為散服或煉蜜服芎黃散煉蜜服亦佳甘遂丸輕粉丸巴豆丸聖惠治大小便閉脹悶欲死輕粉一錢生麻油一合相和服本草燥結門治冷閉附子為末蜜水服按是希有之證若有此症則宜與對證附子劑聖濟謂之冷祕即用附子劑方輿載宣明論倒換散大黃荊芥二味也小便閉豬苓湯加車前子或消石桃核承氣湯八味丸産前後小便閉用之施整胎術泄閉術男子脈緊者或用之大黃甘遂湯治小便閉劇證黃丹膏黃丹十錢巴豆五個上二味先研巴豆內黃丹加蜜少許相和塗紙貼臍下一寸五分六物解毒加反鼻湯治黴毒家小便閉方中十倍土茯苓三倍大黃加反鼻二錢以水二合五勺煮取五勺頓服纍用纍驗土茯苓上品細銼用治小便不通方朴消一味細研為散每服二錢匕酒調下聖濟治小便不通臍下急痛脹悶欲絶鹽二升上一味鐺中炒令極熱布帛裹尉臍下以小便通快為度聖濟古云小便閉皆宜吐之以提其氣氣升則水自降丹溪云吾以吐通小便用瓜蒂之類聖惠轉胞條八味丸治小腹急痛不得小便按急痛為準又云以蒲黃裹患人腎令頭至地二度即通小便閉八正散有奇效倒換散亦有效梅毒家小便閉亦八正散有效紀聞淋豬苓湯加消石湯治諸淋並膿淋血淋加車前子或浮石大黃牡丹湯加反鼻六物解毒加阿膠滑石湯治膿淋小便赤澀莖中痛者土茯苓上品細銼二錢通草忍冬川芎滑石阿膠各七分半大黃甘草各三分上八味以水三合煮取一合半內膠煬盡分溫服忌海腥煎炒滷鹽房事等件一日服三劑盡不愈者加至四五劑至重者七倍土茯苓三倍大黃倍余藥加反鼻二錢以水四合煮取二合五勺再以水三合半煮取二合俱合和空心一日一夜服盡雖膿淋至重者用此湯七日而無不奏效矣若或大勢已解莖中有痛者日用七寶丸一分許七八日而無不愈者矣屢用屢驗服藥中宜日食雞卵三四枚雞肉愈佳此先輩之試驗也黃連解毒湯治血淋桃核承氣湯大黃甘遂湯諸淋祕結少腹滿者兼用之承氣丸七寶丸崔氏療尿血方大黃末芒消末各半匕上二味冷水和頓服之立止治熱淋聖濟消石一味研細蜜水服惠美氏方書淋門有豬苓湯加附子此方冷淋定有效按淋疾小便赤澀莖中痛者用豬苓湯或加車前子大黃出膿者豬苓加消石湯血淋豬苓湯加浮石或兼用承氣丸不愈者用黃連解毒湯或因腹候兼用桃核承氣湯世所謂自黴毒來膿淋者用加味六物解毒湯或大黃牡丹湯兼用輕粉丸古云淋疾脈盛大而實者生虛細而澀者死方輿載八正散通天再造散一貫云遺尿者臍上一二寸上之方有凝結者用縮泉散則自消消則遺尿亦愈縮泉散方雞屎二錢桂枝五分上二味為末酒服方寸匕日三灸十六俞章門凡腰部佳八髎尤良灸七日而大抵愈本草雞屎燒灰一味酒服又淋疾膿出者海浮石燒為末溫酒服一錢日二有效一婦人年三十患膿淋小便晝夜四百餘行尿道痛甚號泣聲徹四鄰且經閉二年常坐臥草蓐之中易醫草二人而不治三年請余余即與加味六物解毒湯七倍上品土茯苓三倍余藥加反鼻二錢濃煎一日服盡七日而經水下四五日痛漸緩尚用前方通計二十八日而瘥去草蓐坐臥如常而尿道痛不全治又日與七寶丸一分十日許而全愈消渴白虎加人參湯大渴舌上乾燥而煩欲飲水數升者麥門冬加石膏湯謂胃承氣湯中消消穀善飢不甚渴小便赤數大便硬者入門消穀為準腎氣丸男子消渴小便反多以飲一斗小便一斗紀聞云此症小便生泡如膏入門云小便混濁如膏淋然栝蔞瞿麥丸小便不利者有水氣其人若渴一老醫曰入夜舌乾不得眠者經久必為消渴宜用此煉蜜緩緩服文蛤散非文蛤亦可用常之海蛤煎用大效炙甘草湯加黃連知母或黃耆鹿角繅絲湯治三焦渴如神如無繅絲湯卻以原蠶繭殼絲煎湯代之大效治消中日夜尿七八升者千金鹿角炙令焦末以酒服五分匕日三漸加至方寸匕蝸牛散蝸牛燒存性上為細末每日一錢至一錢五分白湯送下妙惠美三伯試效治渴利小豆汁方聖濟小豆不限多少上一味水煮熟搗爛細布絞取汁不拘時頻服消渴有蟲者苦楝根皮焙乾入麝香少許水煎空心服本草本草云小麥作粥飯食薏苡仁煮汁飲田螺煮汁飲蜆並田螺浸水飲冬瓜汁梨汁藕汁皆治消渴天花粉者治消渴之聖藥正傳天花粉餅代飯日可食消渴三禁飲酒房室鹹食千金岐伯曰脈實病久可治脈弦小病久不可治正傳方輿載生津湯其方自外臺來麥門黃耆栝樓甘草人參黃連牡蠣地黃知母上九味或加石膏紀聞云或用千金鉛丹散其方鉛丹胡粉甘草澤瀉石膏栝蔞根白石脂赤石脂八味等分為散每服二錢水調下日三夜一鉛丹久服腸痛則宜減之中風瓜蒂散五十以下偏枯痰涎滿胸者可吐之腹氣不堅實者決不可與吐方考按正傳獨聖散則一物瓜蒂散也其主治云治諸風痰盛及諸癇痰飲壅溢等症藜蘆湯治證同前吐方考云藜蘆華産為可尤多毒用之若二分若三分田中氏云中風用此湯功勝於瓜蒂備急丸卒中風口噤者按全書解毒雄黃丸主治云治中風牙關緊急及痰涎咽喉腫閉牙關緊閉開口灌下豫用備急丸其功同於雄黃丸瀉心湯附子瀉心湯大柴胡湯小建中湯四逆散加乙切草家翁用之大青龍湯古今録驗續命湯治中風痱身體不能自收口不能言冒昧不知痛處或拘急不得轉側不遂痰喘有熱為準烏頭湯半身不遂及左右手足蜷攣者烏頭湯微汗之入門中風自疝來者脈多緊也用之葛根加朮附湯桂枝加朮苓附湯真武湯振振搖者八味丸南呂丸十棗湯姑洗丸控涎丹主治云治痰涎留在胸膈上下變為諸病或頸項胸背腰脅手足胯髀隱痛不可忍筋骨牽引釣痛走易及皮膚麻痹似乎癱瘓不可誤作風氣風毒及瘡疽施治又治頭痛不可舉或睡中流涎或咳唾喘息或痰迷心胸並宜此藥數服痰涎自失諸疾尋愈按控涎丹原出聖濟名趁痛丸治風毒走注疼痛方也三因名之控涎丹控涎十棗二方所主治略同只有輕重之分耳十棗之輕者用控涎控涎之重者用十棗而可也大承氣湯食厥者重者兼備急丸腹滿為準桃核承氣湯因瘀血者濕漆丸同前黃耆桂枝五物湯身體不仁如風痹狀者按此湯勿減生薑減則無效七寶丸按要訣中風昏沉不省人事痰涎壅盛者用養生丹豫用此丸元生膏蜞針中人半身不遂而精神如故不如癡者內用對症方外貼此膏於不遂之手足六七日糜爛處施蜞針去惡血復貼膏施蜞針如斯二三月施治則病十治八九病人倚杖緩步而行三四里大效治三年中風千金松葉一斤細切以酒一斗煮取三升頓服汗出立瘥治中風不語大豆煮汁煎調如飴含之並飲汁又殭蠶七枚為末酒服本草炒豆紫湯本草治中風口噤用烏豆五升清酒一斗炒令煙絶投酒中待酒紫赤色去豆量性服之按千金大豆紫湯豆淋酒聖濟大豆酒皆同方也千金云中風口喎日服一升破傷風産後痙病並諸病服之大效白礬散聖濟治中風舌強不得語白礬生用桂枝各二兩上二味搗羅為散每服一錢匕安舌下有涎吐出即語韭汁治中風失音日華竹瀝湯千金治四肢不收心神恍惚不知人不能言竹瀝二升生葛汁一升生薑汁三合上三味相和溫暖分三服平旦日晡夜各一服又有荊瀝竹瀝薑汁三味等分方又治中風口噤不知人者方服荊瀝一升又方服淡竹瀝一升卒中風口噤不得開灸機關千金翼名頰車二穴穴在耳下八分少近前灸五壯即得語回生散家方治中風口噤每服二錢酒送下又荊芥薄荷等分煎服有奇效一醫雲中風風引湯有效凡初中時昏沉口噤不能進藥急以生半夏末吹入鼻中或用通關散搐鼻內提起頭髮立蘇有嚏可治無嚏不可治或急以手指掐刻人中即醒其或不醒者急以三稜針刺手十指甲角十井穴捋去黑血就以氣針刺合谷二穴人中一穴覺稍醒即多灌香油或加麝香一二分或薑汁亦可濟世初病暴僕昏悶不省人事或痰涎壅盛舌強不語兩寸脈浮大而實急用吐法人迎脈緊盛或六脈浮盛者急續命湯表之大法中風脈浮遲者吉急疾者凶正傳若中人髮直吐清沫搖頭上攛面赤如妝汗綴如珠或頭面赤黑眼閉口開手撒遺尿聲如鼾睡俱不可治要訣山東洋云中風者心胸間蓄熱也宜石膏劑按中風有鼾者脈浮大痰涎壅盛者遺尿者凶兆後藤氏用反鼻酒載附録方輿載通關散參連湯滌痰湯無憂散反鼻酒腳氣痿躄越婢加朮湯治下焦腳弱脈浮惡風無大熱為準越婢加朮附湯按千金越婢湯即此方主治曰治風痹腳弱方方後云覆取汗烏頭湯治腳氣疼痛不可屈伸煎法可從大烏頭煎方輿八味丸治腳氣上入小腹不仁桂枝加朮苓附湯以上之五方無衝心狀者用之木防己湯同去石膏加茯苓芒消湯此二方中加吳茱萸氣急心下痞堅有衝心狀者用之兼用仲呂蕤賓紫丸等吳茱萸湯加橘皮紫蘇湯半夏厚朴加吳茱萸橘皮湯乾溼腳氣氣急而胸動劇者將衝心之兆也撰用上二方腳脛施蜞針時時用紫丸一二分或三四分下之則無不愈矣若小水短少胸膈滿悶短氣喘息嘔吐者是衝心也宜決意用紫丸一錢蜞針足上廉下廉絶骨承山之近所不拘經穴除動脈並禁刺穴麻痹處悉施蜞針出血出紫黑血者尤有效血止即診巨里動則安定也此為驗大抵一日兩腳水蛭十五枚許為限日日施之四五日或六七日而止妙不可言元生膏冬春此膏代蜞針犀角毒氣攻心煩悶者每服五分日二或三仲呂丸蕤賓丸紫丸七寶丸赤小豆藥灸八所千金生薑湯聖濟治腳氣胸滿吐逆不下食或吐清水涎沫生薑五兩上一味絞取汁煎令熟每服半合以熟湯半盞調勻服之治腳氣衝心悶亂不知人醫林大豆一升水三升濃煎取汁頓服半升如未定可更服半升松葉酒方見中風治腳氣骨節疼痛虎骨酒治腳氣差後腰腳不遂者生地黃十六錢牛膝七錢桂枝木瓜虎脛骨各五錢蝮蛇二錢上六味漬醇酒八合三日去渣每飲一杯日二夜一或曰腳氣衝心金匱風引湯有效要訣云腳氣喘急者此係入腹仍佐以養生丹水銀劑也楊大受云腳氣是為壅治當以宣通之劑使氣不長成壅也壅既成而盛者砭惡血而去其重勢外臺云腳氣脈三種以緩脈為輕沉緊為次洪數者為下方輿載大小檳榔湯木茱湯檳蘇湯外臺犀角湯大檳榔湯方檳榔六分半生薑一錢橘皮紫蘇木瓜吳茱萸各五分上六味以水二合煮取一合或曰檳榔末用則大效按聖惠方此方加木香少許主治云治腳氣衝心煩悶喘促凡乾溼腳氣巨里動甚者將衝心之兆也禁附子劑犯之必殺人宜用吳茱萸消黃甘遂巴豆等下之腳氣嘔吐有半夏無效者或用犀角無效者將衝心用紫丸一錢大效腳氣氣急之症初腳脛數所施蜞針出血則衝心氣急之候脫然去此豫所經驗也又痿躄者腳脛有毒也三陰交絶骨邊貼元生膏有效輕者灸亦效內用對症方不可附子者用黃耆桂枝五物湯方中勿減生薑南茅街米商伊勢屋喜兵衛主管某年二十三腳氣一身洪腫巨里如奔馬滿悶短氣嘔吐不下食大小便不通衆醫辭去豫與水銀三錢小便通一合許前證如故復與元生丸小便利亦一合許而無驗決意與紫丸一錢吐瀉二十餘行下蛔蟲五條前證頓退調理二十日而全愈京橋五郎兵衛街紙戶伊勢屋作兵衛主管嘉兵衛年二十一患腳氣腫滿始無衝心之狀豫與木防己去石膏加茯苓芒消湯六七日一朝衝心氣急嘔吐甚與紫丸一錢暫時而吐復與紫丸一錢吐瀉十七八行下蛔蟲六條前證頓退復與木防己湯二十日而全愈痛風鶴膝風桂枝附子湯甘草附子湯風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者痛風大抵此湯症多有焉烏頭湯病歷節不可屈伸疼痛脈緊者用之桂枝芍藥知母湯諸肢節疼痛身體尩羸腳腫如脫頭眩短氣溫溫欲吐肢節疼痛為準鶴膝風或加當歸川芎葛根加朮附湯越婢加朮附湯麻黃加朮湯不可附子者越婢加朮湯同前古今録驗續命湯姑洗丸治風毒走注疼痛濟聖七寶丸痛風有不宜附子劑者初用麻黃加朮等六七日熱解後後藤氏解毒劑兼用七寶丸蒸劑家方蓮葉苦薏忍冬各等分上三味盛袋以水一升許煮令熱狹於板絞以尉痛處加烏頭益效按痛風劇症遍身走痛如刺日夜不眠叫號聲徹四鄰者雖內用烏附劑非外用蒸劑則不能就眠晝夜尉之六七日則大勢已解而病人能睡至此休蒸劑又服前方數日痛不全去者兼服七寶丸一分或二分七八日而無不愈者矣反鼻酒松葉酒蜞針元生膏治歷節風痛獨活羌活松節各等分用酒煮過服外臺又方川木通二兩水煎頻服服後一時許遍身發癢或發紅丹勿懼遍身上下出汗即瘥集要威靈仙為痛風要藥為末酒下或丸服以微利為效本草沒藥同虎脛骨末酒服治歷節風痛不止本草入門痛風門下體痛條痛甚加乳香沒藥熱者合大承氣湯下之按以上奇方不可附子者宜用一貫云痛風痛夜甚者用桂枝茯苓丸料兼紅藍花酒又金鈴散痛風痔疾用之牽牛子一味為散每服五分或七分酒服日三方輿載千金犀角湯大防風湯金鈴散赤龍皮湯療鶴膝風方烏頭桑寄生雲母丁香防己天麻各等分上六味為粗末分取一錢五分漬醋一合製造方五寸許箱石菖根鋪其底厚五分所燒石大如雞子置石菖上灌所漬之醋於石藥氣發揚急蓋之令不漏氣為要即移箱於患所之下以衣覆之乃去蓋藥氣徹肉中而汗出於患所如此者日數次腫日減而復故安政乙卯冬關東大地江震戶士民被壓傷者夥矣時患卒鶴膝風者數人皆惡寒發熱身體痛或右膝或左腫大而痛不能起居初與越婢朮附湯而發汗三四日而身痛去但膝頭腫大而痛不去與桂枝芍藥知母湯膝頭施蜞針數枚每日取血月餘而全愈按痛風雖舌有胎身有熱口中和者宜用烏頭附子也口中和者一切鹹味煙草類不變味是也大便難者可日兼用黃鐘姑洗丸等也頭痛大承氣湯入門頭風門云有偏痛年久便燥目赤眩暈者氣鬱血壅而然宜大承氣湯下之一男子卒偏頭痛甚叫號驚四鄰諸治無效經三日豫與大承氣湯三貼下利數行而全愈白虎湯舌上黃黑者方輿舌上乾燥頭盡痛無渴亦可用小柴胡湯大柴胡湯因腹候用之或加石膏吳茱萸湯乾嘔吐涎沫頭痛者桂薑棗草黃辛附湯頭痛無熱唯惡寒大便自可脈沉細全陰狀者六物解毒湯主黴毒頭痛方中十倍土茯苓三倍大黃倍余藥煎法服法禁忌如淋疾門加味六物解毒湯用之不差者或兼施七寶丸或貼元生膏於百會六七日蜞針去惡血如此四五次則無不瘥矣元生膏蜞針世稱宿疾頭痛藏無他病者必頭有惡血也施元生蜞針即效應鐘散茶清送下姑洗丸南呂丸瓜蒂散鹽湯李東垣曰頭痛久不已則令人喪目胸膈有宿痰之致然也先以茶調散吐之按外臺葛氏卒頭痛如破用鹽湯吐之方輿載常山甘草湯張子和亦用瓜蒂散本草云頭痛欲死消石末吹鼻內又一物瓜蒂吹鼻中按小兒卒頭痛甚反覆顛倒發作有時者蛔蟲也宜用鷓鶘菜湯婦人月事之時及産前後頭痛輕者當歸芍藥散料兼用單香附子散宿疾頭痛輕者以三稜針刺懸顱懸釐絲竹空朣子髎等一書云真頭痛者手足厥冷爪甲青引腦巔泥丸盡痛若其厥冷上肘膝者死速灸百會數十壯作大劑參附湯頻服免死者間有焉頭痛脈浮滑易治短澀難治脈訣肩背痛葛根湯項背強𠘧𠘧桂枝加葛根湯葛根朮附湯大陷胸湯因留飲而肩背強者又龜背者兼之姑洗丸大陷胸之輕者有持云治項背強痛或臂不能舉者當歸四逆加吳茱萸生薑大黃湯疝氣從肋骨邊至脊及肩強痛者南呂丸應鐘散元生膏蜞針元生膏貼患部後施蜞針夏秋直施蜞針即效紫丸醫通云當肩背一片冷痛背膂疼痛古法用神保丸神保巴豆丸也一貫云龜胸龜背一也龜胸後必成龜背也對症方多加山慈姑令長服兼用紫丸間日夜服自二三分加至四五分小兒者用一分許十五歲以下可治十五以上不治方輿載六物敗毒湯提肩散本事方椒附散心痛胸痹結胸枳實薤白桂枝湯胸痹心中痞留氣結在胸胸滿脅下逆搶心栝蔞薤白白酒湯胸痹之病喘息咳唾胸背痛短氣寸口脈沉而遲栝蔞薤白半夏湯胸痹不得臥心痛徹背者按心痛徹背疑似真心痛者先與此湯兼用大陷胸湯九痛丸備急丸亦用大陷胸湯心痛及結胸將成龜胸者皆用之九痛丸治九種心痛備急丸心痛用此丸聖濟小陷胸湯梔子豉湯心中結痛者心痛有一種為懊惱狀者用之茯苓杏仁甘草湯胸痹胸中氣塞短氣茯苓杏仁甘草湯主之橘枳薑湯亦主之胸痹輕症氣塞短氣為準橘皮枳實生薑湯此方主治與前方異宜從方極桂枝生薑枳實湯心中痞諸逆心懸痛薏苡附子散胸痹緩急者急症用之緩急二字解見本書一貫云白酒湯之劇症痛甚手足厥冷者此散有效大建中加烏梅湯因蟲者人參湯甘草乾薑湯姑洗丸失笑散桃仁承氣湯心痛脈澀有死血丹溪必效療蜎心痛方外臺熊膽如大豆和水服大效心胸痛奇方嚴酢半合雞卵一個相擾頓服神驗武田氏胸痹痛如錐刺服韭汁吐去惡血本草生韭及根五升洗搗汁靈樞云真心痛手足清至節心痛甚旦發夕死夕發旦死古人云非藥所能治也和田氏云真心痛痛在膻中頰躁反覆顛倒脈結代用大陷胸九痛丸而難治真心痛自古為必死然宜用此方救之芭蕉搗取汁生酒調和服養生記引濟急方云入門云瘀血痛飲湯水咽下作厄乃素食熱物血死胃脘桃仁承氣湯輕者四物湯加桃仁紅花醫通云蟲痛面如白班唇紅能食或口中沫出痛有必休止又云心膈大痛發厥嘔逆諸藥不納者趁勢以鵝羽翎採吐痰盡而痛愈按先是張介賓有此説聖濟並諸書心痛不用吐劑古云脈沉細而遲者易治浮大弦長皆難治方輿載千金陷胸湯烏頭赤石脂丸檳榔鶴蝨散枳縮二陳湯高良薑湯治卒暴心痛事林廣記五靈脂炒一錢半乾薑泡三分為末熱酒服立愈一書雲水煎內童便三勺服按白酒宜用醇酒也家君有白酒辨北洲吉益氏云禮記曰其酒清白皆謂美酒也此蓋東洞先生之遺言也詳見本書腹痛大承氣湯卒腹滿而痛煩悶口噤欲死者備急丸心腹脹滿卒痛如錐刺氣急口噤桂枝加芍藥大黃湯桂枝加芍藥湯小建中湯小柴胡湯胸脅苦滿腹痛者大建中湯心胸中大寒痛嘔不能飲食腹中寒上衝皮起出見有頭足上下痛而不可觸近附子粳米湯腹中寒氣雷鳴切痛胸脅逆滿嘔吐黃連湯胸中有熱胃中有邪氣腹中痛欲嘔吐者靈黃散治血氣刺痛兼治疝痛從少腹上衝心者灸內關中脘氣海神闕填鹽灸之水分膈俞脾俞胃俞上八處灸治疝並陰症腹痛桃核承氣湯腹痛因瘀血者桂枝茯苓丸料加大黃紅花湯治瘀血作腹痛者兼治痘後腹痛結毒並瘡疥內攻腹痛丹溪因跌撲損傷瘀血作腹痛者用桃核承氣湯加當歸紅花蘇木入酒童便煎服下之七寶丸化毒丸此二方治久腹痛一書云久腹痛生漆丸有效蒸劑家方腹痛甚者尉之一老醫曰産後少腹痛用下劑而不愈者桂枝茯苓丸料加當歸紅花延胡索大效延胡索少腹痛專藥也云荻野氏云少腹痛無食積蟲積皆蓄血與疝也河間心腹痛不可忍者乳香沒藥酒煎服綿綿痛無增減沉遲者寒痛也乍痛乍止脈數者熱痛也痛不移處者是死血也肚腹作痛或大便不通按之痛甚瘀血在內也時痛時止面白唇紅者蟲痛也回春蟲痛肚大青筋往來絞痛痛定能食發作有時不比諸痛停聚不散又云瘀血痛必著一方入門和田氏云久腹痛不減食則不治宜以米一合五勺作一日食也作粥最佳禁一切青菜油膩黏滑水飲乾硬物而施治則無不愈矣方輿載安中散高良薑湯手捻散腰痛苓薑朮甘湯腰以下冷痛腰重如帶五千錢者千金此方加桂枝澤瀉杜仲牛膝名腎著散粗散酒煮去滓服當歸四逆加吳茱萸生薑湯治疝氣腰痛打撲腰痛輕者桃核承氣湯治打撲腰痛經閉腰痛日輕夜重者桂枝茯苓丸料加當歸大黃治前症輕者當歸四逆湯或加附子八味丸虛勞腰痛少腹拘急小便不利者大黃附子湯腰痛脅肋痛不大便脈緊因疝者仲呂丸元生膏本草腰痛門外治條云痰注及撲損痛芥子同酒塗治腰痛正傳大黃生薑煎服醫通云腰痛大便閉者用大柴胡湯微利之按平生祕結四五日而腰痛者下之愈灸腰眼八窖千金章門病因考保命歌括腰痛門云委中二穴主瘀血痛宜用三稜針刺出血大效回春云日輕夜重者瘀血也按要訣云腰痛有寒有濕有風有虛有閃挫方輿輗云腰痛病因寒疝打撲帶下瘀血也愚按大凡寒疝瘀血與濕也寒疝輕者當歸四逆輩重者附子劑兼下劑瘀血重者桃核承氣湯輕者加味桂枝茯苓丸料又有苓薑朮甘湯症屬濕後世名腎著腎著者腎受冷濕著而不去之義也傷寒中濕痘疹等之腰痛者客證也寒疝並瘀血腰痛甚不得屈伸者以元生膏貼於腰拔出一毒則二三日而腰痛如忘能屈伸其法詳於疝及打撲門方輿載附子劑酒服散藥乾漆劑酒服散藥子和無憂散禹攻散當歸浴湯眼大青龍湯葛根湯黃連解毒加車前子湯苓桂術甘加車前子湯大柴胡湯大承氣湯桂枝茯苓丸桃核承氣湯上桂桃二方治婦人屬血證眼疾應鐘散黃鐘丸四苓散加唐蒼朮治雀目七寶丸赤眼赤色已去無痛生翳者每日服一分許洗眼方黃連解毒湯加菊花紅花甘草且加白礬少許治誤傷目方生通草葉搗絞汁滴入眼中若無生者以乾者細銼水煎頻頻洗之又生水仙根搗絞汁滴入眼中針灸法晴明風池太陽神庭上星囟會前頂攢竹絲竹空承位目窗客主人承光諸穴皆可用針或以三稜針出血八關亦可刺凡近目之穴皆禁灸大骨空小骨空合谷翳風肝俞足三里二間命門水溝手三里諸穴宜灸方輿眼科錦囊云風眼之名本邦之俗稱而非漢名也然書中間有風眼之名目實是同名異證如所謂風眼爛弦頭風風眼甚多矣不可混同矣言本邦之風眼者劇症漢上之風眼者輕症也又曰風眼治法用吐劑或烏頭附子之類有奇效不兼用攻下則至使眼珠破裂更在太陽尺澤委中刺絡放血又於百會顳顬貼用發泡膏或以糊劑塗著足蹗屢用塗藥嗅鼻之劑至於眼痛劇者灸少陵小炷三壯及三里三陰交女室一曰女膝在踵之部赤白肉之分際蓋奇穴也各二十壯和田氏云風眼宜急用備急紫丸類若遲疑則眼球破裂而至於失明按風眼證滿目丹黃劇痛兩瞼浮腫寒熱頭痛如割狀殆似陽證傷寒至其劇甚則譫言妄語瞳孔破綻竟致盲瞶急用紫丸一錢大下之大勢已解而後用大青龍湯隨其腹證兼用瀉心大承氣桃核承氣等蜞針以水蛭數枚令咂眼之內眥及外眥瞼內赤肉之處血滿自脫則以濕紙拭血數十度而血自止日一次施之四五日而大勢已解則隔日施之六七度病減十之八九赤眼治法無捷於斯元生膏小兒眼疾以此膏貼百會四五日而有奇效大人蜞針元生兼施則效速且項背強者貼此膏於風門肺俞邊即效艮山翁目赤腫痛用七味敗毒散和田氏瘡疥愈後作眼病者用敗毒加石膏湯家翁用涼膈加石膏湯治爛弦風方膽礬或用土呂志寸枯礬上二味水解洗患所極效治眼目暴翳或疼痛一切瓜蒂吹鼻中令嚏此一小吐方也治稻麥芒入目中蘘荷汁注目即出並眼目澀痛點之蘇恭治麥芒入目大麥煮汁洗之孫真人治飛絲入眼蕪菁根或葉揉爛帕包滴汁三兩點即出普濟方治飛絲入目芥菜汁點之如神摘玄方治塵芒入目蓮藕汁入目中普濟治赤眼腫痛梨實絞汁點之聖惠按眼疾者宜托專門然僻邑無專門則如風眼急證至失明故記風眼赤眼治法之大略爾方輿載六物敗毒湯連翹湯夏枯草湯芣苡散謝道人大黃湯通聖散通聖散方後云生翳膜者加芣苡二錢因結毒者加土茯苓四錢耳小柴胡湯大柴胡湯葛根加大黃湯應鐘散柴胡加石膏湯耳前後腫者又治咳嗽後耳聾者妙苓桂術甘合瀉心湯耳鳴者柴胡薑桂加鐵砂湯耳鳴有動悸者鷓鶘菜湯小兒耳聾因蟲者七寶丸治梅毒將耳聾者聤耳流膿方菖蒲根水洗取汁先以綿杖子橪出膿令淨次將菖蒲汁灌入蕩洗數次全愈最妙又以水銃洗耳中入椰子油又韭汁入耳中亦效治耳聾方千金菖蒲附子各等分上為末以麻油和以綿裹內耳中治耳卒聾閉外臺芥子末人乳汁和以綿裹塞之又方巴豆十粒松脂半兩上二味搗爛捻如棗核塞耳中又方附子一味以醇醋微火煮一宿削如棗核以綿裹塞耳中又方釅醋二合溫灌耳中以綿塞定半日許必有物出即差又本草有貓尿及龜尿人尿各一味滴入耳中方皆治耳聾云入門云耳鳴乃是聾之漸按耳聾者難治唯因聤聹而聾者可治也治法以椰子油內耳中數日後以水銃洗耳中則如脂物出而全愈元生膏貼耳下或百會風門邊蜞針灸肩井三里肺俞膏肓針刺尺中取血一處女麻疹後兩耳聾閉一醫將精香油滴入於右耳中至次日將剜耳匙子徐徐探耳內挑出凝垢一個大如芽兒小指右耳忽覺清聰左耳亦用此法而俱清聰久患頓除方輿輗醫通耳病用涼膈散家翁亦用之鼻葛根加石膏湯鼻鼽者發汗之又治腦漏頭痛者小柴胡加石膏湯治齆鼻有息肉不聞香臭方千金瓜蒂絲辛上二味各等分為末以綿裹如豆大塞鼻中治鼻窒塞氣息不通聖濟瓜蒂一味為散少許吹鼻中竹葉石膏湯治鼻塞或兼頭痛者方輿鼻塞不聞香臭者或用此湯子和用白虎湯此症多有大逆上氣故用之紀聞黃連解毒湯有酒客鼻紫赤而非真酒查鼻者用此湯而不用傅藥又真酒查鼻輕者用此湯可也三黃梔子湯華岡治酒皶鼻劇者大黃黃連地黃葛根紅花芍藥梔子各一錢甘草三分上八味以水四合煮取二合渣再以水四合煮取一合半日二劑若病輕者小劑減水可也服湯數日覺患處痛癢乃將查鼻膏搽之搽後大發熱者是毒欲盡也熱既發之後外傅則須止內服則不須止也此方輿之文也敘事精詳故取之皶鼻膏同乳香硫黃巴豆輕粉各等分或粉減半上四味為末蜜煉傅患處按酒皶鼻重者鼻頭紫赤而腫生小疹有癢無痛用三黃梔子湯塗皶鼻膏塗藥則大抵發痛宜日日亂刺或施蜞針輕者硫黃杏仁二味等分為末以滾湯煉之每夜擦之時時亂刺不服藥而愈禁酒番椒油膩魚肉等一貫云鼻痔瓜礬散入門有效按鼻痔不剪去根蒂則不治宜托於專門一書云鼻淵自梅毒來者六物解毒加桔梗湯十倍土茯苓腦漏用薰藥元生膏鼻病大抵此膏貼百會效蜞針方輿載通聖散云鼻痔鼻淵酒皶鼻此方有效又載桔梗解毒湯竹葉石膏湯辛荑湯辛荑湯方辛荑防風細辛川芎白芷五味也擇加大黃石膏類鼻不聞香臭者皂莢勝於瓜蒂吹鼻中佳有息肉不聞香臭者用瓜蒂辛荑湯鼻病一切用之桔梗解毒因毒鼻梁將破壞者用之紀聞醫通鼻病用涼膈散家君亦用本事方用犀角劑牙齒葛根加石膏湯牙疳並牙齒痛有表證者或項背強者瀉心加石膏湯牙疳並齲齒者或牙疳出血者桂枝桔梗湯或加黃連齒痛者調胃承氣湯歷年齒痛黑爛脫落口吸涼稍止者入門小柴胡湯大柴胡湯小建中湯上三方因腹候用之加減烏梅丸料治蟲牙痛甚依本方去桂附加桔梗苦參地黃烏梅細辛乾薑黃連當歸蜀椒人參黃柏桔梗苦參地黃上十一味水煎先噙漱後咽下加連翹益佳黃連解毒湯加石膏犀角備急丸七寶丸元生膏蜞針按牙疳俗稱波久佐初寒熱頭痛牙齦腫痛變紫色試以指按牙齦膿血微出氣息甚臭腮頰下邊纍纍結核此症似瞑眩於輕粉口中糜爛之狀漸久則齦縫肉脫齒牙動搖或脫落雖小患難治也日久齒牙盡脫落則膿自止治法針齦縫出血塗朱硼加人中白散與瀉心加石膏湯或日用七寶丸一分許走馬下疳者牙疳之急證也初寒熱如疫牙齦腫痛變紫暗色乍潰爛出膿血或唯紫血大迸齒牙動搖多脫落其毒浸淫於唇舌及腮頰幾處亦穿孔流臭水或兩頰俱脫落或唇鼻共缺盡而臭氣滿一室六七日或十餘日而死治法急與備急丸五六分或一錢取下針牙齦出血石榴皮煎汁加枯礬少許屢漱口人中白加朱硼散十分一傅之與黃連解毒湯加石膏犀角一女子二歲患走馬下疳忽人中生黑點暫時如蠶豆大其毒及唇並牙齦兩頰脫落急用備急丸下利四五行用涼膈散隨愈漸漸生肉和田氏醫談按蟲牙痛不止者貼元生膏於耳下半日許發水泡無不愈者然齲齒不拔去病牙則不全治也又有牙齦腫痛之人頰之裡面亦腫痛者試以指按頰則徹內而痛其痛處從外施蜞針出血則即效耳輪及鼻端唇腫痛者皆施蜞針為妙家翁牙齒病用涼膈散方輿載甘露飲涼膈散六味丸有持云余嘗患牙疳服瀉心涼膈其他種種方劑無效服六味丸全愈口舌瀉心加石膏湯黃連解毒湯小柴胡加石膏湯麥門冬加地黃湯口舌乾燥者或乾燥而糜爛者當歸芍藥散加麥門五味子湯口舌如無皮狀者如不應如附子理中湯口舌生瘡大便不實者若手足逆冷腹痛者加附子朱硼散家方治鵝口瘡並口舌生瘡糜爛硼砂二錢辰砂五分上二味相和摻舌上煉蜜塗亦佳按此散口瘡者傅之咽喉腫痛者吹之若不愈者人中白五錢加此散一錢用之奇效口瘡糜爛日久延及胸中者綿裹如無患子大含之咽津凡口舌病陽症用傅藥用附子劑者不用傅藥也硼甘散同治口中糜爛者硼砂黃柏甘草各等分上三味為末貼患處少時含之而後吐之佳元生膏蜞針口瘡久不愈者肩背頸項百會耳下頷下貼此膏六七日施蜞針去惡血如法四五回則無不愈或含漱劑用黃連解毒湯又青黛黃柏等分絹裹含之咽津城南散治口瘡昆布燒存性梅肉連核燒存性各二錢巴豆去柤一錢枯礬上四味研末傅瘡處此方城州鳥羽嫗藥舌疽之祕方也山脅氏傳之云金粉散華岡治舌疽神方硼砂七分鬱金七分辰砂一錢白檀烏梅各五分金屑三分上為細末七分艾葉和紙裹為二十一條一日嗅一條要訣云曾有舌上病瘡久蝕成穴纍服涼劑不效後有教服黑錫丹遂漸愈痰泡者舌下如小豆粒者出為水泡大者如梅色赤透徹有痛舌本強不能言語以指按之軟而有水針之則黃液或如白脂者出吹金鎖匙用黃連解毒或柴胡加石輩重舌者舌下生息肉尖起如舌端長者五六分七八分又有左右生者腫痛舌強不能語言流涎頷下結核大人少小兒多治法針患處吹金鎖冰硼之類與瀉心加石柴胡加石頷下結核上貼發泡尚不治者剪斷息肉用前法木舌木者不柔軟之意舌腫短縮不出齒牙之外木強而不能卷舒發熱惡寒舌胎黃黑牙關緊急不能開口痰涎多出妨飲食至重者死治法服藥吹藥與重舌同頷下及耳下貼發泡待舌下之絡脈怒脹變紫色而用針瀉血先輩云漢土無舌疽之名和名也要訣云曾有舌上病瘡久蝕成穴金鑑云舌疳者百無一生此定舌疽矣初舌尖或舌下或舌心或左或右固結如豆或如栗子經久瘡頭腐蝕而為凹食鹽醋辛辣熱物而不痛毒至深故也腐蝕日深固結月蔓舌難轉動語言蹇澀至一年或二年舌缺盡而死初無痛亦從腐蝕生痛或發寒熱治法有痛者瀉心湯加石膏涼膈散加石膏無痛者附子劑外用五寶散冰硼散城南散華岡氏金粉散最有效上祕録之略文也全文見本書金鎖匙冰硼散見正宗龔氏云凡舌腫脹甚宜先刺舌尖或舌上或邊傍出血泄毒以救其急惟舌下濂泉穴此屬腎經雖宜出血亦當禁針慎之張子和曰余治一婦人木舌脹其舌滿口諸藥不愈余以扉針小而鋭者砭之五七度腫減三日方平計所出血幾至盈斗方輿載涼膈散清熱補氣湯附子湯八味丸説約口舌病用白虎湯咽喉甘草湯桔梗湯少陰病二三日咽痛者可與甘草湯不差者與桔梗湯甘草湯痛甚者有效桔梗湯吐黏痰者用之半夏散及湯少陰病咽中痛者咽痛兼痰咳者效半夏苦酒湯少陰病咽中傷生瘡不能語言聲不出者家傳煎法將磁器盛苦酒五勺以半夏極細末五分雞子白一枚調勻攪令相得安火上令八九沸下火少少含咽之咽時捫鼻不令氣入可大青龍湯葛根加石膏湯大柴胡加石膏湯備急丸元生膏蜞針針按喉痹喉癰纏喉風乳鵝西洋總謂之咽喉焮腫祕録云喉痹者咽喉之癰而又曰喉癰又焦氏筆乘曰喉閉痹非麻痹之義中藏經曰痹閉也咽喉閉塞之謂也為刺縫臨摹剞劂等日勞肩腕者多有此患初起項背強痛頭痛發熱惡寒而咽喉腫痛醫視咽之法以杉箸二枝紙裹壓病人之舌令自引氣息於內則能視也大抵從咽之左右腫而及齒牙之盡處及舌本為濃紫色飲津唾亦痛甚牙關緊急不能隨意開口語言蹇澀頤之下邊纍纍結核幾廢飲食是尋常之喉痹而易治決無死矣經六七日則自潰膿血出速愈也急喉痹謂之走馬喉痹古云暴發暴死迅速之病也急喉痹腫之及外者謂之纏喉風即急喉痹之一證也急喉痹之候咽喉暴腫痛閉塞痰涎壅盛聲啞呼吸不利咽喉之外亦微腫變色舌上黃胎或黑胎惡寒發熱頭痛劇其狀如疫藥餌一滴亦不下二三日而死凡喉痹之死症其腫處深於常之喉痹食道氣管共閉塞幸自潰者亦膿血入氣管絶呼吸而死也治法初發項背強者與葛根加石膏湯金鎖匙吹喉中輕者或消散腫痛益甚欲成膿者與大柴胡加石膏湯用備急丸下之膿已成則宜針若用針早則增痛宜候赤腫上生白點針之色變紫暗者亦瘀血凝滯之候宜針而去膿血膿血多出則痛如失飲食亦從進不日而愈纏喉風者驅風解毒湯多加石膏石膏咽喉病有效若咽喉壅閉藥餌一滴亦不下者咽喉左右貼大發泡針尺澤足少商瀉血一貫云喉痹纏喉風名異而其因一也施其治亦同成膿者緩症也初甘草桔梗苦酒湯等所主也急喉痹纏喉風者急症也用雄黃解毒丸若無則用白散或用礬巴散即枯礬巴豆二味也又云驅風解毒湯多加石膏令冷服中神氏云纏喉風瓜蒂末吹咽中吐黏痰一升余即愈方輿輗云急喉痹巴豆末吹咽中速效華岡氏云纏喉風針咽中吹金鎖匙用驅風解毒加石膏湯劇者刺肩井少商大出血方輿載六物敗毒湯涼膈散升麻湯加味四物湯雄黃解毒丸馬牙消一味含藥子和曰大抵治喉痹用針出血最為上策但人畏針委曲傍求瞬息喪命凡用針而有針創者宜搗生薑一塊調以熱白湯時時呷之則創口易合喉痹用針而創口痛者傅生薑有效余處針創痛者亦效紀聞
